# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Mixed Entropy Hierarchy — BearDog's human + device entropy composition.
# Source: primals/beardog/showcase/05-mixed-entropy/
#
# BearDog mixes entropy from multiple sources:
#   - Hardware RNG (device entropy)
#   - Human interaction (mouse, keyboard, timing)
#   - Environmental sensors (fieldMouse frames)
#   - Network jitter (Songbird RTT variance)
#
# This graph validates that BearDog's key generation uses the full
# entropy hierarchy, and that the resulting cryptographic material
# is indistinguishable from true random.
#
# Bond: covalent
# Science domain: cryptography, randomness quality
#
# Usage:
#   biomeos deploy --graph graphs/science/mixed_entropy_hierarchy.toml

[graph]
name = "mixed_entropy_hierarchy"
description = "BearDog mixed human+device entropy: validates key generation uses full entropy hierarchy"
version = "1.0.0"
coordination = "sequential"
bond_type = "covalent"
science_domain = "cryptography"
source_showcase = "primals/beardog/showcase/05-mixed-entropy"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity", "crypto.sign", "crypto.verify", "crypto.entropy.mixed"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# Groundspring validates cryptographic output quality
[[graph.nodes]]
name = "groundspring"
binary = "groundspring_primal"
order = 3
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "validation"
capabilities = ["validate.health", "validate.composition"]

# biomeOS coordinates entropy collection cycle
[[graph.nodes]]
name = "biomeos"
binary = "biomeos_primal"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "ecosystem"
capabilities = ["graph.execution", "ecosystem.coordination"]
