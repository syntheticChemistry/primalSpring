# SPDX-License-Identifier: AGPL-3.0-or-later
#
# PROTO SKETCH — ludoSpring game-science composition validation graph.
#
# Validates game-science capabilities that emerge from NUCLEUS composition.
# No ludospring binary — game.* methods are composed from Node Atomic
# primals (barraCuda shaders: Fitts, Perlin, WFC, flow analysis).
#
# Probes:
#   1. biomeOS substrate and Tower health
#   2. Node Atomic compute primals alive (toadStool, barraCuda, coralReef)
#   3. Game science capabilities discoverable via biomeOS routing
#   4. Round-trip: call game.evaluate_flow through biomeOS routing
#
# Usage (by ludoSpring, not primalSpring):
#   biomeos deploy --graph graphs/sketches/validation/ludospring_game_validate.toml

[graph]
name = "ludospring_game_validate"
description = "Validates ludoSpring game-science composition: Node Atomic primals expose game.* capabilities via biomeOS routing"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic", "node_atomic"]

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

[[graph.nodes]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.tower_health"]

[[graph.nodes]]
name = "verify_node_compute"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["coordination.validate_game_surface"]

[[graph.nodes]]
name = "verify_game_routing"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["verify_node_compute"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["coordination.validate_capability_routing"]
