# SPDX-License-Identifier: AGPL-3.0-or-later
#
# PROTO SKETCH — ludoSpring pure composition validation graph.
#
# ludoSpring is a PURE COMPOSITION of NUCLEUS primals — no ludospring
# binary exists. Game science emerges from composing Node Atomic
# (barraCuda Fitts/Perlin/WFC + toadStool dispatch + coralReef compile)
# with meta-tier primals (Squirrel for DDA, petalTongue for rendering).
#
# This validation checks that the NUCLEUS primals expose the game.*
# capability surface when composed together.
#
# Usage (by ludoSpring, not primalSpring):
#   biomeos deploy --graph graphs/sketches/validation/ludospring_validate.toml

[graph]
name = "ludospring_validate"
description = "Validates ludoSpring pure composition: NUCLEUS primals expose game.* capabilities without a ludospring binary"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic", "node_atomic", "meta_tier"]

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "health.liveness"]

[[graph.nodes]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.tower_health"]

[[graph.nodes]]
name = "verify_node_compute"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.node_health"]

[[graph.nodes]]
name = "validate_game_surface"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["verify_node_compute"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["coordination.validate_composition"]
