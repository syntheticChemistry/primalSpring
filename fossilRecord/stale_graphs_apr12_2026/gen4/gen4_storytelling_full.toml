# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Gen4 Storytelling Full — Pure NUCLEUS Composition
#
# The complete AI DM + game science + visualization stack as a pure
# composition of NUCLEUS primals. No downstream binaries.
#
# The storytelling loop (all via primal composition):
#   1. petalTongue captures player input (interaction.poll)
#   2. NestGate resolves session state (storage.retrieve)
#   3. Squirrel narrates (ai.query with session context)
#   4. barraCuda evaluates flow + DDA (GPU: sigmoid, Fitts, engagement)
#   5. toadStool dispatches compute (compute.dispatch.submit)
#   6. rhizoCrypt stamps the session event (dag.event.append)
#   7. petalTongue renders the new scene (visualization.render.scene)
#   8. Loop at 60Hz tick budget
#
# All prior esotericWebb/ludoSpring "binary" work validated these
# composition patterns work (narrative AI, session lifecycle, Fitts,
# Flow, DDA, WFC, provenance). The graph IS the product.
#
# Usage:
#   biomeos deploy --graph graphs/gen4/gen4_storytelling_full.toml

[graph]
name = "gen4_storytelling_full"
description = "Full AI DM storytelling — pure NUCLEUS composition: AI narration + game math + scenes + provenance"
version = "3.0.0"
coordination = "Continuous"
tick_hz = 60

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic", "node_atomic", "provenance_trio"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

# ── Phase 0: biomeOS Neural API substrate ──────────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "graph.status", "capability.discover"]

# ── Tower identity + discovery ─────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.identity", "crypto.sign", "crypto.verify"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["net.discovery", "net.mesh"]

# ── AI: narration (replaces esotericwebb narrative engine) ─────────────
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 3
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = [
    "ai.query", "ai.complete",
    "ai.narrate", "ai.constrain_ruleset",
    "mcp.tools.list", "mcp.tools.call",
    "context.create", "context.update", "context.summarize",
]

# ── Interface: scene rendering + player input ──────────────────────────
[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 4
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
capabilities = [
    "visualization.render.scene",
    "visualization.render.dashboard",
    "visualization.render.stream",
    "interaction.poll",
    "interaction.subscribe",
]

# ── GPU game math (replaces ludospring binary) ─────────────────────────
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 5
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 6
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = ["shader.compile", "shader.list"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 7
required = false
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.fitts", "tensor.flow_sigmoid", "tensor.engagement",
    "tensor.perlin", "tensor.wfc", "tensor.noise",
]

# ── Session storage ────────────────────────────────────────────────────
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 8
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve"]

# ── Provenance: session integrity ──────────────────────────────────────
[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 9
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "provenance"
security_model = "tower_delegated"
capabilities = ["dag.session.create", "dag.event.append", "dag.session.finalize"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 10
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["session.commit", "entry.append"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 11
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = ["provenance.create_braid", "provenance.lineage"]
