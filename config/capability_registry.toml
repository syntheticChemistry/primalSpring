# ── Provenance trio (rhizoCrypt + loamSpine + sweetGrass) ──
# Routing via biomeOS capability.call:
#   capability.call({ capability: "dag", operation: "session.create", args: {...} })
#   → discovers rhizoCrypt (by_capability = "dag") → forwards "dag.session.create"
#
# IMPORTANT: operation names must match the method suffix after the domain dot.
# E.g., method "dag.session.create" → capability="dag", operation="session.create"
#       method "entry.append" → capability="entry", operation="append"
#       method "braid.create" → capability="braid", operation="create"
#
# biomeOS discover_capability uses prefix matching: "dag" finds primals
# with capabilities starting with "dag.".

# rhizoCrypt — content-addressed DAG (by_capability = "dag")
[[capabilities]]
method = "dag.session.create"
description = "Create a provenance DAG session"
domain = "dag"
provider = "rhizocrypt"

[[capabilities]]
method = "dag.session.get"
description = "Get session metadata"
domain = "dag"
provider = "rhizocrypt"

[[capabilities]]
method = "dag.session.list"
description = "List DAG sessions"
domain = "dag"
provider = "rhizocrypt"

[[capabilities]]
method = "dag.event.append"
description = "Append an event (with witnesses) to a DAG session"
domain = "dag"
provider = "rhizocrypt"

[[capabilities]]
method = "dag.vertex.get"
description = "Get a vertex from the DAG"
domain = "dag"
provider = "rhizocrypt"

[[capabilities]]
method = "dag.frontier.get"
description = "Get the frontier (leaf vertices) of a session"
domain = "dag"
provider = "rhizocrypt"

[[capabilities]]
method = "dag.merkle.root"
description = "Compute Merkle root of a session (dehydration)"
domain = "dag"
provider = "rhizocrypt"

[[capabilities]]
method = "dag.merkle.proof"
description = "Generate a Merkle inclusion proof"
domain = "dag"
provider = "rhizocrypt"

[[capabilities]]
method = "dag.merkle.verify"
description = "Verify a Merkle proof"
domain = "dag"
provider = "rhizocrypt"

[[capabilities]]
method = "dag.slice.checkout"
description = "Checkout a DAG slice (subset)"
domain = "dag"
provider = "rhizocrypt"

[[capabilities]]
method = "dag.dehydrate"
description = "Dehydrate a session — produces wire summary with Merkle root and witnesses"
domain = "dag"
provider = "rhizocrypt"

