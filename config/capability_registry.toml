# False positives — strings that match the dotted pattern but are not methods.
# The CI script excludes these automatically.
[false_positives]
owner = "none"
methods = [
    "index.html",
    "manifest.toml",
    "meta.deploy",
    "meta.health",
    "meta.intent",
    "meta.observe",
    "meta.render",
    "nest.commit",
    "nest.retrieve",
    "nest.store",
    "node.compute",
    "test.sock",
    "tests.rs",
    "tower.authenticate",
    "tower.bootstrap",
    "tower.discover",
    "tower.health",
    "tower.publish",
]
