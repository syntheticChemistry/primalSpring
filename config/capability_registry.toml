# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Canonical Capability Registry — primalSpring
#
# Every JSON-RPC method string used in primalSpring source code (library,
# guidestone, experiments) AND referenced in canonical graph TOML files
# must appear in this registry.
#
# CI checks:
#   tools/check_method_strings.sh — validates Rust source against this file
#   tools/check_graph_methods.sh  — validates graph TOML capabilities (advisory)
#
# Structure: [domain] with `methods = [...]` listing all known methods in
# that domain. `owner` names the primal that serves them. `test_fixtures`
# lists synthetic method strings used only in tests (excluded from drift check).
#
# Adding a new method: add it here first, then use it in code.
# Removing a method: grep the codebase, remove all uses, then remove from here.

