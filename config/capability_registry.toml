domain = "discovery"
provider = "songbird"

[[capabilities]]
method = "discovery.find_primals"
description = "Find primals registered in the discovery mesh"
domain = "discovery"
provider = "songbird"

[[capabilities]]
method = "network.stun"
description = "STUN public address resolution"
domain = "network"
provider = "songbird"

[[capabilities]]
method = "network.nat_type"
description = "NAT type detection via STUN"
domain = "network"
provider = "songbird"

[[capabilities]]
method = "network.birdsong.beacon"
description = "Generate encrypted BirdSong beacon"
domain = "network"
provider = "songbird"

[[capabilities]]
method = "network.birdsong.decrypt"
description = "Decrypt a BirdSong beacon"
domain = "network"
provider = "songbird"

[[capabilities]]
method = "network.onion.start"
description = "Start sovereign onion service"
domain = "network"
provider = "songbird"

[[capabilities]]
method = "network.onion.status"
description = "Sovereign onion service status"
domain = "network"
provider = "songbird"

[[capabilities]]
method = "network.tor.status"
description = "Tor subsystem status"
domain = "network"
provider = "songbird"

[[capabilities]]
method = "network.federation.peers"
description = "Cross-tower federation peer list"
domain = "network"
provider = "songbird"

# ── Federation lifecycle (biomeOS v2.78+) ──

[[capabilities]]
method = "federation.configure"
description = "Configure a gate for federation (per-gate setup)"
domain = "federation"
provider = "biomeos"

[[capabilities]]
method = "federation.join"
description = "Join a gate to a federation"
domain = "federation"
provider = "biomeos"

[[capabilities]]
method = "federation.health_check"
description = "Health check across all gates in a federation"
domain = "federation"
provider = "biomeos"

# ── Topology queries ──

[[capabilities]]
method = "topology.get"
description = "Get the current topology graph"
domain = "topology"
provider = "biomeos"

[[capabilities]]
method = "topology.proprioception"
description = "Proprioceptive topology (self-aware network map)"
domain = "topology"
provider = "biomeos"

# ── Graph analysis (local) ──

[[capabilities]]
method = "graph.waves"
description = "Topological wave decomposition of a deploy graph"
domain = "graph"

[[capabilities]]
method = "graph.capabilities"
description = "Extract required capabilities from a deploy graph"
domain = "graph"

# ── Ionic bond negotiation (Track 4 — local) ──

[[capabilities]]
method = "bonding.propose"
description = "Propose an ionic bond contract (validate + queue)"
domain = "bonding"

[[capabilities]]
method = "bonding.status"
description = "Query ionic bond contract status"
domain = "bonding"

# ── Visualization capabilities (petalTongue) ──

[[capabilities]]
method = "visualization.render.dashboard"
description = "Render a Tower health dashboard via petalTongue"
domain = "visualization"
provider = "petaltongue"

[[capabilities]]
method = "visualization.render.grammar"
description = "Render a Grammar-of-Graphics expression via petalTongue"
domain = "visualization"
provider = "petaltongue"
