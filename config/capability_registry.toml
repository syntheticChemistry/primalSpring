# Test fixtures — synthetic method names used in unit tests only.
# These are excluded from drift checking.
[test_fixtures]
owner = "tests"
methods = [
    "add.wgsl",
    "anything.at.all",
    "direct.method",
    "foo.bar",
    "method.name",
    "nonexistent.tool",
    "object.method",
    "test.method",
]

# False positives — strings that match the dotted pattern but are not methods.
# The CI script excludes these automatically.
[false_positives]
owner = "none"
methods = [
    "manifest.toml",
    "test.sock",
    "tests.rs",
]
