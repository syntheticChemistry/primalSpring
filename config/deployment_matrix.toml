# Deployment Matrix — arch × topology × transport × gate
#
# Each [[cell]] represents a validated (or pending) deployment configuration.
# Status: "validated" = tested live, "pending" = infrastructure ready, "blocked" = dependency unmet.
#
# The deployment matrix sweep (exp081) probes these cells. A cell is "tested"
# when exp081 has run against a live gate matching its parameters with ≥2 live primals.

[matrix]
architectures = ["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl"]
transports = ["uds_only", "tcp_fallback", "tcp_only"]
topologies = ["standalone", "mesh_peer", "mesh_hub"]

# ── eastGate (x86_64, hub, UDS-only) ────────────────────────────────────────

[[cell]]
id = "eastgate-x86-uds-hub"
gate = "eastGate"
arch = "x86_64-unknown-linux-musl"
transport = "uds_only"
topology = "mesh_hub"
primals = 13
status = "validated"
wave = 107
notes = "Primary development gate. 13/13 FULL NUCLEUS. Hub for 4-gate mesh."

[[cell]]
id = "eastgate-x86-tcp-hub"
gate = "eastGate"
arch = "x86_64-unknown-linux-musl"
transport = "tcp_fallback"
topology = "mesh_hub"
primals = 13
status = "validated"
wave = 106
notes = "TCP fallback tested via exp081 + s_tcp_fallback scenario."

