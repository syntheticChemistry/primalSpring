primals = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "nestgate", "rhizocrypt", "loamspine", "sweetgrass", "biomeos", "squirrel"]
atomic = "nucleus+meta"
composition = "Full NUCLEUS + Springs + Mobile"
description = "Full NUCLEUS with NAT-degraded mobile node"

[topologies.wan_federation]
