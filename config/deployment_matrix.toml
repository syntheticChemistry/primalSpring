# ── Network Presets ─────────────────────────────────────────────────────

[presets.basement_lan]
latency_ms = 0.5
loss_pct = 0.0
bandwidth_mbps = 10000
scenario = "Same-rack HPC / server room"

[presets.home_lan]
latency_ms = 2
loss_pct = 0.01
bandwidth_mbps = 1000
scenario = "Home network — WiFi or ethernet"

[presets.friend_wan]
latency_ms = 50
loss_pct = 0.5
bandwidth_mbps = 100
scenario = "Friend's gate over broadband WAN"

[presets.mobile_cell]
latency_ms = 100
loss_pct = 2.0
bandwidth_mbps = 10
scenario = "Pixel over LTE/5G, behind NAT"

[presets.satellite]
latency_ms = 600
loss_pct = 5.0
bandwidth_mbps = 5
scenario = "Starlink / geostationary — extreme latency"

[presets.deep_space]
latency_ms = 2000
loss_pct = 10.0
bandwidth_mbps = 1
scenario = "Intercontinental / Tor-routed — extreme RTT"

[presets.urban_congested]
latency_ms = 150
loss_pct = 15.0
bandwidth_mbps = 2
scenario = "Dense urban LTE during peak hours"

[presets.intermittent]
latency_ms = 500
loss_pct = 50.0
bandwidth_mbps = 0.5
scenario = "Spotty rural / tunnel transitions — near-unusable"

[presets.localhost]
latency_ms = 0
loss_pct = 0.0
bandwidth_mbps = 0
scenario = "Same-machine loopback — no network simulation"

# ── Transport Modes ─────────────────────────────────────────────────────

[transports.uds_only]
description = "Unix domain sockets only — Zero-Port Tower Atomic standard (DEFAULT)"
env_override = {}
notes = "All primals UDS-only. No TCP ports bound. This is the canonical transport."

[transports.uds_first]
description = "Unix domain sockets preferred, TCP fallback"
env_override = {}
notes = "Legacy: equivalent to uds_only now that all primals default to no TCP"

[transports.tcp_first]
description = "DEPRECATED: TCP-only — mobile/Android future work"
env_override = { PRIMAL_TRANSPORT = "tcp", BIOMEOS_MODE = "api", BIOMEOS_TCP_ONLY = "true" }
notes = "Required for Pixel/GrapheneOS (SELinux denies sock_file create). Not yet re-enabled post-Tower-Atomic."
deprecated = true

# ── Security Tiers ─────────────────────────────────────────────────────

[security_tiers]
description = "Encryption tiers enforced by the Tower Atomic security model"

[security_tiers.tower]
enforcement = "btsp_enforced"
encryption = "full"
primals = ["beardog", "songbird"]
notes = "Tower boundary. BTSP handshake required. Full encryption for all cross-boundary traffic."

[security_tiers.nucleus]
enforcement = "tower_delegated"
encryption = "hmac_plain"
primals = ["biomeos", "toadstool", "barracuda", "coralreef", "nestgate", "squirrel", "rhizocrypt", "loamspine", "sweetgrass", "petaltongue"]
notes = "Same-host UDS behind Tower perimeter. Lower encryption acceptable. HMAC-plain or cleartext."

[security_tiers.federation]
enforcement = "btsp_enforced"
encryption = "full"
transport = "songbird_tcp_opt_in"
notes = "Inter-host traffic via Songbird --port. Full encryption. Zero-knowledge to external observers."

# ── Experiments ─────────────────────────────────────────────────────────

[experiments]
core = ["exp074_cross_gate_health", "exp073_lan_covalent_mesh"]
extended = ["exp076_cross_gate_neural_routing", "exp063_pixel_tower_rendezvous"]
full = ["exp060_biomeos_tower_deploy", "exp075_biomeos_neural_api_live", "exp079_spring_deploy_sweep"]
matrix_sweep = ["exp081_deployment_matrix_sweep"]
bonding = ["exp030_covalent_bond", "exp031_ionic_bond", "exp032_plasmodium_formation"]
chaos = ["exp082_chaos_substrate"]
federation = ["exp083_federation_edge_cases"]
provenance = ["exp084_provenance_adversarial", "exp041_provenance_trio_science"]
showcase = ["exp042_fieldmouse_ingestion", "exp050_compute_triangle", "exp052_protocol_escalation", "exp053_multi_primal_lifecycle", "exp057_supply_chain_provenance", "exp058_semantic_attribution", "exp059_weak_force_isolation"]
agentic = ["exp061_squirrel_ai_composition", "exp077_squirrel_neural_api_bridge", "exp078_petaltongue_viz_surface", "exp075_biomeos_neural_api_live"]
storytelling = ["exp023_rpgpt_session", "exp061_squirrel_ai_composition", "exp078_petaltongue_viz_surface"]

