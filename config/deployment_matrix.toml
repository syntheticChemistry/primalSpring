# Deployment Validation Matrix — primalSpring
#
# Defines the test surface for primal composition deployments across
# architectures, topologies, network conditions, and transport modes.
#
# Usage:
#   scripts/validate_deployment_matrix.sh --cell tower-x86-homelan
#   scripts/validate_deployment_matrix.sh --tier docker
#   scripts/validate_deployment_matrix.sh --all
#
# Each cell = topology × arch × preset × transport. A cell passes when:
#   1. All primals in the topology start successfully
#   2. All health probes return OK within timeout
#   3. Core experiments (exp073, exp074) pass
#   4. No primal crashes under the network preset
#
# Matrix dimensions are evaluated combinatorially but only the cells
# listed in [[cells]] are actually run. This allows incremental expansion
# as primal teams fix gaps.

[matrix]
version = "3.0.0"
description = "NUCLEUS Atomic-Aligned"
last_updated = "2026-04-18"

[atomics]
description = "NUCLEUS atomic model — Phase 31 aligned"

[atomics.tower]
particle = "electron"
primals = ["beardog", "songbird"]
description = "Trust boundary — crypto + discovery"

[atomics.node]
particle = "proton"
primals = ["beardog", "songbird", "toadstool", "barracuda", "coralreef"]
description = "Compute substrate — dispatch + execute + compile"

[atomics.nest]
particle = "neutron"
primals = ["beardog", "songbird", "nestgate", "rhizocrypt", "loamspine", "sweetgrass"]
description = "Storage + provenance — content-addressed data + lineage"

[atomics.nucleus]
primals = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "nestgate", "rhizocrypt", "loamspine", "sweetgrass"]
description = "Full atom — Tower + Node + Nest"

[atomics.meta_tier]
primals = ["biomeos", "squirrel", "petaltongue"]
description = "Cross-atomic primals — orchestration, AI, UI"

# ── Architectures ───────────────────────────────────────────────────────

[architectures.x86_64]
target = "x86_64-unknown-linux-musl"
docker_platform = "linux/amd64"
plasmidbin_subdir = "primals"
springs_subdir = "springs"
tier = "docker"
notes = "Native Docker — no emulation needed"

[architectures.aarch64]
target = "aarch64-unknown-linux-musl"
docker_platform = "linux/arm64"
plasmidbin_subdir = "primals/aarch64"
springs_subdir = "springs/aarch64"
tier = "docker-qemu"
notes = "Requires qemu-user-static or real ARM64 host"
prerequisites = ["qemu-user-static", "binfmt_misc"]

# ── Topologies ──────────────────────────────────────────────────────────

[topologies.tower_2node]
file = "ecoprimals-tower-2node"
nodes = 2
primals = ["beardog", "songbird", "biomeos"]
atomic = "tower+meta_partial"
springs = ["groundspring", "healthspring", "neuralspring", "wetspring"]
composition = "Tower + Springs"
description = "Minimal cross-gate: Tower substrate + downstream springs (springs build their own binaries)"

[topologies.nucleus_3node]
file = "ecoprimals-nucleus-3node"
