#
# Full NUCLEUS Profile — Complete 13-primal composition
#
# Usage: nucleus_launcher start --manifest config/profiles/full_nucleus.toml
#
# Deploys: All 13 primals (biomeOS + Tower + compute + persistence + AI + viz)
# Use case: Primary gates (eastGate, ironGate), development, full validation

[manifest]
version = "1.0.0"
schema = "proto-nucleate-v1"

[gate]
name = ""
specialization = "FullNucleus"
family_id = ""

[composition]
atomic_type = "nucleus"
graph = "nucleus_complete.toml"
transport = "uds_only"

[composition.primals]
required = [
    "beardog", "songbird", "skunkbat",
    "biomeos",
    "toadstool", "barracuda", "coralreef",
    "nestgate", "rhizocrypt", "loamspine", "sweetgrass",
    "squirrel", "petaltongue",
]
optional = []

[depot]
source = "wan"
wan_url = "https://membrane.primals.eco/depot/"
git_remote = "ssh://git.primals.eco:2222/syntheticChemistry/plasmidBin.git"
verify_checksums = true
verify_provenance = true

[validation]
required_health_count = 13
health_timeout_secs = 90
run_scenario = "s_gate_expansion_readiness"
required_properties = ["P1", "P2", "P3", "P4", "P5"]
allow_degraded = false

[validation.checksums]
dual_verify = true
checksums_path = "checksums.toml"

[validation.sandbox]
enabled = true
timeout_secs = 30

[mesh]
enroll = true
federation_port = 7700
peers = []
auto_reconnect = true
reconnect_backoff_min = 30
reconnect_backoff_max = 300
