#
# Edge Light Profile — Constrained ARM/mobile devices (3-5 primals)
#
# Usage: nucleus_launcher start --manifest config/profiles/edge_light.toml
#
# Deploys: Tower (3) + optional squirrel + optional nestGate
# Use case: grapheneGate (Pixel), IoT devices, NUCs with limited RAM
# Transport: TCP-only on Android (SELinux blocks UDS for shell context)

[manifest]
version = "1.0.0"
schema = "proto-nucleate-v1"

[gate]
name = ""
target_triple = "aarch64-unknown-linux-musl"
specialization = "EdgeLight"
family_id = ""

[composition]
atomic_type = "tower"
graph = "tower_atomic_bootstrap.toml"
transport = "tcp_enabled"

[composition.primals]
required = ["beardog", "songbird", "skunkbat"]
optional = ["squirrel", "nestgate"]

[depot]
source = "wan"
wan_url = "https://membrane.primals.eco/depot/"
git_remote = "ssh://git.primals.eco:2222/syntheticChemistry/plasmidBin.git"
verify_checksums = true
verify_provenance = true

[validation]
required_health_count = 3
health_timeout_secs = 45
run_scenario = "s_sequential_graph"
required_properties = ["P1", "P2"]
allow_degraded = true

[validation.checksums]
dual_verify = false
checksums_path = "checksums.toml"

[validation.sandbox]
enabled = false
timeout_secs = 0

[mesh]
enroll = true
federation_port = 7700
peers = []
auto_reconnect = true
reconnect_backoff_min = 60
reconnect_backoff_max = 600
