# SPDX-License-Identifier: AGPL-3.0-or-later
# cargo-deny configuration for primalSpring
# Run: cargo deny check (requires cargo install cargo-deny)

[graph]
targets = []
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = []
yanked = "deny"

[licenses]
allow = [
    "AGPL-3.0",
    "AGPL-3.0-only",
    "AGPL-3.0-or-later",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

# ecoBin: zero C dependencies in application code.
# These crates pull in C compilers or system libraries that break
# cross-compilation and sovereign binary reproducibility.
# Merged from groundSpring V120 + wetSpring V132 ban lists.
deny = [
    { crate = "openssl-sys", wrappers = [] },
    { crate = "openssl", wrappers = [] },
    { crate = "native-tls", wrappers = [] },
    { crate = "aws-lc-sys", wrappers = [] },
    { crate = "aws-lc-rs", wrappers = [] },
    { crate = "ring", wrappers = [] },
    { crate = "libz-sys", wrappers = [] },
    { crate = "zlib-ng-sys", wrappers = [] },
    { crate = "bzip2-sys", wrappers = [] },
    { crate = "lzma-sys", wrappers = [] },
    { crate = "zstd-sys", wrappers = [] },
    { crate = "libgit2-sys", wrappers = [] },
    { crate = "libssh2-sys", wrappers = [] },
    { crate = "curl-sys", wrappers = [] },
    { crate = "libdbus-sys", wrappers = [] },
    { crate = "libsqlite3-sys", wrappers = [] },
    { crate = "cmake", wrappers = [] },
    { crate = "cc", wrappers = ["blake3"] },
    { crate = "pkg-config", wrappers = [] },
    { crate = "vcpkg", wrappers = [] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
