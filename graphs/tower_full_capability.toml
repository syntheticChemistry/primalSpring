#
# Tower Full Capability — complete Tower atomic with all subsystems.
#
# Extends tower_atomic_bootstrap with the full songbird subsystem surface
# (Tor, STUN, BirdSong, Onion, Federation) plus petalTongue visualization.
# This graph exercises every capability validated by primalSpring gates 1-11.
#
# Usage:
#   biomeos deploy --graph graphs/tower_full_capability.toml
#   primalspring_primal server  # then: coordination.deploy_atomic {"graph":"tower_full_capability"}

[graph]
name = "tower_full_capability"
description = "Tower Full: all subsystems + visualization"
version = "0.5.0"
coordination = "sequential"

# ── Phase 1: BearDog — crypto foundation ──
[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = [
    "crypto.encrypt",
    "crypto.decrypt",
    "crypto.sign",
    "crypto.verify",
    "crypto.keygen",
    "crypto.identity",
]

# ── Phase 2: Songbird — full network stack ──
[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = [
    # Core discovery
    "discovery.find_primals",
    "discovery.announce",
    # TLS / HTTP
    "network.tls_connect",
    "network.http_request",
    # STUN / NAT traversal
    "network.stun",
    "network.nat_type",
    # BirdSong encrypted discovery
    "network.birdsong.beacon",
    "network.birdsong.decrypt",
    # Sovereign onion
    "network.onion.start",
    "network.onion.status",
    # Tor protocol
    "network.tor.status",
    # Federation
    "network.federation.peers",
]

# ── Phase 3: petalTongue — universal visualization ──
[[graph.node]]
name = "petaltongue"
binary = "petaltongue"
order = 3
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "visualization"
args = ["server"]
capabilities = [
    "visualization.render.dashboard",
    "visualization.render.grammar",
]

# ── Phase 4: Squirrel — AI orchestration (optional) ──
[[graph.node]]
name = "squirrel"
binary = "squirrel"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
args = ["server"]
capabilities = [
    "ai.query",
    "ai.health",
]

# ── Phase 5: Coordination validation ──
[[graph.node]]
name = "validate_tower_full"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = [
    "composition.tower_health",
    "composition.tower_squirrel_health",
]
