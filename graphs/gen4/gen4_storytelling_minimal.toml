# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Gen4 Storytelling Minimal — offline/portable AI DM without biomeOS substrate.
# esotericWebb V6 has its own game science (flow, DDA, engagement) —
# no ludoSpring required for core gameplay. Direct IPC via Songbird discovery.
# petalTongue in TUI mode for terminal-only play.
# No provenance trio — fast iteration, local sessions.
#
# Validates:
#   - esotericWebb V6 self-contained narrative + game science
#   - Direct IPC: esotericWebb → Squirrel ai.query (AI DM)
#   - petalTongue TUI: scene rendering in terminal
#   - Single-node deployment: all primals co-located
#   - Graceful degradation without biomeOS Neural API
#
# Usage:
#   cargo run -p esotericwebb -- serve  (start Webb)
#   squirrel serve                      (start AI DM)
#   petaltongue tui                     (start terminal UI)

[graph]
name = "gen4_storytelling_minimal"
description = "Offline AI DM: esotericWebb V6 (embedded game science) + Squirrel AI + petalTongue TUI — no biomeOS, direct discovery"
version = "2.0.0"
coordination = "Continuous"
tick_hz = 60
bond_type = "covalent"
deployment_class = "minimal"

[[graph.nodes]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery"]

[[graph.nodes]]
name = "esotericwebb"
binary = "esotericwebb"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "webb.liveness"
by_capability = "narrative"
capabilities = ["webb.resolve_scene", "session.create", "session.advance"]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel_primal"
order = 4
required = true
depends_on = ["songbird"]
health_method = "health"
by_capability = "ai"
capabilities = ["ai.query", "ai.suggest", "context.create", "context.update"]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue_primal"
order = 5
required = true
depends_on = ["songbird"]
health_method = "health"
by_capability = "visualization"
capabilities = ["visualization.render.scene", "interaction.poll"]

# ── ludoSpring: supplemental game science (optional) ───────────────────
# Enriches Webb's embedded flow/DDA/engagement with WFC, Fitts, GPU compute.
[[graph.nodes]]
name = "ludospring"
binary = "ludospring"
order = 6
required = false
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "game"
capabilities = ["game.evaluate_flow", "game.difficulty_adjustment", "game.wfc_step"]
