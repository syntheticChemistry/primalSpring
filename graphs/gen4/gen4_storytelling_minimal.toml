# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Gen4 Storytelling Minimal — Pure Composition, Portable
#
# Minimal AI DM as a pure NUCLEUS composition. Tower + Squirrel
# (AI narration) + petalTongue (TUI rendering). No provenance,
# no GPU compute. Fast iteration, local sessions.
#
# Validates:
#   - Squirrel constrained AI narration replaces esotericWebb binary
#   - petalTongue TUI scene rendering in terminal
#   - Single-node deployment: all primals co-located
#   - Graceful degradation without biomeOS Neural API
#
# Usage:
#   biomeos deploy --graph graphs/gen4/gen4_storytelling_minimal.toml

[graph]
name = "gen4_storytelling_minimal"
description = "Minimal AI DM — pure NUCLEUS composition: Tower + Squirrel AI + petalTongue TUI"
version = "3.0.0"
coordination = "Continuous"
tick_hz = 60
deployment_class = "minimal"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["net.discovery"]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 3
required = true
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = [
    "ai.query", "ai.complete",
    "ai.narrate", "ai.constrain_ruleset",
    "context.create", "context.update",
]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 4
required = true
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
capabilities = ["visualization.render.scene", "interaction.poll"]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 5
required = false
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve"]
