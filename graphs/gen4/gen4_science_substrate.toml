#
# gen4 Science Substrate — multi-spring pipeline via biomeOS orchestration
#
# Tower verification, biomeOS coordination, then ground → wet → neural spring
# chain for sensing, phylogenetics/diversity, and Hamiltonian/spectral work, with
# a final ecosystem coordination validation.
#
# Usage:
#   biomeos deploy --graph graphs/gen4/gen4_science_substrate.toml

[graph]
name = "gen4_science_substrate"
description = "gen4 Science Substrate: multi-spring pipeline via biomeOS orchestration"
version = "0.1.0"
coordination = "sequential"

[[graph.node]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.tower_health"]

[[graph.node]]
name = "biomeos_substrate"
binary = "biomeos"
order = 2
required = true
health_method = "health.check"
by_capability = "ecosystem"
capabilities = ["graph.execution", "ecosystem.coordination"]

[[graph.node]]
name = "groundspring"
binary = "groundspring_primal"
order = 3
required = true
health_method = "health.check"
by_capability = "measurement"
capabilities = ["measurement.sense", "measurement.inverse"]

[[graph.node]]
name = "wetspring"
binary = "wetspring_primal"
order = 4
required = true
health_method = "health.check"
by_capability = "science"
capabilities = ["science.diversity", "science.phylogenetics"]

[[graph.node]]
name = "neuralspring"
binary = "neuralspring_primal"
order = 5
required = true
health_method = "health.check"
by_capability = "neural"
capabilities = ["neural.hamiltonian", "neural.spectral"]

[[graph.node]]
name = "validate_pipeline"
binary = "primalspring_primal"
order = 6
required = true
spawn = false
health_method = "ecosystem.coordination"
by_capability = "ecosystem"
args = ["server"]
capabilities = []
