# SPDX-License-Identifier: AGPL-3.0-or-later
#
# gen4 Spring Composition — full primal composition via biomeOS
#
# Starts Tower (beardog + songbird), starts biomeOS in api mode,
# germinates each available science spring primal, then validates
# cross-spring capability routing via biomeOS.
#
# ludoSpring is a pure composition (not a spawnable binary).
# Game science capabilities are provided by barraCuda + toadStool.
#
# Usage:
#   biomeos deploy --graph graphs/gen4/gen4_spring_composition.toml

[graph]
name = "gen4_spring_composition"
description = "gen4 Spring Composition: Tower + biomeOS + science springs + cross-spring routing"
version = "0.2.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "nucleated"
fragments = ["tower_atomic"]

# ── Tower Atomic ─────────────────────────────────────────────────────────────

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.encrypt", "birdsong.generate"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "mesh"
security_model = "btsp"
capabilities = ["mesh.announce", "mesh.peers", "http.request"]

# ── biomeOS Neural API ───────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "capability.list"
by_capability = "ecosystem"
security_model = "tower_delegated"
capabilities = ["graph.execution", "ecosystem.coordination"]

# ── Science Spring Primals ───────────────────────────────────────────────────

[[graph.nodes]]
name = "groundspring"
binary = "groundspring"
order = 10
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.check"
by_capability = "measurement"
capabilities = [
    "measurement.sense",
    "measurement.inverse",
    "measurement.temporal",
]

[[graph.nodes]]
name = "healthspring"
binary = "healthspring_primal"
order = 11
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.check"
by_capability = "medical"
capabilities = [
    "medical.microbiome",
    "medical.pipeline",
]

[[graph.nodes]]
name = "neuralspring"
binary = "neuralspring"
order = 13
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.check"
by_capability = "bio_ml"
capabilities = [
    "science.spiking_network",
    "science.hill_kinetics",
    "science.reservoir_computing",
    "science.cross_spring_provenance",
]

[[graph.nodes]]
name = "wetspring"
binary = "wetspring"
order = 14
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.check"
by_capability = "metagenomics"
capabilities = [
    "metagenomics.ode",
    "metagenomics.diversity",
    "metagenomics.community",
]

# ── Cross-Spring Validation ──────────────────────────────────────────────────

[[graph.nodes]]
name = "validate_cross_spring_routing"
binary = "primalspring_primal"
order = 20
required = true
spawn = false
depends_on = ["groundspring", "healthspring", "neuralspring", "wetspring"]
health_method = "health.check"
by_capability = "coordination"
security_model = "tower_delegated"
args = ["server"]
capabilities = [
    "coordination.validate_cross_spring",
    "coordination.validate_capability_routing",
]

[[graph.nodes]]
name = "validate_biomeos_composition"
binary = "primalspring_primal"
order = 21
required = true
spawn = false
depends_on = ["validate_cross_spring_routing"]
health_method = "health.check"
by_capability = "ecosystem"
security_model = "tower_delegated"
args = ["server"]
capabilities = [
    "coordination.validate_composition",
]
