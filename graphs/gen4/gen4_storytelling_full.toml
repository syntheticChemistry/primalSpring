# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Gen4 Storytelling Full — the complete AI DM + game science + visualization stack.
#
# esotericWebb V6 drives the narrative DAG with its own embedded game science
# (flow, DDA, engagement — absorbed from ludoSpring into webb/src/science/).
# Squirrel serves as the AI Dungeon Master via ai.query/ai.suggest with
# session context. petalTongue renders scenes and captures player input.
# biomeOS orchestrates the loop. ludoSpring provides supplemental game
# science (WFC, Fitts, accessibility) if available. Provenance trio stamps
# every session event for replay integrity.
#
# The storytelling loop:
#   1. petalTongue captures player input (interaction.poll)
#   2. esotericWebb resolves scene: predicates, effects, NPC state
#   3. esotericWebb evaluates flow state + DDA locally (or delegates to ludoSpring)
#   4. Squirrel narrates (ai.query with session context)
#   5. rhizoCrypt stamps the session event (dag.event.append)
#   6. petalTongue renders the new scene (visualization.render.scene)
#   7. Loop at 60Hz tick budget
#
# Usage:
#   biomeos deploy --graph graphs/gen4/gen4_storytelling_full.toml

[graph]
name = "gen4_storytelling_full"
description = "Full AI DM storytelling: esotericWebb V6 CRPG (embedded game science) + Squirrel AI DM + petalTongue scenes + ludoSpring supplemental + provenance"
version = "2.0.0"
coordination = "Continuous"
tick_hz = 60
bond_type = "covalent"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

# ── Phase 0: biomeOS Neural API substrate ──────────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "graph.status", "capability.discover", "health.liveness"]

# ── Tower identity + discovery ─────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity", "crypto.sign", "crypto.verify"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# ── esotericWebb V6: narrative engine + embedded game science ──────────
# DAG-traced CRPG: scene resolution, NPC state, ability interactions,
# predicate/effect system, bounded endings.
# V6: owns flow/DDA/engagement locally (webb/src/science/), no ludoSpring
# compile dep. Consumes Squirrel ai.*, petalTongue viz.* at runtime.
[[graph.nodes]]
name = "esotericwebb"
spawn = true
security_model = "tower_delegated"
binary = "esotericwebb"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "webb.liveness"
by_capability = "narrative"
capabilities = [
    "webb.resolve_scene",
    "webb.npc_state",
    "webb.ability_check",
    "webb.session_state",
    "session.create",
    "session.advance",
    "session.complete",
    "tools.list",
    "tools.call",
]

# ── Squirrel: AI Dungeon Master ────────────────────────────────────────
# Provides narrative generation via ai.query/ai.suggest with session context.
# Context windows track session state across scenes.
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 4
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health"
by_capability = "ai"
capabilities = [
    "ai.query",
    "ai.suggest",
    "ai.analyze",
    "tool.execute",
    "tool.list",
    "context.create",
    "context.update",
    "context.summarize",
]

# ── petalTongue: scene rendering + player input ───────────────────────
# Renders narrative scenes (dialogue trees, NPC portraits, world state).
# Captures player choices via interaction.poll.
# Modes: TUI for terminal play, egui for desktop, web for browser.
[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 5
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health"
by_capability = "visualization"
capabilities = [
    "visualization.render.scene",
    "visualization.render.dashboard",
    "visualization.render.stream",
    "visualization.render.grammar",
    "interaction.poll",
    "interaction.subscribe",
]

# ── ludoSpring: supplemental game science (optional) ───────────────────
# WFC procedural generation, Fitts law, accessibility evaluation,
# GPU game compute. Core flow/DDA/engagement is in esotericWebb V6.
# When available, enriches the composition with advanced game mechanics.
[[graph.nodes]]
name = "ludospring"
spawn = true
security_model = "tower_delegated"
binary = "ludospring"
order = 6
required = false
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "game"
capabilities = [
    "game.evaluate_flow",
    "game.fitts_cost",
    "game.engagement",
    "game.analyze_ui",
    "game.accessibility",
    "game.wfc_step",
    "game.difficulty_adjustment",
    "game.generate_noise",
]

# ── Provenance: session integrity ──────────────────────────────────────
# Every scene resolution, dice roll, NPC interaction, and AI narration
# gets a DAG entry. Sessions are replayable and auditable.
[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 7
required = false
depends_on = ["beardog"]
health_method = "health"
by_capability = "provenance"
capabilities = ["dag.session.create", "dag.event.append", "dag.session.finalize"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 8
required = false
depends_on = ["beardog"]
health_method = "health"
by_capability = "ledger"
capabilities = ["lineage.commit", "lineage.branch", "lineage.certify"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 9
required = false
depends_on = ["beardog"]
health_method = "health"
by_capability = "attribution"
capabilities = ["provenance.create_braid", "provenance.verify_braid"]

# ── Storage + compute ──────────────────────────────────────────────────
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 10
required = false
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve"]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 11
required = false
depends_on = ["biomeos_neural_api"]
health_method = "compute.health"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "shader.dispatch"]
