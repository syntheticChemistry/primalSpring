# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Gen4 Agentic fieldMouse — AI-guided edge sensor orchestration.
# The agentic tower (biomeOS+Squirrel+petalTongue) receives fieldMouse
# frames, Squirrel classifies anomalies, biomeOS routes to analysis springs,
# petalTongue renders real-time sensor dashboards.
#
# Usage:
#   biomeos deploy --graph graphs/gen4/gen4_agentic_fieldmouse.toml

[graph]
name = "gen4_agentic_fieldmouse"
description = "AI-guided edge sensors: fieldMouse → NestGate → Squirrel classify → biomeOS route → petalTongue dashboard"
version = "1.0.0"
coordination = "Pipeline"
bond_type = "covalent"
deployment_class = "fieldmouse"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "nucleated"
fragments = ["tower_atomic", "meta_tier"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity", "crypto.verify"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "ecosystem"
capabilities = ["graph.execution", "ecosystem.coordination", "capability.call", "capability.discover"]

# NestGate: receives and buffers fieldMouse frames
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.content_address"]

# Squirrel: classifies incoming sensor data, detects anomalies
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 5
required = true
depends_on = ["biomeos_neural_api", "nestgate"]
health_method = "health"
by_capability = "ai"
capabilities = ["ai.query", "ai.chat", "tool.execute", "tool.list", "context.create"]

# Analysis springs: biomeOS routes classified data here
[[graph.nodes]]
name = "neuralspring"
binary = "neuralspring_primal"
order = 6
required = false
depends_on = ["biomeos_neural_api"]
health_method = "neural.health"
by_capability = "neural"
capabilities = ["neural.classify", "neural.spectral"]

[[graph.nodes]]
name = "wetspring"
binary = "wetspring_primal"
order = 7
required = false
depends_on = ["biomeos_neural_api"]
health_method = "shader.health"
by_capability = "shader"
capabilities = ["science.diversity", "science.sequence"]

# petalTongue: renders live sensor dashboards, anomaly alerts
[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 8
required = true
depends_on = ["biomeos_neural_api", "squirrel"]
health_method = "health"
by_capability = "visualization"
capabilities = ["visualization.render.dashboard", "visualization.render.stream", "interaction.subscribe"]

# fieldMouse chimera: leaf node (not graph-managed)
[[graph.nodes]]
name = "fieldmouse_sensor"
binary = "fieldmouse_chimera"
order = 9
required = false
spawn = false
health_method = "health.check"
by_capability = "sensor"
capabilities = ["sensor.read", "fieldmouse.frame"]
