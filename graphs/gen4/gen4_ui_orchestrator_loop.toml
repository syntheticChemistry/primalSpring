#
# Gen4 UI-Orchestrator Loop — petalTongue observes, biomeOS routes, Squirrel acts.
# A focused graph for validating the three-way coordination between
# the UI, orchestrator, and AI layers without requiring full spring composition.
#
# The interaction loop:
#   petalTongue (SSE events) ← biomeOS (Neural API) ← Squirrel (AI decisions)
#   petalTongue (human intent) → biomeOS (capability.call) → Squirrel (tool.execute)
#
# Usage:
#   biomeos deploy --graph graphs/gen4/gen4_ui_orchestrator_loop.toml

[graph]
name = "gen4_ui_orchestrator_loop"
description = "Focused three-way validation: petalTongue ↔ biomeOS ↔ Squirrel coordination loop"
version = "1.0.0"
coordination = "parallel"
bond_type = "covalent"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery"]

# biomeOS Neural API — routes between petalTongue and Squirrel
[[graph.nodes]]
name = "biomeos"
binary = "biomeos_primal"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "ecosystem"
capabilities = ["capability.call", "capability.discover", "capability.list", "graph.execution"]

# Squirrel AI — provides inference + tools for the loop
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 4
required = true
depends_on = ["biomeos"]
health_method = "health"
by_capability = "ai"
capabilities = ["ai.query", "tool.execute", "tool.list", "context.create", "discovery.peers"]

# petalTongue UI — renders state, captures intent
[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 5
required = true
depends_on = ["biomeos"]
health_method = "health"
by_capability = "visualization"
capabilities = ["visualization.render.dashboard", "visualization.render.grammar", "interaction.subscribe"]
