#
# primalSpring negative validation graph for BearDog crypto and genetic operations.
# Validates that rejection paths work correctly — wrong keys, wrong seeds,
# tampered ciphertext, and cross-family isolation all produce failures.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/crypto_negative_validate.toml

[graph]
name = "crypto_negative_validate"
description = "Validates rejection paths: wrong-seed lineage, tampered ciphertext, empty seed rejection"
version = "0.1.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
bond_type = "validation"
trust_model = "genetic_lineage"
negative_tests = true
composition_model = "validation"
fragments = ["tower_atomic"]

# --- Phase 1: Tower Health ---

[graph.bonding_policy]
bond_type = "Ionic"
trust_model = "MethodGate"

[graph.nodes.operation]
method = "genetic.generate_lineage_proof"

[graph.nodes.operation.params]
our_family_id = "family-alpha"
peer_family_id = "family-beta"
lineage_seed = "${LINEAGE_SEED_B64}"

[graph.nodes.operation]
method = "genetic.verify_lineage"
expect = "valid"

[graph.nodes.operation.params]
our_family_id = "family-alpha"
peer_family_id = "family-beta"
lineage_proof = "${generate_lineage_proof.proof}"
lineage_seed = "${LINEAGE_SEED_B64}"

# --- Phase 3: Negative — Wrong Seed Rejected ---

[graph.nodes.operation]
method = "genetic.verify_lineage"
expect = "invalid"

[graph.nodes.operation.params]
our_family_id = "family-alpha"
peer_family_id = "family-beta"
lineage_proof = "${generate_lineage_proof.proof}"
lineage_seed = "${WRONG_LINEAGE_SEED_B64}"

# --- Phase 4: Negative — Empty Seed Rejected ---

[graph.nodes.operation]
method = "genetic.derive_lineage_beacon_key"
expect = "error"

[graph.nodes.operation.params]
lineage_seed = ""

# --- Phase 5: Beacon Encrypt-Decrypt Round-Trip ---

[graph.nodes.operation]
method = "birdsong.generate_encrypted_beacon"

[graph.nodes.operation.params]
node_id = "negative-test-node"
capabilities = ["crypto", "validation"]

[graph.nodes.operation]
method = "birdsong.decrypt_beacon"
expect = "success"

[graph.nodes.operation.params]
encrypted_beacon = "${beacon_generate_encrypt.encrypted_beacon}"

# --- Phase 6: Ed25519 Tamper Rejection ---

[graph.nodes.operation]
method = "crypto.sign_ed25519"

[graph.nodes.operation.params]
data = "primalSpring negative test payload"

[graph.nodes.operation]
method = "crypto.verify_ed25519"
expect = "invalid"

[graph.nodes.operation.params]
data = "TAMPERED payload — not the original"
signature = "${ed25519_sign.signature}"
public_key = "${ed25519_sign.public_key}"

# =============================================================================
# SUMMARY
#
# This graph validates that:
#   1. Correct lineage proof verifies (positive baseline)
#   2. Wrong lineage seed causes verification FAILURE (not silent pass)
#   3. Empty lineage seed is REJECTED by BearDog (not defaulted to zeros)
#   4. Same-family beacon decrypt works (positive baseline)
#   5. Ed25519 tampered payload is REJECTED
#
# These are the "dark side" tests that prove security boundaries exist.
# Without them, we only know the happy path works.
# =============================================================================
