#
# primalSpring validation graph for biomeOS `neuralspring_deploy`.
# Verifies Tower health, brings up neuralspring_primal for Hamiltonian/eigensolve/spectral
# work, then validates the spectral pipeline.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/neuralspring_validate.toml

[graph]
name = "neuralspring_validate"
description = "Validates neuralspring_deploy: Tower check, neuralspring primal, spectral pipeline"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"

[[graph.node]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.tower_health"]

[[graph.node]]
name = "verify_biomeos"
binary = "biomeos"
order = 2
required = true
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover"]

[[graph.node]]
name = "start_neuralspring"
binary = "neuralspring"
order = 3
required = true
depends_on = ["verify_biomeos"]
health_method = "health.liveness"
by_capability = "neural"
capabilities = [
    "neural.hamiltonian",
    "neural.eigensolve",
    "neural.spectral",
]

[[graph.node]]
name = "validate_provenance"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["start_neuralspring"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.provenance_health"]

[[graph.node]]
name = "validate_neuralspring"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["validate_provenance"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_composition"]
