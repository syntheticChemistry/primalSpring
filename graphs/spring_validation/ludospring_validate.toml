#
# primalSpring validation graph for ludoSpring V32 deployment.
# Verifies biomeOS substrate, Tower health, brings up ludospring_primal
# for game science (flow, DDA, engagement, WFC, Fitts, GPU dispatch),
# then validates the composition and game method surface.
#
# ludoSpring V32: 8 game.* methods, tolerances centralized, zero eprintln
# patterns, exp030 rewritten to ValidationHarness. esotericWebb V6 owns
# its own flow/DDA/engagement locally — ludoSpring provides supplemental
# WFC/Fitts/accessibility + GPU compute via toadStool delegation.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/ludospring_validate.toml

[graph]
name = "ludospring_validate"
description = "Validates ludoSpring V32 deployment: biomeOS substrate, Tower, game science surface, GPU delegation"
version = "0.2.0"
coordination = "sequential"

[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "health.liveness"]

[[graph.node]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = [
    "composition.tower_health",
]

[[graph.node]]
name = "start_ludospring"
binary = "ludospring"
order = 2
required = true
depends_on = ["verify_tower"]
health_method = "health.check"
by_capability = "game"
capabilities = [
    "game.evaluate_flow",
    "game.fitts_cost",
    "game.engagement",
    "game.difficulty_adjustment",
    "game.wfc_step",
    "game.generate_noise",
    "game.analyze_ui",
    "game.accessibility",
]

[[graph.node]]
name = "validate_game_surface"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["start_ludospring"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = [
    "coordination.validate_composition",
]
