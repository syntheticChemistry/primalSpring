#
# primalSpring validation graph for biomeOS `healthspring_deploy`.
# Verifies Tower health, brings up healthspring_primal for pharmacology/genomics/clinical
# workflows, then validates the niche workflow.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/healthspring_validate.toml

[graph]
name = "healthspring_validate"
description = "Validates healthspring_deploy: Tower check, healthspring primal, niche workflow"
version = "0.1.0"
coordination = "sequential"

[[graph.node]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = [
    "composition.tower_health",
]

[[graph.node]]
name = "start_biomeos"
binary = "biomeos"
order = 2
required = true
depends_on = ["verify_tower"]
health_method = "capability.list"
by_capability = "ecosystem"
capabilities = ["graph.execution", "ecosystem.coordination"]

[[graph.node]]
name = "start_healthspring"
binary = "healthspring_primal"
order = 3
required = true
depends_on = ["start_biomeos"]
health_method = "health.check"
by_capability = "health"
capabilities = [
    "health.pharmacology",
    "health.genomics",
    "health.clinical",
]

[[graph.node]]
name = "validate_niche"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["start_healthspring"]
health_method = "health.check"
by_capability = "health"
capabilities = [
    "coordination.validate_niche",
]
