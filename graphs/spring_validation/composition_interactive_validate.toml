# SPDX-License-Identifier: AGPL-3.0-or-later
#
# primalSpring validation: C7 Full Product Readiness
#
# Validates the complete primal stack is ready for the full interactive
# product composition. Does NOT require downstream (esotericWebb) or
# parallel (ludoSpring) binaries — those systems validate themselves.
#
# primalSpring owns and validates:
#   1. biomeOS substrate alive and routing
#   2. Tower health (BearDog + Songbird)
#   3. C1: Render — petalTongue dashboard render + export
#   4. C2: Narration — Squirrel ai.query (optional)
#   5. C5: Persistence — NestGate store/retrieve (optional)
#   6. C6: Proprioception — petalTongue subscribe/poll
#   7. biomeOS capability routing across all owned domains
#
# C3 (session) and C4 (game science) readiness are validated by
# confirming the substrate can route those domains — actual surface
# validation is owned by esotericWebb and ludoSpring respectively.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/composition_interactive_validate.toml

[graph]
name = "composition_product_readiness_validate"
description = "Validates C7: full primal-layer readiness — substrate, Tower, owned overlays, capability routing"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic"]

# ── Phase 0: Substrate ──────────────────────────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "capability.list", "graph.list"]

# ── Phase 1: Tower ──────────────────────────────────────────────────
[[graph.nodes]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.tower_health"]

# ── Phase 2: C1 Render (owned primal) ──────────────────────────────
[[graph.nodes]]
name = "verify_render"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_render_subsystem"]
[graph.node.checks]
methods = ["visualization.render.dashboard", "visualization.export"]
target = "petaltongue"
expect = "dashboard stored, SVG exported"

# ── Phase 3: C2 Narration (owned primal) ───────────────────────────
[[graph.nodes]]
name = "verify_narration"
binary = "primalspring_primal"
order = 3
required = false
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_narration_subsystem"]
[graph.node.checks]
method = "ai.query"
target = "squirrel"
expect = "prose response"

# ── Phase 4: C5 Persistence (owned primal) ─────────────────────────
[[graph.nodes]]
name = "verify_persistence"
binary = "primalspring_primal"
order = 4
required = false
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_persistence_subsystem"]
[graph.node.checks]
methods = ["storage.store", "storage.retrieve"]
target = "nestgate"
expect = "round-trip"

# ── Phase 5: C6 Proprioception (owned primal) ──────────────────────
[[graph.nodes]]
name = "verify_proprioception"
binary = "primalspring_primal"
order = 5
required = false
spawn = false
depends_on = ["verify_render"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_proprioception_subsystem"]
[graph.node.checks]
methods = ["interaction.subscribe", "interaction.poll"]
target = "petaltongue"
expect = "subscriber_id, events array"

# ── Phase 6: Capability routing (substrate readiness) ───────────────
[[graph.nodes]]
name = "verify_capability_routing"
binary = "primalspring_primal"
order = 6
required = true
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_capability_routing"]
[graph.node.checks]
method = "capability.list"
target = "biomeos"
expect = "all owned capability domains registered and routable"
