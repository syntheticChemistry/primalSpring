# SPDX-License-Identifier: AGPL-3.0-or-later
#
# primalSpring validation graph for biomeOS v2.78 federation manifest deployment.
# Validates the gate-level federation lifecycle: configure, join, health_check.
#
# biomeOS v2.78 implements topology validation (acyclic trust graph), per-gate
# JSON-RPC federation.configure + federation.join, and cross-gate health checks.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/federation_manifest_validate.toml \
#     --env FAMILY_ID=test-family \
#     --env FEDERATION_NAME=test-federation \
#     --env GATE_ID=gate-primary

[graph]
name = "federation_manifest_validate"
description = "Validates biomeOS federation manifest deployment: configure, join, cross-gate health"
version = "0.1.0"
coordination = "sequential"

[graph.metadata]
bond_type = "validation"
requires_biomeos = ">=2.78"
federation = true

# --- Phase 1: Neural API Health ---

[[graph.nodes]]
name = "verify_neural_api"
binary = "biomeos"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["federation.configure", "federation.join", "federation.health_check"]

# --- Phase 2: BearDog Crypto Health (federation uses family_id trust) ---

[[graph.nodes]]
name = "verify_beardog"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.generate_keypair"]

# --- Phase 3: Configure Gate for Federation ---

[[graph.nodes]]
name = "configure_gate"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["verify_neural_api", "verify_beardog"]
by_capability = "orchestration"
capabilities = ["federation.configure"]

[graph.node.operation]
method = "federation.configure"

[graph.node.operation.params]
federation = { name = "${FEDERATION_NAME}", family_id = "${FAMILY_ID}" }
gate = { id = "${GATE_ID}", endpoint = "unix://${NEURAL_API_SOCKET}", roles = ["primary"] }
peers = []
trust = { model = "genetic_lineage" }
force = false

# --- Phase 4: Join Gate to Federation ---

[[graph.nodes]]
name = "join_gate"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["configure_gate"]
by_capability = "orchestration"
capabilities = ["federation.join"]

[graph.node.operation]
method = "federation.join"

[graph.node.operation.params]
federation = { name = "${FEDERATION_NAME}", family_id = "${FAMILY_ID}" }
gate_id = "${GATE_ID}"
trust_peers = []
peers = []
force = false

# --- Phase 5: Federation Health Check ---

[[graph.nodes]]
name = "federation_health"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["join_gate"]
by_capability = "orchestration"
capabilities = ["federation.health_check"]

[graph.node.operation]
method = "federation.health_check"

[graph.node.operation.params]
federation_name = "${FEDERATION_NAME}"
family_id = "${FAMILY_ID}"
expected_gate_ids = ["${GATE_ID}"]

# --- Phase 6: Post-Federation Topology Verification ---

[[graph.nodes]]
name = "verify_topology"
binary = "primalspring_primal"
order = 6
required = false
spawn = false
depends_on = ["federation_health"]
by_capability = "orchestration"
capabilities = ["topology.get"]

[graph.node.operation]
method = "topology.get"

# =============================================================================
# SUMMARY
#
# This graph validates the biomeOS v2.78 federation manifest deployment:
#   1. Neural API is healthy and supports federation operations
#   2. BearDog crypto is available (federation uses genetic lineage trust)
#   3. federation.configure — set up a gate with federation parameters
#   4. federation.join — join the gate to the federation
#   5. federation.health_check — verify all expected gates are reachable
#   6. topology.get — confirm the topology reflects the federation
#
# The federation manifest flow exercises:
#   - YAML manifest parsing and topology validation (acyclic trust graph)
#   - Per-gate JSON-RPC federation.configure with trust model
#   - Per-gate JSON-RPC federation.join with peer list
#   - Cross-gate health check with expected_gate_ids
# =============================================================================
