#
# primalSpring validation: C2 Narration Composition (Squirrel AI standalone)
#
# Absorbs compositions/narration_ai.toml — the standalone composition is now
# part of this validation graph. The composition's 2-node structure (biomeOS +
# Squirrel) is the system-under-test for the probe nodes below.
#
# Validates the isolated AI narration subsystem:
#   1. biomeOS substrate alive
#   2. Squirrel liveness and capability registration
#   3. ai.query returns prose from backend
#   4. ai.list_providers shows available backend(s)
#   5. context.create / context.summarize for session context
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/composition_narration_validate.toml

[graph]
name = "composition_narration_validate"
description = "Validates C2: Squirrel AI narration — query, providers, context management"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["meta_tier"]
absorbed = ["compositions/narration_ai.toml"]

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "graph.list"]

[[graph.nodes]]
name = "verify_squirrel_alive"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_squirrel_liveness"]
[graph.node.checks]
method = "health.liveness"
target = "squirrel"
expect = "ok"

[[graph.nodes]]
name = "verify_ai_query"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_squirrel_alive"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_ai_query"]
[graph.node.checks]
method = "ai.query"
target = "squirrel"
expect = "non_empty_response"

[[graph.nodes]]
name = "verify_providers"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["verify_ai_query"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_ai_providers"]
[graph.node.checks]
method = "ai.list_providers"
target = "squirrel"
expect = "provider_count >= 1"

[[graph.nodes]]
name = "verify_context_lifecycle"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["verify_providers"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_context_lifecycle"]
[graph.node.checks]
methods = ["context.create", "context.summarize"]
target = "squirrel"
expect = "context_id returned, summary non-empty"
