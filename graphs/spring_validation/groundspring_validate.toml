#
# primalSpring validation graph for biomeOS `groundspring_deploy`.
# Verifies Tower health, brings up groundspring_primal with measurement
# capabilities, then validates end-to-end health via capability routing.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/groundspring_validate.toml

[graph]
name = "groundspring_validate"
description = "Validates groundspring_deploy: Tower check, groundspring primal, routed health"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"

[[graph.nodes]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.tower_health"]

[[graph.nodes]]
name = "verify_biomeos"
binary = "biomeos"
order = 2
required = true
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover"]

[[graph.nodes]]
name = "start_groundspring"
binary = "groundspring"
order = 3
required = true
depends_on = ["verify_biomeos"]
health_method = "health.liveness"
by_capability = "measurement"
capabilities = [
    "measurement.sense",
    "measurement.inverse",
    "measurement.temporal",
]

[[graph.nodes]]
name = "validate_provenance"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["start_groundspring"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.provenance_health"]

[[graph.nodes]]
name = "validate_groundspring"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["validate_provenance"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_composition"]
