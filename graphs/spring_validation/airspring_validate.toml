#
# primalSpring validation graph for biomeOS `airspring_deploy`.
# Verifies Tower health, brings up airspring_primal for weather/ET₀/water-balance
# ecology work, then validates the ecology pipeline.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/airspring_validate.toml

[graph]
name = "airspring_validate"
description = "Validates airspring_deploy: Tower check, airspring primal, ecology pipeline"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"

[[graph.nodes]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.tower_health"]

[[graph.nodes]]
name = "verify_biomeos"
binary = "biomeos"
order = 2
required = true
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover"]

[[graph.nodes]]
name = "start_airspring"
binary = "airspring_primal"
order = 3
required = true
depends_on = ["verify_biomeos"]
health_method = "health.liveness"
by_capability = "ecology"
capabilities = [
    "ecology.weather",
    "ecology.et0",
    "ecology.water_balance",
]

[[graph.nodes]]
name = "validate_provenance"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["start_airspring"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.provenance_health"]

[[graph.nodes]]
name = "validate_airspring"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["validate_provenance"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_composition"]
