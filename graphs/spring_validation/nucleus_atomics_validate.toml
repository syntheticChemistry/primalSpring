# SPDX-License-Identifier: AGPL-3.0-or-later
#
# primalSpring validation graph for NUCLEUS atomic compositions.
# Validates all 4 tiers (Tower, Node, Nest, Full) via composition health
# endpoints. Each tier is validated capability-first through the
# coordination primal's composition.* methods.
#
# Requires a Full NUCLEUS to be running (all 5 core primals + primalSpring).
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/nucleus_atomics_validate.toml

[graph]
name = "nucleus_atomics_validate"
description = "Validates all 4 NUCLEUS atomic tiers: Tower, Node, Nest, Full"
version = "0.1.0"
coordination = "sequential"

# --- Phase 1: Verify biomeOS Neural API substrate ---

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
bond_type = "validation"
requires_biomeos = ">=2.78"
composition_model = "validation"
fragments = ["tower_atomic"]

[[graph.nodes]]
name = "verify_biomeos"
binary = "biomeos"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "graph.status", "graph.rollback", "capability.discover", "capability.route"]

# --- Phase 2: Verify primalSpring is running ---

[[graph.nodes]]
name = "verify_primalspring"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_biomeos"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.tower_health", "composition.node_health", "composition.nest_health", "composition.nucleus_health"]

# --- Phase 3: Tower Atomic (security + discovery) ---

[[graph.nodes]]
name = "validate_tower"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["verify_primalspring"]
by_capability = "coordination"
capabilities = ["composition.tower_health"]

[graph.node.operation]
method = "composition.tower_health"
expect = "healthy"

# --- Phase 4: Node Atomic (Tower + compute) ---

[[graph.nodes]]
name = "validate_node"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["validate_tower"]
by_capability = "coordination"
capabilities = ["composition.node_health"]

[graph.node.operation]
method = "composition.node_health"
expect = "healthy"

# --- Phase 5: Nest Atomic (Tower + storage + AI bridge) ---

[[graph.nodes]]
name = "validate_nest"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["validate_tower"]
by_capability = "coordination"
capabilities = ["composition.nest_health"]

[graph.node.operation]
method = "composition.nest_health"
expect = "healthy"

# --- Phase 6: Full NUCLEUS (all capabilities) ---

[[graph.nodes]]
name = "validate_full_nucleus"
binary = "primalspring_primal"
order = 6
required = true
spawn = false
depends_on = ["validate_node", "validate_nest"]
by_capability = "coordination"
capabilities = ["composition.nucleus_health"]

[graph.node.operation]
method = "composition.nucleus_health"
expect = "healthy"

# --- Phase 7: Tower + Squirrel overlay ---

[[graph.nodes]]
name = "validate_tower_squirrel"
binary = "primalspring_primal"
order = 7
required = false
spawn = false
depends_on = ["validate_tower"]
by_capability = "coordination"
capabilities = ["composition.tower_squirrel_health"]

[graph.node.operation]
method = "composition.tower_squirrel_health"

# --- Phase 8: Graph structural validation ---

[[graph.nodes]]
name = "validate_atomic_graphs"
binary = "primalspring_primal"
order = 8
required = true
spawn = false
depends_on = ["verify_primalspring"]
by_capability = "coordination"
capabilities = ["graph.validate"]

[graph.node.operation]
method = "graph.validate"

[graph.node.operation.params]
graphs = ["tower_atomic_bootstrap", "node_atomic_compute", "nest_deploy", "nucleus_complete"]
mode = "structure"

# =============================================================================
# SUMMARY
#
# This graph validates all NUCLEUS atomic deployment tiers:
#   1. biomeOS Neural API substrate is healthy and provides orchestration
#   2. primalSpring is running and healthy
#   3. Tower (beardog + songbird) — security + discovery foundation
#   4. Node (Tower + toadstool) — adds compute dispatch
#   5. Nest (Tower + nestgate + squirrel) — adds storage + AI bridge
#   6. Full NUCLEUS (all 5 core primals) — complete ecosystem
#   7. Tower + Squirrel overlay (optional) — AI bridge without storage
#   8. Structural validation of all 4 canonical atomic deploy graphs
#
# Composition tiers align with biomeOS v2.78 NucleusMode:
#   Tower:  [beardog, songbird]
#   Node:   [beardog, songbird, toadstool]
#   Nest:   [beardog, songbird, nestgate, squirrel]
#   Full:   [beardog, songbird, nestgate, toadstool, squirrel]
# =============================================================================
