# SPDX-License-Identifier: AGPL-3.0-or-later
#
# primalSpring validation graph for NUCLEUS atomic compositions.
# Validates the 3 atomics + full NUCLEUS via composition health endpoints.
# Each tier is validated capability-first through coordination primal methods.
#
# Atomic model (Phase 31):
#   Tower (electron):  BearDog + Songbird
#   Node  (proton):    Tower + ToadStool + barraCuda + coralReef
#   Nest  (neutron):   Tower + NestGate + rhizoCrypt + loamSpine + sweetGrass
#   NUCLEUS (atom):    Tower + Node + Nest (9 core primals)
#   Meta-tier:         biomeOS + Squirrel + petalTongue (cross-atomic)
#
# Requires NUCLEUS + meta-tier to be running (9 core + meta + primalSpring).
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/nucleus_atomics_validate.toml

[graph]
name = "nucleus_atomics_validate"
description = "Validates NUCLEUS atomics: Tower (electron), Node (proton), Nest (neutron), Full NUCLEUS (atom) — 19/19 exp094 aligned"
version = "0.3.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
bond_type = "validation"
requires_biomeos = ">=2.78"
composition_model = "validation"
fragments = ["tower_atomic", "node_atomic", "nest_atomic", "nucleus", "meta_tier"]

# --- Phase 1: Verify biomeOS Neural API substrate ---

[[graph.nodes]]
name = "verify_biomeos"
binary = "biomeos"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "graph.status", "graph.rollback", "capability.discover", "capability.route"]

# --- Phase 2: Verify primalSpring is running ---

[[graph.nodes]]
name = "verify_primalspring"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_biomeos"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.tower_health", "composition.node_health", "composition.nest_health", "composition.nucleus_health"]

# --- Phase 3: Tower Atomic (security + discovery) ---

[[graph.nodes]]
name = "validate_tower"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["verify_primalspring"]
by_capability = "coordination"
capabilities = ["composition.tower_health"]

[graph.nodes.operation]
method = "composition.tower_health"
expect = "healthy"

# --- Phase 4: Node Atomic (Tower + compute) ---

[[graph.nodes]]
name = "validate_node"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["validate_tower"]
by_capability = "coordination"
capabilities = ["composition.node_health"]

[graph.nodes.operation]
method = "composition.node_health"
expect = "healthy"

# --- Phase 5: Nest Atomic (Tower + NestGate + provenance trio) ---

[[graph.nodes]]
name = "validate_nest"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["validate_tower"]
by_capability = "coordination"
capabilities = ["composition.nest_health"]

[graph.nodes.operation]
method = "composition.nest_health"
expect = "healthy"

# --- Phase 6: Full NUCLEUS (all capabilities) ---

[[graph.nodes]]
name = "validate_full_nucleus"
binary = "primalspring_primal"
order = 6
required = true
spawn = false
depends_on = ["validate_node", "validate_nest"]
by_capability = "coordination"
capabilities = ["composition.nucleus_health"]

[graph.nodes.operation]
method = "composition.nucleus_health"
expect = "healthy"

# --- Phase 7: Tower + Squirrel overlay ---

[[graph.nodes]]
name = "validate_tower_squirrel"
binary = "primalspring_primal"
order = 7
required = false
spawn = false
depends_on = ["validate_tower"]
by_capability = "coordination"
capabilities = ["composition.tower_squirrel_health"]

[graph.nodes.operation]
method = "composition.tower_squirrel_health"

# --- Phase 8: Graph structural validation ---

[[graph.nodes]]
name = "validate_atomic_graphs"
binary = "primalspring_primal"
order = 8
required = true
spawn = false
depends_on = ["verify_primalspring"]
by_capability = "coordination"
capabilities = ["graph.validate"]

[graph.nodes.operation]
method = "graph.validate"

[graph.nodes.operation.params]
graphs = ["profiles/tower", "profiles/node", "profiles/nest", "profiles/nucleus", "nucleus_complete"]
mode = "structure"

# =============================================================================
# SUMMARY — aligned with exp094 19/19 PASS (April 13, 2026)
#
# This graph validates NUCLEUS atomic deployment tiers:
#   1. biomeOS Neural API substrate is healthy and provides orchestration
#   2. primalSpring is running and healthy
#   3. Tower (beardog + songbird) — electron: security + discovery
#   4. Node (Tower + toadstool + barracuda + coralreef) — proton: compute
#   5. Nest (Tower + nestgate + rhizocrypt + loamspine + sweetgrass) — neutron: storage + provenance
#   6. Full NUCLEUS (Tower + Node + Nest = 9 core primals) — the atom
#   7. Tower + Squirrel overlay (optional) — meta-tier AI at Tower level
#   8. Structural validation of canonical atomic profiles + nucleus_complete
#
# exp094 checks (19/19 PASS):
#   Tower:   beardog_alive, songbird_alive, crypto_hash_nonempty,
#            crypto_hash_base64_valid, crypto_hash_deterministic,
#            resolve_security, resolve_compute, resolve_storage,
#            songbird_method_catalog
#   Node:    tensor_stats_mean, shader_supported_archs, shader_wgsl_supported,
#            compute_dispatch_alive
#   Nest:    storage_roundtrip_match, dag_alive, ledger_alive, attribution_alive
#   NUCLEUS: cross_tower_hash, cross_nest_roundtrip
#
# Wire methods validated (schemas confirmed April 13, 2026):
#   BearDog:    crypto.hash {data: base64, algorithm: "blake3"} -> {hash: base64(44)}, deterministic
#   Songbird:   ipc.resolve {capability: str} -> {native_endpoint, virtual_endpoint}
#                ipc.register {primal_id, capabilities[], endpoint} (Phase 5 seeding)
#                ipc.list -> {services[]} (18 capabilities across 10 primals)
#   barraCuda:  stats.mean {data: [f64]} -> {result: f64} (JSON-RPC via BTSP guard)
#                tensor.create {shape, data} -> {tensor_id: str}
#                noise.perlin2d {x, y} -> {result: f64}
#   coralReef:  shader.compile.capabilities -> {supported_archs: [11 archs]}
#   ToadStool:  compute.capabilities -> {compute_units, available_resources} (BTSP auto-detect)
#   NestGate:   storage.store {key, value}, storage.retrieve {key} -> {value}, storage.delete
#   rhizoCrypt: dag.session.create {label} -> UUID, dag.event.append {session_id, event_type: {Variant:{}}, payload}
#                dag.merkle.root {session_id} -> hex hash
#   loamSpine:  spine.create {name, owner} -> {spine_id: UUID, genesis_hash}
#                health.check {include_details: bool}
#   sweetGrass: braid.create {data_hash, agent, mime_type, size} -> {@id: urn:braid:...}
#
# NUCLEUS atomics:
#   Tower:    [beardog, songbird]
#   Node:     [beardog, songbird, toadstool, barracuda, coralreef]
#   Nest:     [beardog, songbird, nestgate, rhizocrypt, loamspine, sweetgrass]
#   NUCLEUS:  Tower + Node + Nest (9 unique primals)
#   Meta-tier: [biomeos, squirrel, petaltongue] — cross-atomic, any level
#
# Songbird ipc.resolve capability mapping (primal self-reported -> graph by_capability):
#   security, crypto, btsp, ed25519, x25519 -> beardog
#   discovery -> songbird
#   compute, hardware -> toadstool
#   tensor, math, gpu_compute -> barracuda
#   shader -> coralreef
#   storage -> nestgate
#   dag, provenance -> rhizocrypt
#   spine, merkle -> loamspine (graph uses "ledger" — not self-reported)
#   commit, braid -> sweetgrass (graph uses "attribution" — not self-reported)
#   ai, inference -> squirrel
# =============================================================================
