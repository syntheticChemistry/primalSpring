#
# primalSpring validation: C4 Game Science Readiness
#
# Validates that the primal layer is ready to support a game science
# composition. ludoSpring is a parallel peer and owns its own game.*
# surface validation — primalSpring validates substrate readiness.
#
# Checks:
#   1. biomeOS substrate alive
#   2. Tower health (BearDog + Songbird)
#   3. biomeOS capability routing is functional
#   4. game.* domain discoverable (if ludoSpring is registered)
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/composition_game_science_validate.toml

[graph]
name = "composition_game_science_readiness_validate"
description = "Validates C4: primal-layer readiness for game science — substrate, Tower, capability routing"
version = "2.0.0"
coordination = "sequential"

[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "capability.list", "graph.list"]

[[graph.node]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.tower_health"]

[[graph.node]]
name = "verify_capability_routing"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_capability_routing"]
[graph.node.checks]
method = "capability.list"
target = "biomeos"
expect = "capability routing functional"

[[graph.node]]
name = "verify_game_domain_routable"
binary = "primalspring_primal"
order = 3
required = false
spawn = false
depends_on = ["verify_capability_routing"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_game_domain"]
[graph.node.checks]
method = "capability.discover"
target = "biomeos"
params = { domain = "game" }
expect = "game domain registered (requires ludoSpring running)"
