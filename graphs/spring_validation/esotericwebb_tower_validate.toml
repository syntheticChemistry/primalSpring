# SPDX-License-Identifier: AGPL-3.0-or-later
#
# primalSpring validation: esotericWebb Tower composition.
#
# Validates the minimum viable Webb product deployed as an ecoPrimals
# composition via biomeOS. Probes biomeOS substrate, Tower primals,
# then verifies esotericWebb's narrative surface is responsive.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/esotericwebb_tower_validate.toml

[graph]
name = "esotericwebb_tower_validate"
description = "Validates esotericWebb V6 Tower composition: biomeOS substrate, Tower health, Webb narrative surface"
version = "1.0.0"
coordination = "sequential"

[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

[[graph.node]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.tower_health"]

[[graph.node]]
name = "verify_esotericwebb"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = [
    "coordination.validate_narrative_surface",
]

[[graph.node]]
name = "verify_capability_routing"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["verify_esotericwebb"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = [
    "coordination.validate_composition",
]
