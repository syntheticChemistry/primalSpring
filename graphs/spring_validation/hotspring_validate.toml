# SPDX-License-Identifier: AGPL-3.0-or-later
#
# primalSpring validation graph for biomeOS `hotspring_deploy`.
# Verifies Tower health, brings up hotspring_primal for thermal/fluid/radiation physics,
# then validates integrated health for the hot stack.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/hotspring_validate.toml

[graph]
name = "hotspring_validate"
description = "Validates hotspring_deploy: Tower check, hotspring primal, health validation"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"

[[graph.nodes]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.tower_health"]

[[graph.nodes]]
name = "verify_biomeos"
binary = "biomeos"
order = 2
required = true
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover"]

[[graph.nodes]]
name = "start_hotspring"
binary = "hotspring_primal"
order = 3
required = true
depends_on = ["verify_biomeos"]
health_method = "health.liveness"
by_capability = "physics"
capabilities = [
    "physics.thermal",
    "physics.fluid",
    "physics.radiation",
]

[[graph.nodes]]
name = "validate_provenance"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["start_hotspring"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.provenance_health"]

[[graph.nodes]]
name = "validate_hotspring"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["validate_provenance"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_composition"]
