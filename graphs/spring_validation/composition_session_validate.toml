# SPDX-License-Identifier: AGPL-3.0-or-later
#
# primalSpring validation: C3 Session Composition (esotericWebb standalone)
#
# Validates the isolated session/narrative subsystem:
#   1. biomeOS substrate alive
#   2. Tower health (BearDog + Songbird)
#   3. esotericWebb liveness via webb.liveness
#   4. Full session lifecycle: start → state → actions → act → graph
#   5. Scene format correctness (for petalTongue interop)
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/composition_session_validate.toml

[graph]
name = "composition_session_validate"
description = "Validates C3: esotericWebb session — lifecycle, state, actions, narrative graph"
version = "1.0.0"
coordination = "sequential"

[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "graph.list"]

[[graph.node]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.tower_health"]

[[graph.node]]
name = "verify_webb_liveness"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_webb_liveness"]
[graph.node.checks]
method = "webb.liveness"
target = "esotericwebb"
expect = "ok"

[[graph.node]]
name = "verify_session_lifecycle"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["verify_webb_liveness"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_session_lifecycle"]
[graph.node.checks]
methods = ["session.start", "session.state", "session.actions", "session.act"]
target = "esotericwebb"
expect = "session_id returned, state has turn/trust, actions non-empty, act advances turn"

[[graph.node]]
name = "verify_narrative_graph"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["verify_session_lifecycle"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_narrative_graph"]
[graph.node.checks]
method = "session.graph"
target = "esotericwebb"
expect = "dot_format_graph"

[[graph.node]]
name = "verify_scene_format"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["verify_narrative_graph"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_scene_format"]
[graph.node.checks]
method = "webb.scene.current"
target = "esotericwebb"
expect = "has node, description, npcs fields"
