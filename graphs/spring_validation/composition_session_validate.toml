#
# primalSpring validation: C3 Session Readiness
#
# Validates that the primal layer is ready to support a session/narrative
# composition. esotericWebb is downstream and owns its own session
# validation — primalSpring validates substrate readiness.
#
# Checks:
#   1. biomeOS substrate alive
#   2. Tower health (BearDog + Songbird)
#   3. biomeOS capability routing is functional
#   4. narrative/session domain discoverable (if esotericWebb is registered)
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/composition_session_validate.toml

[graph]
name = "composition_session_readiness_validate"
description = "Validates C3: primal-layer readiness for session — substrate, Tower, capability routing"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "capability.list", "graph.list"]

[[graph.nodes]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.tower_health"]

[[graph.nodes]]
name = "verify_capability_routing"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_capability_routing"]
[graph.node.checks]
method = "capability.list"
target = "biomeos"
expect = "capability routing functional"

[[graph.nodes]]
name = "verify_narrative_domain_routable"
binary = "primalspring_primal"
order = 3
required = false
spawn = false
depends_on = ["verify_capability_routing"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_narrative_domain"]
[graph.node.checks]
method = "capability.discover"
target = "biomeos"
params = { domain = "narrative" }
expect = "narrative domain registered (requires esotericWebb running)"
