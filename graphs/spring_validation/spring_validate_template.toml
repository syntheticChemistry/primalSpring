#
# Spring Validation Template — parameterized skeleton
#
# All per-spring validation graphs follow this identical 5-node pattern.
# Rather than duplicating for each spring, this template defines the
# skeleton and spring_validate_manifest.toml lists the parameters.
#
# Skeleton:
#   1. verify_tower        — primalspring_primal checks Tower Atomic health
#   2. verify_biomeos      — biomeOS orchestration alive
#   3. start_{spring}      — spring binary launched, liveness checked
#   4. validate_provenance — provenance chain integrity
#   5. validate_{spring}   — full composition validation
#
# Parameters (from manifest):
#   {{spring_name}}    — e.g. "airspring", "hotspring"
#   {{spring_binary}}  — e.g. "airspring_primal", "hotspring_primal"
#   {{domain}}         — e.g. "ecology", "physics", "neural"
#   {{capabilities}}   — e.g. ["ecology.weather", "ecology.et0"]
#
# Usage:
#   biomeOS instantiates this template per spring using the manifest.
#   For manual testing, see the manifest for each spring's parameters.

[graph]
name = "{{spring_name}}_validate"
description = "Validates {{spring_name}}_deploy: Tower check, {{spring_binary}}, composition health"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-09"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
composition_model = "validation"
fragments = ["tower_atomic"]

[[graph.nodes]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.tower_health"]

[[graph.nodes]]
name = "verify_biomeos"
binary = "biomeos"
order = 2
required = true
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover"]

[[graph.nodes]]
name = "start_{{spring_name}}"
binary = "{{spring_binary}}"
order = 3
required = true
depends_on = ["verify_biomeos"]
health_method = "health.liveness"
by_capability = "{{domain}}"
capabilities = "{{capabilities}}"

[[graph.nodes]]
name = "validate_provenance"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["start_{{spring_name}}"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.provenance_health"]

[[graph.nodes]]
name = "validate_{{spring_name}}"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["validate_provenance"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_composition"]
