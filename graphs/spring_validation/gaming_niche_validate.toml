# SPDX-License-Identifier: AGPL-3.0-or-later
#
# primalSpring validation graph for the gaming niche composition.
#
# Validates the composition proven by ludoSpring: Tower + game science +
# visualization + optional compute. This is the bridge from "validated math"
# (spring guidestones) to "usable interactive system" (garden deployments).
#
# Composition (from biomeOS/graphs/gaming_niche_deploy.toml):
#   Phase 1: Tower Atomic (BearDog + Songbird) — security + discovery
#   Phase 2: Springs (ludoSpring + petalTongue, parallel) — game science + viz
#   Phase 3: Optional accelerators (ToadStool) — compute + display
#   Phase 4: Validation
#
# Requires: Tower + ludoSpring + petalTongue running. ToadStool optional.
#
# Usage:
#   biomeos deploy --graph graphs/spring_validation/gaming_niche_validate.toml

[graph]
name = "gaming_niche_validate"
description = "Validates gaming niche: Tower + ludoSpring (game) + petalTongue (viz) + optional toadStool (compute/display)"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic"]
niche = "gaming"
proven_by = "ludoSpring (exp033, exp067, exp072)"

# --- Phase 1: Tower Atomic ---

[[graph.nodes]]
name = "verify_tower_security"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.check"
by_capability = "security"
capabilities = ["crypto.hash", "crypto.sign"]

[[graph.nodes]]
name = "verify_tower_discovery"
binary = "songbird"
order = 1
required = true
spawn = false
health_method = "health.check"
by_capability = "discovery"
capabilities = ["discovery.find_primals"]

# --- Phase 2: Game Science (ludoSpring) ---

[[graph.nodes]]
name = "verify_ludospring"
binary = "ludospring"
order = 2
required = true
spawn = false
depends_on = ["verify_tower_security", "verify_tower_discovery"]
health_method = "health.check"
by_capability = "game"
capabilities = [
    "game.evaluate_flow",
    "game.fitts_cost",
    "game.engagement",
    "game.generate_noise",
    "game.wfc_step",
    "game.accessibility",
    "game.difficulty_adjustment",
    "game.analyze_ui",
    "game.begin_session",
    "game.complete_session",
    "game.session_state",
    "game.tick_health",
]

# --- Phase 2: Visualization (petalTongue) ---

[[graph.nodes]]
name = "verify_petaltongue"
binary = "petaltongue"
order = 2
required = true
spawn = false
depends_on = ["verify_tower_security", "verify_tower_discovery"]
health_method = "health.check"
by_capability = "visualization"
capabilities = [
    "visualization.render",
    "visualization.render.stream",
    "visualization.render.grammar",
    "visualization.render.dashboard",
    "visualization.render.scene",
    "visualization.capabilities",
]

# --- Phase 3: Optional Compute (toadStool) ---

[[graph.nodes]]
name = "verify_toadstool"
binary = "toadstool"
order = 3
required = false
spawn = false
depends_on = ["verify_tower_security", "verify_tower_discovery"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.health", "compute.execute"]

# --- Phase 4: Validate gaming niche composition ---

[[graph.nodes]]
name = "validate_gaming_niche"
binary = "primalspring_primal"
order = 4
required = true
spawn = false
depends_on = ["verify_ludospring", "verify_petaltongue"]
by_capability = "coordination"
capabilities = ["composition.gaming_niche_health"]

[graph.nodes.operation]
method = "composition.gaming_niche_health"
expect = "healthy"

# =============================================================================
# VALIDATION MATRIX — Gaming Niche
#
# Proven IPC flows (verified April 20, 2026):
#   ludoSpring game.evaluate_flow:      {challenge, skill} -> {state: "flow"}
#   ludoSpring game.fitts_cost:         {distance, target_width} -> {index_of_difficulty, movement_time_ms}
#   ludoSpring game.engagement:         {session_duration_s, action_count, ...} -> {composite, ...}
#   ludoSpring game.generate_noise:     {x, y} -> {value: f64}
#   petalTongue visualization.render.*: session-based grammar + dashboard + scene
#   petalTongue visualization.capabilities: {data_binding_variants, grammar_geometry_types}
#   toadStool compute.health:           {healthy, status, active_workloads}
#
# Composition parity (from ludoSpring):
#   exp033: 11/11 NUCLEUS pipeline validation
#   exp067: 18/19 tower composition (1 skip: health endpoint)
#   exp072: 30/31 composition integration (1 fail: biomeOS HTTP-on-UDS)
#   lib:    152/152 local math tests
#   deploy: 14/14 structural graph tests
#
# This graph is used by:
#   biomeOS/graphs/gaming_niche_deploy.toml (runtime execution)
#   gardens/esotericWebb/graphs/esotericwebb_full.toml (product composition)
# =============================================================================
