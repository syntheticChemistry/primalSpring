# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Cross-Spring ecology validation — biomeOS `cross_spring_ecology.toml`
#
# Exercises the ET₀ → diversity → spectral pipeline: Tower and biomeOS neural-api
# checks, then airSpring (weather/ET₀/water-balance/yield), wetSpring (diversity/
# sequence), and neuralSpring (spectral/eigensolve), ending with ecosystem
# coordination validation.
#
# Usage:
#   biomeos deploy --graph graphs/cross_spring/cross_spring_ecology_validate.toml

[graph]
name = "cross_spring_ecology_validate"
description = "Validates cross_spring_ecology: ET₀ → diversity → spectral (Tower, biomeOS, springs, coordination)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
composition_model = "validation"
fragments = ["tower_atomic"]

[graph.bonding_policy]
bond_type = "Ionic"
trust_model = "MethodGate"
[[graph.nodes]]
name = "airspring_ecology"
binary = "airspring_primal"
order = 3
required = true
health_method = "health.liveness"
by_capability = "ecology"
capabilities = [
    "ecology.weather",
    "ecology.et0",
    "ecology.water_balance",
    "ecology.yield_response",
]

[[graph.nodes]]
name = "wetspring_science"
binary = "wetspring"
order = 4
required = true
health_method = "health.liveness"
by_capability = "science"
capabilities = ["science.diversity", "science.sequence"]

[[graph.nodes]]
name = "neuralspring_spectral"
binary = "neuralspring_primal"
order = 5
required = true
health_method = "health.liveness"
by_capability = "neural"
capabilities = ["neural.spectral", "neural.eigensolve"]

