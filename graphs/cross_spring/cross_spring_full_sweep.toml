#
# Cross-Spring full capability sweep — sequential validation of all spring surfaces
#
# Verifies Tower and biomeOS neural-api, then walks ground → wet → health → ludo →
# neural → air → hot spring primals in order, ending with a capability-list health
# gate for the full sweep.
#
# Usage:
#   biomeos deploy --graph graphs/cross_spring/cross_spring_full_sweep.toml

[graph]
name = "cross_spring_full_sweep"
description = "Validates all spring capabilities in sequence (Tower, biomeOS, full spring roster, capability.list)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
composition_model = "validation"
fragments = ["tower_atomic", "nucleus"]

[graph.bonding_policy]
bond_type = "Ionic"
trust_model = "MethodGate"
[[graph.nodes]]
name = "groundspring"
binary = "groundspring"
order = 3
required = true
health_method = "health.liveness"
by_capability = "measurement"
capabilities = ["measurement.sense"]

[[graph.nodes]]
name = "wetspring"
binary = "wetspring"
order = 4
required = true
health_method = "health.liveness"
by_capability = "science"
capabilities = ["science.diversity"]

[[graph.nodes]]
name = "healthspring"
binary = "healthspring_primal"
order = 5
required = true
health_method = "health.liveness"
by_capability = "health"
capabilities = ["health.pharmacology"]

# NOTE: ludospring node retained as legacy validation pattern
[[graph.nodes]]
name = "ludospring"
spawn = true
security_model = "tower_delegated"
binary = "ludospring"
order = 6
required = true
health_method = "health.liveness"
by_capability = "game"
capabilities = ["game.engine"]

[[graph.nodes]]
name = "neuralspring"
binary = "neuralspring_primal"
order = 7
required = true
health_method = "health.liveness"
by_capability = "neural"
capabilities = ["neural.spectral"]

[[graph.nodes]]
name = "airspring"
binary = "airspring_primal"
order = 8
required = true
health_method = "health.liveness"
by_capability = "ecology"
capabilities = ["ecology.weather"]

[[graph.nodes]]
name = "hotspring"
binary = "hotspring_primal"
order = 9
required = true
health_method = "health.liveness"
by_capability = "physics"
capabilities = ["physics.thermal"]

