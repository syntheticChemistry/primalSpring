#
# BYOB Graph Template — Build Your Own Biome
#
# Copy this template to create a deployment graph for any new spring or garden.
# Replace ${SPRING_NAME}, ${SPRING_BINARY}, ${SPRING_DOMAIN}, and
# capability lists with your spring's values.
#
# IMPORTANT: Spring/garden binaries are NOT in plasmidBin. Only primal
# binaries go in plasmidBin. Your spring builds its own binary.
#
# Every spring graph follows this structure:
#   Phase 0: biomeOS Neural API (orchestration substrate, spawn = false)
#   Phase 1: Tower Atomic (BearDog + Songbird, spawn = false)
#   Phase 2: Optional NUCLEUS extensions (spawn = false — already running)
#   Phase 3: Provenance trio (spawn = false — already running)
#   Phase 4: Your spring (spawn = true — YOU build and own this binary)
#   Phase 5: Validation node
#
# NUCLEUS primals use spawn = false because they are already running.
# Your spring discovers them via biomeOS capability routing.
# The minimum viable graph is Tower + your spring.
#
# Security model:
#   Tower boundary (BearDog + Songbird) enforces BTSP.
#   Your spring traffic is same-host UDS behind the Tower boundary.
#   Your spring's security_model is "tower_delegated" (trusts Tower).
#
# Canonical references:
#   - Capability names: config/capability_registry.toml
#   - Wire types: wateringHole/ATTESTATION_ENCODING_STANDARD.md (WireWitnessRef)
#   - Binary names: plasmidBin/manifest.toml (primals only)
#   - Health method: always "health.liveness" (JSON-RPC standard)
#   - Proto-nucleate examples: graphs/downstream/
#
# Graduation checklist (sourDough compliance):
#   [ ] UniBin binary with server/status/version subcommands
#   [ ] JSON-RPC 2.0 over Unix socket (TCP is opt-in only)
#   [ ] health.liveness + health.readiness
#   [ ] identity.get + capabilities.list
#   [ ] Semantic method naming (domain.verb[.variant])
#   [ ] AGPL-3.0-or-later license
#   [ ] capability_registry.toml matching code
#   [ ] This deploy graph validates via primalSpring
#
# Usage:
#   biomeos deploy --graph graphs/${SPRING_NAME}_deploy.toml

[graph]
name = "${SPRING_NAME}_niche"
description = "${SPRING_NAME} BYOB deployment"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-10"
owner = "${SPRING_NAME}"
pattern = "proto_nucleate"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
composition_model = "nucleated"
fragments = ["tower_base"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

# ═══════════════════════════════════════════════════════════════
# Phase 0: biomeOS Neural API (spawn = false — already running)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

# ═══════════════════════════════════════════════════════════════
# Phase 1: Tower Atomic (spawn = false — already running)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.sign_ed25519",
    "crypto.verify_ed25519",
    "crypto.blake3_hash",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ═══════════════════════════════════════════════════════════════
# Phase 2: Optional NUCLEUS extensions (spawn = false)
