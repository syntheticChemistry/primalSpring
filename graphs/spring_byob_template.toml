#
# BYOB Graph Template — Build Your Own Biome
#
# Copy this template to create a deployment graph for any new spring.
# Replace ${SPRING_NAME}, ${SPRING_BINARY}, ${SPRING_DOMAIN}, and
# capability lists with your spring's values.
#
# Every spring graph follows this structure:
#   Phase 1: Tower Atomic (BearDog + Songbird) — always required
#   Phase 2: Optional extensions (ToadStool, NestGate, Squirrel, petalTongue)
#   Phase 3: Provenance trio (rhizoCrypt + loamSpine + sweetGrass) — optional
#   Phase 4: Your spring — depends on Tower, optionally others
#   Phase 5: Validation node
#
# The minimum viable BYOB graph is Tower + your spring.
# Add compute (ToadStool), storage (NestGate), AI (Squirrel),
# visualization (petalTongue), or provenance (trio) as needed.
#
# Canonical references:
#   - Capability names: config/capability_registry.toml
#   - Wire types: wateringHole/ATTESTATION_ENCODING_STANDARD.md (WireWitnessRef)
#   - Binary names: plasmidBin/manifest.toml
#   - Health method: always "health.liveness" (JSON-RPC standard)
#
# Graduation checklist (sourDough compliance):
#   [ ] UniBin binary with server/status/version subcommands
#   [ ] JSON-RPC 2.0 over Unix socket + optional TCP
#   [ ] health.liveness + health.readiness
#   [ ] identity.get + capabilities.list
#   [ ] Semantic method naming (domain.verb[.variant])
#   [ ] AGPL-3.0-or-later license
#   [ ] capability_registry.toml matching code
#   [ ] This deploy graph validates via primalSpring
#
# Usage:
#   biomeos deploy --graph graphs/${SPRING_NAME}_deploy.toml

[graph]
name = "${SPRING_NAME}_niche"
description = "${SPRING_NAME} BYOB deployment"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"

# ═══════════════════════════════════════════════════════════════
# Phase 1: Tower Atomic — always required
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = [
    "crypto.sign_ed25519",
    "crypto.verify_ed25519",
    "crypto.blake3_hash",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ═══════════════════════════════════════════════════════════════
# Phase 2: Optional extensions — uncomment what you need
# ═══════════════════════════════════════════════════════════════

