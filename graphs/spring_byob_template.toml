# ═══════════════════════════════════════════════════════════════
# Phase 4: Your spring (spawn = true — YOU own this binary)
#
# Your binary is NOT in plasmidBin. You build it in your own repo.
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "${SPRING_NAME}"
binary = "${SPRING_BINARY}"
order = 10
required = true
spawn = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "${SPRING_DOMAIN}"
security_model = "tower_delegated"
capabilities = [
    # Replace with your spring's capabilities:
    # "${SPRING_DOMAIN}.method_one",
    # "${SPRING_DOMAIN}.method_two",
]

# ═══════════════════════════════════════════════════════════════
# Phase 5: Validation (spawn = false — primalSpring coordination)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "validate_${SPRING_NAME}"
binary = "primalspring_primal"
spawn = false
order = 99
required = false
depends_on = ["${SPRING_NAME}"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["coordination.validate_composition"]
