#
# biomeOS Niche Deployment Graph — primalSpring coordination niche
#
# primalSpring deploys the FULL ecosystem to validate coordination.
# This graph brings up every primal in NUCLEUS order, then starts
# primalSpring itself as the coordination validator.
#
# Deploy order:
#   Tower Atomic (BearDog + Songbird) → Provenance Trio → NestGate →
#   ToadStool → Squirrel → primalSpring
#
# Usage:
#   biomeos deploy --graph graphs/primalspring_deploy.toml

[graph]
name = "primalspring_coordination_niche"
description = "Full primalSpring niche: NUCLEUS + Provenance Trio + primalSpring"
version = "0.2.0"

# ── Node 1: BearDog (crypto + identity) ─────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = [
    "crypto.identity",
    "crypto.verify",
    "crypto.sign",
    "crypto.encrypt",
    "crypto.keygen",
]

# ── Node 2: Songbird (network + sovereign TLS 1.3) ──────────────────
[[graph.nodes]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = [
    "net.http",
    "net.discovery",
    "network.tls_connect",
    "network.dns_resolve",
]

# ── Node 3: rhizoCrypt (ephemeral DAG sessions) ─────────────────────
[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt_primal"
order = 3
required = false
depends_on = ["beardog"]
health_method = "dag.health"
by_capability = "provenance"
capabilities = [
    "dag.session.create",
    "dag.event.append",
    "dag.dehydration.trigger",
    "dag.merkle.root",
]

# ── Node 4: loamSpine (immutable linear ledger) ─────────────────────
[[graph.nodes]]
name = "loamspine"
binary = "loamspine_primal"
order = 4
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "commit.health"
by_capability = "ledger"
capabilities = [
    "session.commit",
    "entry.append",
]

# ── Node 5: sweetGrass (semantic provenance braids) ──────────────────
[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass_primal"
order = 5
required = false
depends_on = ["beardog", "loamspine"]
health_method = "provenance.health"
by_capability = "attribution"
capabilities = [
    "provenance.create_braid",
    "provenance.lineage",
    "provenance.graph",
]

# ── Node 6: NestGate (content-addressed data storage) ────────────────
[[graph.nodes]]
name = "nestgate"
binary = "nestgate_primal"
order = 6
required = false
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "storage"
capabilities = [
    "storage.store",
    "storage.retrieve",
]

# ── Node 7: ToadStool (GPU/CPU compute dispatch) ────────────────────
[[graph.nodes]]
name = "toadstool"
binary = "toadstool_primal"
order = 7
required = false
depends_on = ["beardog", "songbird"]
health_method = "compute.health"
by_capability = "compute"
capabilities = [
    "compute.execute",
    "compute.submit",
    "compute.dispatch.submit",
]

# ── Node 8: Squirrel (AI coordination) ──────────────────────────────
[[graph.nodes]]
name = "squirrel"
binary = "squirrel_primal"
order = 8
required = false
depends_on = ["beardog", "songbird"]
health_method = "ai.health"
by_capability = "ai"
capabilities = [
    "ai.query",
    "ai.analyze",
    "ai.suggest",
]

# ── Node 9: primalSpring (coordination validator) ────────────────────
[[graph.nodes]]
name = "primalspring"
binary = "primalspring_primal"
order = 9
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.check"
by_capability = "coordination"
capabilities = [
    "coordination.deploy_atomic",
    "coordination.validate_composition",
    "coordination.bonding_test",
    "composition.nucleus_health",
    "nucleus.start",
    "nucleus.stop",
]
