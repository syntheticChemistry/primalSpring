# SPDX-License-Identifier: AGPL-3.0-or-later
#
# biomeOS Niche Deployment Graph — primalSpring coordination niche
#
# primalSpring deploys the FULL ecosystem to validate coordination.
# This graph brings up every primal in NUCLEUS order, then starts
# primalSpring itself as the coordination validator.
#
# Zero-Port Tower Atomic: all primals UDS-only, no TCP.
#
# Deploy order:
#   Phase 0: biomeOS
#   Phase 1: Tower Atomic (BearDog + Songbird)
#   Phase 2: Core Services (ToadStool + NestGate + Squirrel)
#   Phase 3: Provenance Trio (rhizoCrypt + loamSpine + sweetGrass)
#   Phase 4: Interface (petalTongue)
#   Phase 5: Coordination (primalSpring)
#
# Usage:
#   biomeos deploy --graph graphs/primalspring_deploy.toml

[graph]
name = "primalspring_coordination_niche"
description = "Full primalSpring niche: NUCLEUS + Provenance Trio + primalSpring"
version = "1.0.0"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "nucleated"
fragments = ["nucleus"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
tower_to_external = "ionic"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"
encryption_tiers.federation = "full"

# ── Phase 0: biomeOS (orchestration substrate) ────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = [
    "graph.deploy", "graph.status", "graph.rollback",
    "capability.discover", "capability.route",
]

# ── Phase 1: Tower Atomic (BTSP enforced) ─────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.identity", "crypto.verify", "crypto.sign",
    "crypto.encrypt", "crypto.keygen",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "net.http", "net.discovery",
    "network.tls_connect", "network.dns_resolve",
]

# ── Phase 2: Core Services (tower_delegated) ──────────────────────────
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = [
    "compute.execute", "compute.submit", "compute.dispatch.submit",
]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve"]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 5
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = ["ai.query", "ai.analyze", "ai.suggest"]

# ── Phase 3: Provenance Trio (tower_delegated) ────────────────────────
[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 6
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "provenance"
security_model = "tower_delegated"
capabilities = [
    "dag.session.create", "dag.event.append",
    "dag.dehydration.trigger", "dag.merkle.root",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 7
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["session.commit", "entry.append"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 8
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = [
    "provenance.create_braid", "provenance.lineage", "provenance.graph",
]

# ── Phase 4: Interface (tower_delegated) ──────────────────────────────
[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 9
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
args = ["server"]
capabilities = [
    "visualization.render.scene", "visualization.render.dashboard",
    "visualization.export",
]

# ── Phase 5: Coordination (tower_delegated) ───────────────────────────
[[graph.nodes]]
name = "primalspring"
binary = "primalspring_primal"
order = 10
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.check"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = [
    "coordination.deploy_atomic",
    "coordination.validate_composition",
    "coordination.bonding_test",
    "composition.nucleus_health",
    "nucleus.start", "nucleus.stop",
]
