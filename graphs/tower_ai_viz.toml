#
# Tower + AI + Visualization Overlay
#
# Extends Tower Atomic with Squirrel (AI) and petalTongue (visualization).
# For springs that need inference + rendering (e.g., neuralSpring dashboards).
#
# Usage:
#   biomeos deploy --graph graphs/tower_ai_viz.toml

[graph]
name = "tower_ai_viz"
description = "Tower Atomic + Squirrel AI + petalTongue visualization"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_preferred"
tcp_fallback = "tower_routed"
composition_model = "nucleated"
fragments = ["tower_atomic", "meta_tier"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.keygen", "crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["discovery.find_primals", "discovery.announce", "mesh.relay"]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = ["ai.query", "ai.complete", "mcp.tools.list"]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 4
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
args = ["server"]
capabilities = [
    "visualization.render.scene", "visualization.render.dashboard",
    "visualization.export",
]
