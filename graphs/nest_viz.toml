#
# Nest + Visualization Overlay — storage dashboards
#
# Nest Atomic (Tower + NestGate) + petalTongue (visualization).
# Composes storage dashboards on top of the Nest tier, enabling
# visual inspection of stored data, storage health, and capacity.
#
# Usage:
#   biomeos deploy --graph graphs/nest_viz.toml

[graph]
name = "nest_viz"
description = "Nest Atomic + petalTongue (storage dashboards)"
version = "0.1.0"
coordination = "sequential"

# ── Phase 1: Tower Atomic (base) ──

[[graph.nodes]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = [
    "crypto.encrypt", "crypto.decrypt", "crypto.sign",
    "crypto.verify", "crypto.keygen", "crypto.identity",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = [
    "discovery.find_primals", "discovery.announce",
    "network.tls_connect", "network.http_request",
]

# ── Phase 2: Nest Extension ──

[[graph.nodes]]
name = "nestgate"
binary = "nestgate_primal"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve"]

# ── Phase 3: Visualization Overlay ──

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue_primal"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = [
    "viz.render", "viz.dashboard",
    "viz.stream", "viz.query",
]

# ── Validation (not spawned) ──

[[graph.nodes]]
name = "validate_nest_viz"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["beardog", "songbird", "nestgate", "petaltongue"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.nest_viz_health"]
