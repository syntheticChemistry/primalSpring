#
# Tower Agent — the minimal agentic deployment unit
#
# The smallest composition that can reason + act + audit autonomously.
# Tower (bearDog + songbird + skunkBat) provides the trust boundary,
# biomeOS provides graph orchestration, squirrel provides AI planning.
#
# This is a stadial goal composition: once deployed, the tower agent
# can autonomously deploy Node, Nest, and full NUCLEUS compositions
# via the atomic signal layer. Squirrel reads signal_tools.toml to
# understand available signals and plans multi-signal deployments.
#
# AI backends: squirrel connects to whatever is available —
# local Ollama, remote APIs, or federated peers via songbird mesh.
#
# Usage:
#   biomeos deploy --graph graphs/tower_agent.toml

[graph]
name = "tower_agent"
description = "Tower + biomeOS + squirrel: the autonomous deployment unit"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
base = "tower_atomic"
profile = "agent"
particle = "electron"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "agentic"
fragments = ["tower_atomic"]
resolve = true
agentic = true

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_external = "ionic"
encryption_tier = "full"

# ── Tower Atomic (trust boundary) ────────────────────────────────────

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.sign", "crypto.verify", "crypto.keygen", "crypto.identity",
    "crypto.encrypt_chacha20_poly1305", "btsp.negotiate",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "ipc.resolve", "ipc.register", "ipc.discover",
    "discovery.peers", "discovery.announce",
]

[[graph.nodes]]
name = "skunkbat"
binary = "skunkbat"
order = 3
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "defense"
security_model = "btsp"
capabilities = [
    "defense.audit", "defense.status", "security.audit_log",
    "threat.assess", "recon.scan",
]

# ── Orchestration substrate ──────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = [
    "graph.deploy", "graph.execute", "graph.list", "graph.status",
    "capability.discover", "capability.call",
]

# ── Agentic AI ───────────────────────────────────────────────────────

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 5
required = true
depends_on = ["beardog", "songbird", "skunkbat", "biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = [
    "ai.query", "ai.complete", "ai.embed", "ai.models",
    "ai.list_providers", "squirrel.context.push", "squirrel.providers",
    "mcp.tools.list",
]
