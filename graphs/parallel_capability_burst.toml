#
# Parallel Capability Burst — all core services start concurrently
#
# Tower Atomic boots first (sequential BearDog → Songbird), then
# toadStool, NestGate, Squirrel, and barraCuda start in parallel
# since they only depend on Tower, not each other.
#
# Tests the parallel coordination pattern: independent primals
# can health-check concurrently for faster NUCLEUS startup.
#
# Usage:
#   biomeos deploy --graph graphs/parallel_capability_burst.toml

[graph]
name = "parallel_capability_burst"
description = "Tower sequential, then 4 core services in parallel"
version = "1.0.0"
coordination = "parallel"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_preferred"
tcp_fallback = "tower_routed"
composition_model = "nucleated"
fragments = ["tower_atomic", "node", "nest"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.keygen", "crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["discovery.find_primals", "discovery.announce", "mesh.relay"]

# All 4 core services depend only on Tower — they can start in parallel
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = ["tensor.matmul", "stats.mean", "tensor.batch.submit"]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 5
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve"]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 6
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = ["ai.query", "mcp.tools.list"]
