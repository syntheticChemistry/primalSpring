# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Application: System Monitor — NUCLEUS health dashboard
#
# Real-time monitoring of the Desktop NUCLEUS. 1Hz continuous session.
# Pure composition app — no binaries spawned, only NUCLEUS capabilities.
#
# Launch: biomeos continuous graphs/desktop/app_system_monitor.toml
#
# See: specs/DESKTOP_SESSION_MODEL.md

[graph]
id = "system-monitor"
name = "system_monitor"
description = "NUCLEUS health dashboard — composition monitoring"
version = "1.0.0"
coordination = "continuous"

[graph.metadata]
cell_type = "desktop"
domain = "system"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"

# ── Health Polling ──────────────────────────────────────────────

[[graph.nodes]]
id = "composition_health"
name = "composition_health"
order = 1
required = true
spawn = false
by_capability = "attribution"
capabilities = ["composition.nucleus_health", "composition.tower_health"]
health_method = "health.check"

[[graph.nodes]]
id = "primal_metrics"
name = "primal_metrics"
order = 2
required = true
spawn = false
by_capability = "discovery"
capabilities = ["ipc.list"]
health_method = "health.check"

[[graph.nodes]]
id = "discovery_mesh"
name = "discovery_mesh"
order = 3
required = false
spawn = false
depends_on = ["primal_metrics"]
by_capability = "discovery"
capabilities = ["ipc.list"]
health_method = "health.check"

[[graph.nodes]]
id = "crypto_status"
name = "crypto_status"
order = 4
required = false
spawn = false
by_capability = "security"
capabilities = ["btsp.server.status"]
health_method = "health.check"

# ── Storage Health ──────────────────────────────────────────────

[[graph.nodes]]
id = "storage_probe"
name = "storage_probe"
order = 5
required = false
spawn = false
by_capability = "storage"
capabilities = ["health.check"]
health_method = "health.check"

# ── Dashboard Rendering ────────────────────────────────────────

[[graph.nodes]]
id = "dashboard_renderer"
name = "dashboard_renderer"
order = 10
required = true
spawn = false
depends_on = ["composition_health", "primal_metrics", "crypto_status"]
by_capability = "visualization"
capabilities = ["proprioception.get"]
health_method = "health.check"
