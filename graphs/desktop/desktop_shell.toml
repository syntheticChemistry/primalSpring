#
# Desktop Shell — status bar, session switcher, system tray
#
# Always-on 1Hz continuous session polling NUCLEUS health
# and rendering desktop chrome via petalTongue.
#
# See: specs/DESKTOP_SESSION_MODEL.md

[graph]
id = "desktop-shell"
name = "desktop_shell"
description = "Desktop shell chrome — status bar, session switcher, system tray"
version = "1.0.0"
coordination = "continuous"

[graph.metadata]
cell_type = "desktop"
domain = "system"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"

# ── Health Poller ───────────────────────────────────────────────

[[graph.nodes]]
id = "health_poller"
name = "health_poller"
order = 1
required = true
spawn = false
by_capability = "attribution"
capabilities = ["composition.nucleus_health"]
health_method = "health.check"

# ── Session Tracker ─────────────────────────────────────────────

[[graph.nodes]]
id = "session_tracker"
name = "session_tracker"
order = 2
required = true
spawn = false
by_capability = "discovery"
capabilities = ["ipc.list"]
health_method = "health.check"

# ── Topology Monitor ───────────────────────────────────────────

[[graph.nodes]]
id = "topology_monitor"
name = "topology_monitor"
order = 3
required = false
spawn = false
depends_on = ["session_tracker"]
by_capability = "discovery"
capabilities = ["ipc.list"]
health_method = "health.check"

# ── Shell Renderer ──────────────────────────────────────────────

[[graph.nodes]]
id = "shell_renderer"
name = "shell_renderer"
order = 10
required = true
spawn = false
depends_on = ["health_poller", "session_tracker"]
by_capability = "visualization"
capabilities = ["proprioception.get"]
health_method = "health.check"
