#
# fieldMouse Ingestion Pipeline — edge sensor data → gate → provenance trio.
# fieldMouse (Tower chimera) emits signed frames via BirdSong.
# Gate receives frames → NestGate stores → sweetGrass attributes → LoamSpine commits.
#
# Source: wateringHole/FIELDMOUSE_DEPLOYMENT_STANDARD.md
# Mined: primals/nestgate/showcase/05_real_world/ (edge computing)
# Experiment: exp042_fieldmouse_ingestion
#
# Bond: covalent (same family seed on chimera and gate)
# Deployment class: fieldMouse (no biomeOS on edge)
#
# Usage:
#   biomeos deploy --graph graphs/science/fieldmouse_ingestion.toml

[graph]
name = "fieldmouse_ingestion"
description = "Edge sensor data pipeline: fieldMouse chimera → NestGate → sweetGrass → LoamSpine (provenance trio)"
version = "1.0.0"
coordination = "Pipeline"
bond_type = "covalent"
science_domain = "edge_data_acquisition"
deployment_class = "fieldmouse"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic", "nest_atomic"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

# ── Gate Tower layer ───────────────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity", "crypto.verify"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# ── NestGate: receives and stores fieldMouse frames ────────────────────
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.content_address"]

# ── Provenance Trio: stamps and commits edge data ──────────────────────
[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 4
required = false
depends_on = ["nestgate"]
health_method = "health"
by_capability = "provenance"
capabilities = ["provenance.session", "provenance.merkle_root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 5
required = false
depends_on = ["rhizocrypt"]
health_method = "health"
by_capability = "ledger"
capabilities = ["provenance.commit", "provenance.verify"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 6
required = false
depends_on = ["loamspine"]
health_method = "health"
by_capability = "attribution"
capabilities = ["provenance.braid", "provenance.attribute"]

# ── fieldMouse chimera: leaf node, emits frames ───────────────────────
# Not a graph-managed node — it's a remote capability provider
# discovered via BirdSong. Included here for documentation.
[[graph.nodes]]
name = "fieldmouse_sensor"
binary = "fieldmouse_chimera"
order = 7
required = false
spawn = false
health_method = "health.check"
by_capability = "sensor"
capabilities = ["sensor.read", "fieldmouse.frame", "provenance.stamp"]
