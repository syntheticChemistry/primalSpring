# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Research Paper Lifecycle — 6-primal capability-only wiring for
# full scientific paper provenance from data acquisition to publication.
# Source: primals/loamSpine/showcase/04-inter-primal/05-full-ecosystem/
#
# Pipeline: Songbird (discover) → Squirrel (AI coordinate) → NestGate (store) →
#           LoamSpine (commit) → BearDog (sign) → ToadStool (compute verify)
#
# Bond: covalent
# Science domain: reproducibility, publication provenance
#
# Usage:
#   biomeos deploy --graph graphs/science/paper_lifecycle.toml

[graph]
name = "paper_lifecycle"
description = "6-primal research paper lifecycle: discover → AI → store → commit → sign → verify"
version = "1.0.0"
coordination = "Pipeline"
bond_type = "covalent"
science_domain = "reproducibility"
source_showcase = "primals/loamSpine/showcase/04-inter-primal/05-full-ecosystem"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity", "crypto.sign", "crypto.verify"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# Squirrel: AI coordination — analyzes paper, generates metadata
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 3
required = false
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "ai"
capabilities = ["ai.coordinate", "ai.infer", "ai.classify"]

# NestGate: stores paper artifacts (data, figures, manuscript)
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.content_address"]

# LoamSpine: permanent ledger commit of paper provenance
[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 5
required = true
depends_on = ["nestgate"]
health_method = "health"
by_capability = "ledger"
capabilities = ["provenance.commit", "provenance.verify", "provenance.diff"]

# ToadStool: computational verification of results
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 6
required = false
depends_on = ["nestgate"]
health_method = "compute.health"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "compute.execute"]
