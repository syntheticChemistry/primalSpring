#
# Session Provenance — Nest Atomic + Provenance Trio for session lifecycle
# Source: ludoSpring V37.1 (exp094: 3/8 partial, exp095: 0/8 blocked by
#         rhizoCrypt UDS + loamSpine panic)
#
# Validates: session creation → crypto identity → storage persistence →
# provenance DAG → attribution → ledger. Requires all 3 provenance primals
# (rhizoCrypt, loamSpine, sweetGrass) plus Nest Atomic (BearDog + NestGate).
#
# BLOCKED BY: RC-01 (rhizoCrypt UDS), LS-03 (loamSpine panic)

[graph]
name = "session_provenance"
description = "Session lifecycle via Nest Atomic + Provenance Trio (rhizoCrypt + loamSpine + sweetGrass)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.blake3_hash", "crypto.sign_ed25519", "crypto.verify_ed25519"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"

[[graph.nodes]]
name = "nestgate"
binary = "nestgate_primal"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 4
required = true
depends_on = ["nestgate"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = [
    "dag",
    "dag.session.create", "dag.event.append", "dag.merkle.root", "dag.merkle.verify",
    "dag.dehydration.trigger", "dag.frontier.get",
    "dag.add_vertex", "dag.query",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 5
required = true
depends_on = ["rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = [
    "spine", "entry", "session", "certificate", "commit", "ledger",
    "spine.create", "entry.append", "session.commit", "certificate.mint",
    "ledger.query", "certificate.issue",
]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 6
required = true
depends_on = ["loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = [
    "braid", "attribution", "provenance", "anchoring",
    "braid.create", "braid.commit", "provenance.graph", "provenance.export_provo",
    "attribution.chain",
    "braid.verify", "attribution.query",
]
