# SPDX-License-Identifier: AGPL-3.0-or-later
#
# CoralForge Federated — multi-site protein folding with GPU burst.
# neuralSpring (evoformer) -> hotSpring (df64) -> wetSpring (bio-shaders) ->
# ToadStool (GPU dispatch, metallic pool) -> NestGate (storage).
#
# Bond: metallic internally (shared GPU pool), ionic to external structure DBs.
# Each pipeline stage commits provenance via the Trio: Merkle root per fold step.
#
# Usage:
#   biomeos deploy --graph graphs/science/coralforge_federated.toml

[graph]
name = "coralforge_federated"
description = "Multi-site protein folding pipeline with GPU burst and per-step provenance — metallic + ionic bonds"
version = "1.0.0"
coordination = "Pipeline"
bond_type = "metallic_ionic"
science_domain = "structural_biology"

# ── Tower layer (identity + mesh) ──────────────────────────────────────
[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity", "crypto.verify"]

[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# ── Provenance backbone (runs alongside pipeline) ─────────────────────
[[graph.node]]
name = "rhizocrypt"
binary = "rhizocrypt_primal"
order = 3
required = false
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "provenance"
capabilities = ["provenance.session", "provenance.merkle_root"]

[[graph.node]]
name = "loamspine"
binary = "loamspine_primal"
order = 4
required = false
depends_on = ["rhizocrypt"]
health_method = "health"
by_capability = "ledger"
capabilities = ["provenance.commit", "provenance.verify"]

[[graph.node]]
name = "sweetgrass"
binary = "sweetgrass_primal"
order = 5
required = false
depends_on = ["loamspine"]
health_method = "health"
by_capability = "attribution"
capabilities = ["provenance.braid", "provenance.attribute"]

# ── Science pipeline ───────────────────────────────────────────────────
[[graph.node]]
name = "neuralspring"
binary = "neuralspring_primal"
order = 6
required = true
depends_on = ["beardog", "songbird"]
health_method = "neural.health"
by_capability = "neural"
capabilities = ["neural.evoformer", "neural.structure_prediction", "neural.spectral"]

[[graph.node]]
name = "hotspring"
binary = "hotspring_primal"
order = 7
required = true
depends_on = ["neuralspring"]
health_method = "compute.health"
by_capability = "precision"
capabilities = ["compute.df64", "compute.precision", "compute.deterministic"]

[[graph.node]]
name = "wetspring"
binary = "wetspring_primal"
order = 8
required = true
depends_on = ["hotspring"]
health_method = "shader.health"
by_capability = "shader"
capabilities = ["shader.bio", "shader.compile", "science.diversity"]

# ── Metallic GPU pool ──────────────────────────────────────────────────
[[graph.node]]
name = "toadstool"
binary = "toadstool_primal"
order = 9
required = true
depends_on = ["wetspring"]
health_method = "compute.health"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "compute.execute", "compute.gpu"]
bond_role = "metallic_pool"

# ── Storage + ionic external ───────────────────────────────────────────
[[graph.node]]
name = "nestgate"
binary = "nestgate_primal"
order = 10
required = true
depends_on = ["toadstool"]
health_method = "health"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.replicate"]
bond_role = "ionic_edge"
