# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Gaming Mesh Chimera — Pure Composition
#
# Fuses Songbird networking with GPU game compute + visualization.
# No downstream binary — toadStool dispatches GPU compute for
# rendering/physics via barraCuda, petalTongue provides visualization.
#
# Source: primals/toadstool/showcase/gaming-evolution/ (6-level evolution)
#
# Tests: real-time tick budget compliance (16.67ms @ 60Hz),
# game state sync across mesh, GPU dispatch latency.
#
# Usage:
#   biomeos deploy --graph graphs/science/gaming_mesh_chimera.toml

[graph]
name = "gaming_mesh_chimera"
description = "Gaming mesh: Songbird + toadStool + barraCuda — GPU dispatch, 60Hz tick budget, mesh sync"
version = "2.0.0"
coordination = "Pipeline"
science_domain = "interactive_compute"
source_showcase = "primals/toadstool/showcase/gaming-evolution"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_base", "wgsl_shader_pipeline"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["net.discovery", "net.mesh", "net.realtime"]

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["graph.execution", "ecosystem.coordination"]

# ── Compute dispatch + GPU math (replaces ludospring binary) ───────────
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.execute", "compute.gpu", "compute.shader"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 5
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.fitts", "tensor.flow_sigmoid",
    "tensor.perlin", "tensor.wfc", "tensor.noise",
]

# ── Visualization + UI ────────────────────────────────────────────────
[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 6
required = false
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
capabilities = ["viz.dashboard", "viz.topology", "viz.realtime"]
