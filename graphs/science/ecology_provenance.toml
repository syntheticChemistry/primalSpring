# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Cross-Spring Ecology with Provenance — field station environmental monitoring.
# airSpring (weather/ET0) -> wetSpring (biodiversity) -> neuralSpring (spectral).
# Full provenance chain: each sampling event gets a RootPulse session.
#
# Bond: covalent within a field station, ionic across institutions.
# The "salt crystal" — ionic cross-domain composition.
#
# Usage:
#   biomeos deploy --graph graphs/science/ecology_provenance.toml

[graph]
name = "ecology_provenance"
description = "Environmental monitoring: ET0 → biodiversity → spectral with federated attribution across field stations"
version = "2.0.0"
coordination = "Pipeline"
bond_type = "covalent"
science_domain = "environmental_science"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

# ── Tower layer ────────────────────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["net.discovery"]

# ── Provenance Trio (per sampling event) ───────────────────────────────
[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 3
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = [
    "dag",
    "dag.session.create", "dag.event.append", "dag.merkle.root", "dag.merkle.verify",
    "dag.dehydration.trigger", "dag.frontier.get",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 4
required = true
depends_on = ["rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = [
    "spine", "entry", "session", "certificate", "commit", "ledger",
    "spine.create", "entry.append", "session.commit", "certificate.mint",
    "provenance.verify",
]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 5
required = true
depends_on = ["loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = [
    "braid", "attribution", "provenance", "anchoring",
    "braid.create", "braid.commit", "provenance.graph", "provenance.export_provo",
    "attribution.chain",
    "provenance.braid", "provenance.attribute",
]

# ── Ecology pipeline ──────────────────────────────────────────────────
[[graph.nodes]]
name = "airspring"
binary = "airspring_primal"
order = 6
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ecology"
capabilities = ["ecology.weather", "ecology.et0", "ecology.water_balance", "ecology.yield_response"]

[[graph.nodes]]
name = "wetspring"
binary = "wetspring_primal"
order = 7
required = true
depends_on = ["airspring"]
health_method = "health.liveness"
by_capability = "science"
capabilities = ["science.diversity", "science.sequence", "science.microbiome"]

[[graph.nodes]]
name = "neuralspring"
binary = "neuralspring_primal"
order = 8
required = true
depends_on = ["wetspring"]
health_method = "health.liveness"
by_capability = "neural"
capabilities = ["neural.spectral", "neural.eigensolve", "neural.classification"]
