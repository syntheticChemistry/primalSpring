# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Reproducibility Audit — replay and verify any prior experiment's provenance chain.
# Any spring can be the subject; the Trio validates the full chain of custody.
#
# Bond: covalent — all components share family trust.
# This graph doesn't do science; it AUDITS science.
#
# Usage:
#   biomeos deploy --graph graphs/science/reproducibility_audit.toml

[graph]
name = "reproducibility_audit"
description = "Replay and verify any prior experiment's provenance chain — the Trio audits all spring computations"
version = "2.0.0"
coordination = "sequential"
bond_type = "covalent"
science_domain = "reproducibility"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

# ── Tower layer ────────────────────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["net.discovery"]

# ── Provenance Trio (core audit capability) ────────────────────────────
[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 3
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = [
    "dag",
    "dag.session.create", "dag.event.append", "dag.merkle.root", "dag.merkle.verify",
    "dag.dehydration.trigger", "dag.frontier.get",
    "provenance.replay",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 4
required = true
depends_on = ["rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = [
    "spine", "entry", "session", "certificate", "commit", "ledger",
    "spine.create", "entry.append", "session.commit", "certificate.mint",
    "provenance.verify", "provenance.diff",
]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 5
required = true
depends_on = ["loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = [
    "braid", "attribution", "provenance", "anchoring",
    "braid.create", "braid.commit", "provenance.graph", "provenance.export_provo",
    "attribution.chain",
    "provenance.braid", "provenance.attribute", "provenance.audit",
]

# ── biomeOS (orchestrator for audit workflow) ──────────────────────────
[[graph.nodes]]
name = "biomeos"
binary = "biomeos_primal"
order = 6
required = true
depends_on = ["beardog", "songbird", "sweetgrass"]
health_method = "health.liveness"
by_capability = "ecosystem"
capabilities = ["graph.deploy", "ecosystem.coordination", "audit.orchestrate"]
