# SPDX-License-Identifier: AGPL-3.0-or-later
#
# RPGPT Session Provenance — Pure Composition
#
# Every narrative decision gets a DAG entry via pure primal composition.
# No downstream binaries — RPGPT is a composition of Squirrel (AI
# narration) + NestGate (session storage) + provenance trio (DAG
# integrity, attribution, anti-cheat).
#
# The provenance chain:
#   1. NestGate creates a session record (storage.store)
#   2. Squirrel narrates scene (ai.query with session context)
#   3. Each scene resolution appends to the DAG (rhizoCrypt dag.event.append)
#   4. AI narrations are stamped with attribution (sweetGrass)
#   5. Player choices branch the DAG (loamSpine lineage.branch)
#   6. Session completion finalizes + certifies (loamSpine lineage.certify)
#
# This is the "game save as provenance record" pattern — sessions are
# not opaque blobs but structured, verifiable, forkable DAGs.

[graph]
name = "rpgpt_session_provenance"
description = "RPGPT session integrity — pure composition: AI narration + session storage + provenance chain"
version = "3.0.0"
coordination = "Pipeline"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-09"
witness_wire = "WireWitnessRef"
composition_model = "pure"
fragments = ["tower_atomic", "provenance_trio"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["net.discovery", "net.mesh"]

# ── AI narration (replaces esotericwebb + ludospring binaries) ─────────
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = [
    "ai.query", "ai.complete",
    "ai.narrate", "ai.constrain_ruleset",
    "context.create",
]

# ── Session storage ────────────────────────────────────────────────────
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve"]

# ── Provenance chain ──────────────────────────────────────────────────
[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 5
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "provenance"
security_model = "tower_delegated"
capabilities = [
    "dag.session.create", "dag.event.append", "dag.merkle.root",
    "dag.merkle.verify", "dag.dehydration.trigger", "dag.frontier.get",
    "dag.session.finalize",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 6
required = true
spawn = false
depends_on = ["rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = [
    "spine.create", "entry.append", "session.commit",
    "certificate.mint", "lineage.certify",
]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 7
required = true
spawn = false
depends_on = ["loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = [
    "braid.create", "braid.commit", "provenance.graph",
    "provenance.export_provo", "attribution.chain",
]
