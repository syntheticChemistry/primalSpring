# SPDX-License-Identifier: AGPL-3.0-or-later
#
# RPGPT Session Provenance — every narrative decision gets a DAG entry.
# Validates the session integrity story: game state is cryptographically
# stamped so sessions can be replayed, audited, and shared.
#
# The provenance chain:
#   1. esotericWebb creates a session (rhizoCrypt dag.session.create)
#   2. Each scene resolution appends to the DAG (dag.event.append)
#   3. ludoSpring game science results are part of the event payload
#   4. Squirrel AI narrations are stamped with attribution (sweetGrass)
#   5. Player choices branch the DAG (loamSpine lineage.branch)
#   6. Session completion finalizes + certifies (loamSpine lineage.certify)
#
# This is the "game save as provenance record" pattern — sessions are
# not opaque blobs but structured, verifiable, forkable DAGs.

[graph]
name = "rpgpt_session_provenance"
description = "RPGPT session integrity: every narrative event → DAG stamp → replayable + auditable + forkable"
version = "2.0.0"
coordination = "Pipeline"
bond_type = "covalent"

[graph.metadata]
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"

[[graph.node]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519"]

[[graph.node]]
name = "esotericwebb"
binary = "esotericwebb"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "narrative"
capabilities = ["session.create", "session.advance", "webb.resolve_scene"]

[[graph.node]]
name = "ludospring"
binary = "ludospring"
order = 3
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "game"
capabilities = ["game.evaluate_flow", "game.difficulty_adjustment"]

[[graph.node]]
name = "squirrel"
binary = "squirrel"
order = 4
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.chat", "context.create"]

[[graph.node]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 5
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "provenance"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root", "dag.session.finalize"]

[[graph.node]]
name = "loamspine"
binary = "loamspine"
order = 6
required = true
depends_on = ["rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine.create", "entry.append", "session.commit", "lineage.certify"]

[[graph.node]]
name = "sweetgrass"
binary = "sweetgrass"
order = 7
required = true
depends_on = ["loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid.create", "braid.commit", "provenance.graph"]
