# SPDX-License-Identifier: AGPL-3.0-or-later
#
# RPGPT Session Provenance — every narrative decision gets a DAG entry.
# Validates the session integrity story: game state is cryptographically
# stamped so sessions can be replayed, audited, and shared.
#
# The provenance chain:
#   1. esotericWebb creates a session (rhizoCrypt dag.session.create)
#   2. Each scene resolution appends to the DAG (dag.event.append)
#   3. ludoSpring game science results are part of the event payload
#   4. Squirrel AI narrations are stamped with attribution (sweetGrass)
#   5. Player choices branch the DAG (loamSpine lineage.branch)
#   6. Session completion finalizes + certifies (loamSpine lineage.certify)
#
# This is the "game save as provenance record" pattern — sessions are
# not opaque blobs but structured, verifiable, forkable DAGs.

[graph]
name = "rpgpt_session_provenance"
description = "RPGPT session integrity: every narrative event → DAG stamp → replayable + auditable + forkable"
version = "2.0.0"
coordination = "Pipeline"
bond_type = "covalent"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519"]

[[graph.nodes]]
name = "esotericwebb"
spawn = true
security_model = "tower_delegated"
binary = "esotericwebb"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "narrative"
capabilities = ["session.create", "session.advance", "webb.resolve_scene"]

[[graph.nodes]]
name = "ludospring"
spawn = true
security_model = "tower_delegated"
binary = "ludospring"
order = 3
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "game"
capabilities = ["game.evaluate_flow", "game.difficulty_adjustment"]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 4
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.chat", "context.create"]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 5
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = [
    "dag",
    "dag.session.create", "dag.event.append", "dag.merkle.root", "dag.merkle.verify",
    "dag.dehydration.trigger", "dag.frontier.get",
    "dag.session.finalize",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 6
required = true
depends_on = ["rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = [
    "spine", "entry", "session", "certificate", "commit", "ledger",
    "spine.create", "entry.append", "session.commit", "certificate.mint",
    "lineage.certify",
]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 7
required = true
depends_on = ["loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = [
    "braid", "attribution", "provenance", "anchoring",
    "braid.create", "braid.commit", "provenance.graph", "provenance.export_provo",
    "attribution.chain",
]
