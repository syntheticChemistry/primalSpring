# SPDX-License-Identifier: AGPL-3.0-or-later
#
# biomeOS ML Inference Pipeline — WGSL shader composition for model serving.
# Squirrel (inference routing) -> neuralSpring (composition orchestration) ->
# coralReef (WGSL shader compile) -> toadStool (compute dispatch) ->
# barraCuda (tensor shader execution) -> NestGate (weight cache).
#
# This is the ML equivalent of coralforge_pipeline.toml (structure prediction).
# Where CoralForge chains evoformer → df64 → bio-shaders → GPU dispatch → store,
# this chains inference routing → shader composition → compile → dispatch →
# tensor execution → cache.
#
# The key insight: ML inference IS a WGSL shader composition. barraCuda already
# has matmul, attention, softmax, layer_norm, gelu — the transformer building
# blocks. coralReef compiles them. toadStool dispatches them. neuralSpring
# composes them into tokenization and forward-pass pipelines.
#
# Data flow:
#   1. Request arrives at Squirrel (inference.complete/embed)
#   2. Squirrel routes to neuralSpring (native provider)
#   3. neuralSpring composes WGSL shader ops into a forward-pass pipeline
#   4. coralReef compiles the WGSL shader programs for the target GPU
#   5. toadStool dispatches compiled shaders to GPU/CPU substrate
#   6. barraCuda executes tensor math (matmul → attention → FFN → logits)
#   7. NestGate caches model weights between invocations
#   8. Response returns through Squirrel to consumer
#
# Usage:
#   biomeos deploy --graph graphs/neuralspring_inference_pipeline.toml

[graph]
name = "neuralspring_inference_pipeline"
description = "Pipeline: Squirrel (routing) -> neuralSpring (compose) -> coralReef (compile WGSL) -> toadStool (dispatch) -> barraCuda (tensor shaders) -> NestGate (cache). ML inference as shader composition."
version = "0.2.0"
coordination = "Pipeline"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic", "node_atomic"]

# ── Node 1: BearDog (identity) ────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity"]

# ── Node 2: Songbird (network) ─────────────────────────────────────────
[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery"]

# ── Node 3: Squirrel (inference routing) ───────────────────────────────
# Entry point: consumers call inference.complete/embed/models.
# Squirrel discovers neuralSpring via capability.discover("inference")
# and routes requests. Falls back to Ollama/OpenAI when shader
# compositions aren't loaded.
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "ai"
capabilities = ["inference.complete", "inference.embed", "inference.models"]

# ── Node 4: neuralSpring (shader composition orchestration) ────────────
# Composition application: receives inference requests from Squirrel,
# orchestrates the WGSL shader pipeline — tokenizer shaders, embedding
# shaders, attention/FFN shaders — across the compute primals.
# neuralSpring is the application, not the engine.
[[graph.nodes]]
name = "neuralspring"
binary = "neuralspring"
order = 4
required = true
depends_on = ["squirrel"]
health_method = "health.liveness"
by_capability = "inference"
capabilities = ["inference.complete", "inference.embed", "inference.models"]

# ── Node 5: coralReef (WGSL shader compilation) ───────────────────────
# Compiles WGSL shader programs for inference ops: tokenizer kernels,
# embedding lookups, attention patterns, FFN blocks. neuralSpring
# defines the shader compositions, coralReef compiles them for the
# target GPU architecture.
[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 5
required = true
depends_on = ["neuralspring"]
health_method = "health"
by_capability = "shader_compile"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

# ── Node 6: toadStool (compute dispatch) ──────────────────────────────
# Dispatches compiled shader workloads to GPU/CPU substrates.
# Manages execution scheduling and substrate selection for
# multi-stage inference pipelines (tokenize → embed → forward).
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 6
required = true
depends_on = ["coralreef"]
health_method = "compute.health"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "compute.execute"]

# ── Node 7: barraCuda (tensor shader execution) ───────────────────────
# 826 WGSL compute shaders: matmul, attention (MHA/GQA/SDPA),
# softmax, layer_norm, gelu, conv. These shaders — originally from
# hotSpring — are the actual math engine. Runs on wgpu GPU
# (falls back to CPU when no GPU available).
[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 7
required = true
depends_on = ["toadstool"]
health_method = "health"
by_capability = "math"
capabilities = ["math.tensor", "math.activation", "math.stats"]

# ── Node 8: NestGate (model weight cache) ─────────────────────────────
# Caches safetensors model weights so shader compositions don't
# need to re-download between runs. Also stores compiled shader
# artifacts for warm-start inference.
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 8
required = true
depends_on = ["barracuda"]
health_method = "health"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve"]
