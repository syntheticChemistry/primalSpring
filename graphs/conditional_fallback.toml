#
# Conditional DAG — GPU dispatch with CPU fallback
#
# toadStool dispatches compute jobs. If barraCuda (GPU) is available,
# use it. Otherwise fall back to CPU-only toadStool dispatch.
# coralReef compiles shaders only when GPU is present.
#
# This graph demonstrates the conditional_dag coordination pattern:
# branches in the dependency graph activate based on runtime conditions.
#
# Usage:
#   biomeos deploy --graph graphs/conditional_fallback.toml

[graph]
name = "conditional_fallback"
description = "Conditional DAG: GPU primary (barraCuda) with CPU fallback (toadStool)"
version = "1.0.0"
coordination = "conditional_dag"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_preferred"
tcp_fallback = "tower_routed"
composition_model = "nucleated"
fragments = ["tower_atomic", "node"]
fallback_strategy = "cpu_only"

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.keygen"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["discovery.find_primals", "discovery.announce"]

# Primary path: toadStool always starts
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.dispatch.result", "compute.execute"]

# Conditional: barraCuda starts only if GPU detected
[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = false
depends_on = ["beardog", "songbird", "toadstool"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
condition = "gpu_available"
capabilities = ["tensor.matmul", "tensor.add", "stats.mean", "tensor.batch.submit"]

# Conditional: coralReef starts only if GPU detected
[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 5
required = false
depends_on = ["beardog", "songbird", "toadstool"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
condition = "gpu_available"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv", "shader.validate"]
