#
# Atomic Signal: nest.ingest_spore
#
# pseudoSpore 2.0 gateway flow: validate envelope → store via NestGate →
# record DAG session → append ledger entry → create braid.
#
# This is the postPrimordial path: any spring can emit a pseudoSpore,
# any NUCLEUS can ingest it through Nest Atomic. The provenance trio
# signs the ingestion, making the spore a first-class sovereign artifact.
#
# Three-era model:
#   Era 1 (ad-hoc):           hand-authored scope.toml, blind copy
#   Era 2 (pipeline-derived): metadata extracted, cross-checked (v1.6.1)
#   Era 3 (NUCLEUS):          provenance trio signs via this signal
#
# Consumers: biomeos nucleus ingest, exp115, s_nest_atomic Phase 4
# Fragments: nest_atomic (tower + nestgate + provenance_trio)

[graph]
id = "nest_ingest_spore"
name = "Nest Ingest Spore Signal"
description = "Validate envelope → store → DAG session → ledger entry → braid. postPrimordial spore gateway."
version = "1.0.0"
coordination = "sequential"
signal_tier = "nest"
signal_name = "ingest_spore"

[graph.metadata]
particle = "neutron"
security_model = "btsp_enforced"
transport = "uds_only"
secure_by_default = true
fragments = ["nest_atomic"]
pseudospore_version = "2.0"
era = 3

# Step 1: Validate the incoming spore envelope (liveSpore.json, data.toml, checksums).
# NestGate validates envelope integrity (BLAKE3 manifest, schema) before storage.
[[graph.nodes]]
name = "validate_envelope"
binary = "nestgate"
order = 1
required = true
spawn = false
by_capability = "storage"
capabilities = ["storage.exists"]

# Step 2: Store spore data via NestGate content-addressed storage.
# The tarball (or present files) become sovereign artifacts.
[[graph.nodes]]
name = "store"
binary = "nestgate"
order = 2
required = true
spawn = false
depends_on = ["validate_envelope"]
by_capability = "storage"
capabilities = ["storage.store", "content.put"]

# Step 3: Create DAG session for the ingestion event.
# rhizoCrypt records the spore as an event in the ephemeral DAG.
[[graph.nodes]]
name = "dag_session"
binary = "rhizocrypt"
order = 3
required = false
spawn = false
depends_on = ["store"]
by_capability = "dag"
capabilities = ["dag.session.create", "dag.event.append"]

# Step 4: Append permanent ledger entry.
# loamSpine records the storage CID + DAG root for permanent lineage.
[[graph.nodes]]
name = "ledger_entry"
binary = "loamspine"
order = 4
required = false
spawn = false
depends_on = ["dag_session"]
by_capability = "ledger"
capabilities = ["entry.append", "spine.get"]

# Step 5: Create attribution braid.
# sweetGrass weaves the spore provenance into a braid, linking
# source spring, domain profile, storage CID, and trio session.
[[graph.nodes]]
name = "braid"
binary = "sweetgrass"
order = 5
required = false
spawn = false
depends_on = ["ledger_entry"]
by_capability = "attribution"
capabilities = ["braid.create", "braid.commit"]

# Step 6: Sign the complete ingestion receipt.
# BearDog signs the braid + ledger entry for tamper evidence.
[[graph.nodes]]
name = "sign_receipt"
binary = "beardog"
order = 6
required = false
spawn = false
depends_on = ["braid"]
by_capability = "security"
capabilities = ["crypto.sign"]

[graph.bonding_policy]
bond_type = "Ionic"
trust_model = "MethodGate"
scope = "nest_ingest"
