# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Atomic Signal: rootPulse diff
#
# Computes the difference between two points in the rhizoCrypt DAG.
# Returns the set of events and content changes between ancestor and
# descendant. Read-only — no mutation, no signing required.
#
# Coordination domain: rootPulse (ACTION / efferent)

[graph]
id = "rootpulse_diff"
name = "rootPulse Diff"
description = "Compute DAG difference between two points. Read-only provenance comparison."
version = "1.0.0"
coordination = "sequential"
signal_tier = "rootpulse"
signal_name = "diff"
coordination_domain = "pulse"

[graph.metadata]
particle = "neutron"
security_model = "btsp_enforced"
transport = "uds_only"
secure_by_default = true

[[graph.nodes]]
name = "diff"
binary = "rhizocrypt"
order = 1
required = true
spawn = false
by_capability = "dag"
capabilities = ["dag.diff"]

[[graph.nodes]]
name = "resolve_content"
binary = "nestgate"
order = 2
required = false
spawn = false
depends_on = ["diff"]
by_capability = "storage"
capabilities = ["content.get"]
