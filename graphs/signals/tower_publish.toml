#
# Atomic Signal: tower.publish
#
# Signs content, announces it via Songbird, and logs the event via skunkBat.
# Springs call signal("tower", "publish", payload) instead of 3 separate
# primal calls. biomeOS decomposes this graph over the Tower atomic.

[graph]
id = "tower_publish"
name = "Tower Publish Signal"
description = "Sign → announce → audit. Atomic Tower signal for authenticated broadcast."
version = "1.0.0"
coordination = "sequential"
signal_tier = "tower"
signal_name = "publish"

[graph.metadata]
particle = "electron"
security_model = "btsp_enforced"
transport = "uds_only"
secure_by_default = true

[[graph.nodes]]
name = "sign"
binary = "beardog"
order = 1
required = true
spawn = false
by_capability = "security"
capabilities = ["crypto.sign"]

[[graph.nodes]]
name = "announce"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["sign"]
by_capability = "discovery"
capabilities = ["discovery.announce"]

[[graph.nodes]]
name = "audit"
binary = "skunkbat"
order = 3
required = true
spawn = false
depends_on = ["announce"]
by_capability = "defense"
capabilities = ["security.audit_event"]
