#
# Atomic Signal: rootPulse commit
#
# The temporal collapse from ephemeral to permanent. Dehydrates a rhizoCrypt
# DAG session, signs the merkle root, optionally stores content, commits to
# loamSpine ledger, and creates a sweetGrass attribution braid.
#
# This is the canonical rootPulse operation — version control emerges from
# composing these 5 primal capabilities. No primal knows about "commits";
# biomeOS composes the graph.
#
# Coordination domain: rootPulse (ACTION / efferent)

[graph]
id = "rootpulse_commit"
name = "rootPulse Commit"
description = "Dehydrate → sign → store → commit → attribute. Temporal collapse from ephemeral DAG to permanent provenance."
version = "1.0.0"
coordination = "sequential"
signal_tier = "rootpulse"
signal_name = "commit"
coordination_domain = "pulse"

[graph.metadata]
particle = "neutron"
security_model = "btsp_enforced"
transport = "uds_only"
secure_by_default = true
fragments = ["tower_atomic", "provenance_trio"]

[[graph.nodes]]
name = "dehydrate"
binary = "rhizocrypt"
order = 1
required = true
spawn = false
by_capability = "dag"
capabilities = ["session.dehydrate"]

[[graph.nodes]]
name = "sign"
binary = "beardog"
order = 2
required = true
spawn = false
depends_on = ["dehydrate"]
by_capability = "security"
capabilities = ["crypto.sign_ed25519"]

[[graph.nodes]]
name = "store"
binary = "nestgate"
order = 3
required = false
spawn = false
depends_on = ["sign"]
by_capability = "storage"
capabilities = ["content.put"]

[[graph.nodes]]
name = "commit"
binary = "loamspine"
order = 4
required = true
spawn = false
depends_on = ["sign"]
by_capability = "ledger"
capabilities = ["session.commit"]

[[graph.nodes]]
name = "attribute"
binary = "sweetgrass"
order = 5
required = true
spawn = false
depends_on = ["commit"]
by_capability = "attribution"
capabilities = ["braid.create"]
