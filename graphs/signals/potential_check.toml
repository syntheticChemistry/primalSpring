#
# Atomic Signal: potential.check — Membrane gradient health
#
# Deep observation of the impulse mesh. Reports expired unacked impulses,
# TTL violations, volume per wave, and overall gradient health. This is
# the diagnostic counterpart to potential.sense — sense shows what's
# pending, check shows what's unhealthy.
#
# Coordination domain: quorumSignal (SENSE / afferent)

[graph]
id = "potential_check"
name = "Potential Check"
description = "Gradient health across the mesh — expired, unacked, volume analysis."
version = "1.0.0"
coordination = "sequential"
signal_tier = "ecosystem"
signal_name = "potential.check"
coordination_domain = "signal"

[graph.metadata]
particle = "potential"
security_model = "gate_identity"
transport = "local_fs"
secure_by_default = true
fragments = ["impulse_potential"]

[[graph.nodes]]
name = "scan_impulses"
binary = "membrane"
order = 1
required = true
spawn = false
by_capability = "coordination"
capabilities = ["potential.check"]
