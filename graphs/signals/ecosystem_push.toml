#
# Ecosystem Signal: ecosystem.push
#
# Push local evolution to the VPS periplasm (forgejo) and optionally
# mirror to the outer membrane (GitHub). Ensures commits are signed
# before push. The reverse flow of ecosystem.pull.
#
# Coordination domain: waterFall (SYNC / autonomic)
# Signal tier: ecosystem (membrane-level, not atomic-level)

[graph]
id = "ecosystem_push"
name = "Ecosystem Push"
description = "Commit → sign → push forgejo → mirror GitHub. Upward flow through periplasm."
version = "1.0.0"
coordination = "sequential"
signal_tier = "ecosystem"
signal_name = "push"
coordination_domain = "fall"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_and_mesh"
secure_by_default = true
cross_gate = true
manifest = "ecosystem_manifest.toml"

[[graph.nodes]]
name = "verify_signatures"
binary = "beardog"
order = 1
required = true
spawn = false
by_capability = "security"
capabilities = ["crypto.verify_ed25519"]
description = "Verify all commits to push are properly signed"

[[graph.nodes]]
name = "push_forgejo"
binary = "nestgate"
order = 2
required = true
spawn = false
depends_on = ["verify_signatures"]
by_capability = "storage"
capabilities = ["content.push"]
description = "Push to sovereign Forgejo via SSH (periplasm)"

[[graph.nodes]]
name = "mirror_github"
binary = "songbird"
order = 3
required = false
spawn = false
depends_on = ["push_forgejo"]
by_capability = "discovery"
capabilities = ["mesh.mirror"]
description = "Mirror to GitHub outer membrane (trailing mirror)"

[[graph.nodes]]
name = "publish_freshness"
binary = "songbird"
order = 4
required = false
spawn = false
depends_on = ["push_forgejo"]
by_capability = "discovery"
capabilities = ["mesh.publish"]
description = "Announce push event to songbird mesh"
