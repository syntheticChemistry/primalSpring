#
# Nest Atomic Deploy — Tower + NestGate + Squirrel (Gold Standard)
#
# The Nest Atomic extends the Tower Atomic (BearDog + Songbird) with
# persistent storage, content-addressed external data ingestion, and
# AI orchestration. NestGate delegates HTTPS fetch to Songbird via
# capability.call. Squirrel provides AI query routing, tool execution,
# and context management. BearDog remains the single TLS boundary.
#
# This graph is the gold standard reference for all primalSpring
# deployment graphs. It uses biomeOS-native format (id + [[graph.nodes]])
# and current canonical capability names verified against niche.rs.
#
# Composition:
#   Phase 1: BearDog (crypto — TLS, signing, identity)
#   Phase 2: Songbird (discovery, HTTP/TLS via BearDog)
#   Phase 3: NestGate (storage, fetch_external via Tower)
#   Phase 4: Squirrel (AI orchestration, tool routing, context)
#   Phase 5: HTTPS validation (Tower Atomic TLS e2e)
#   Phase 6: Composition validation
#
# Usage:
#   biomeos deploy graphs/nest-deploy.toml   (biomeOS native — graph.execute)
#   primalspring_primal server               (coordination.deploy_atomic {"atomic":"Nest"})

[graph]
id = "nest-deploy"
name = "nest_deploy"
description = "Nest Atomic: BearDog (crypto) + Songbird (HTTP) + NestGate (storage) + Squirrel (AI) — gold standard graph-deployed composition"
version = "4.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

# ── Phase 1: BearDog — crypto foundation + TLS boundary ──
# BearDog owns ALL crypto and TLS for the ecosystem.
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = [
    "crypto.sign_ed25519",
    "crypto.verify_ed25519",
    "crypto.blake3_hash",
    "crypto.encrypt",
    "crypto.decrypt",
    "crypto.keygen",
]

# ── Phase 2: Songbird — discovery + HTTP (TLS via BearDog) ──
[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = [
    "discovery.find_primals",
    "discovery.announce",
    "http.request",
    "http.get",
    "http.post",
    "mesh.init",
    "mesh.auto_discover",
    "mesh.peers",
]

# ── Phase 3: NestGate — storage + external fetch via Tower ──
# NestGate delegates HTTPS to Songbird via biomeOS capability.call.
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = [
    "storage.put",
    "storage.get",
    "storage.list",
    "storage.exists",
    "storage.fetch_external",
]

# ── Phase 4: Squirrel — AI orchestration + tool routing ──
# Squirrel routes AI queries to local/remote providers, manages context
# sessions, and executes MCP-style tools across the ecosystem. When Node
# Atomic (ToadStool GPU) is available, Squirrel routes inference there.
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = [
    "ai.query",
    "ai.complete",
    "ai.chat",
    "ai.list_providers",
    "tool.execute",
    "tool.list",
    "context.create",
    "context.update",
    "context.summarize",
]

# ── Phase 5: HTTPS Validation — Tower Atomic TLS e2e ──
# Validates that HTTPS works through the full Tower Atomic stack:
# Songbird TLS 1.3 → BearDog X25519/HKDF/AEAD → public endpoint.
# Also validates NestGate fetch_external through the same path.
[[graph.nodes]]
name = "validate_https"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["beardog", "songbird", "nestgate"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_https"]

# ── Phase 6: Composition Validation ──
[[graph.nodes]]
name = "validate_nest"
binary = "primalspring_primal"
order = 6
required = true
spawn = false
depends_on = ["beardog", "songbird", "nestgate", "squirrel", "validate_https"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["coordination.validate_composition"]
