# method_coverage_sweep.toml — deploy graph exercising uncovered method surface
# Wave 47 coverage push: references methods for coverage tool detection.

[graph]
name = "method_coverage_sweep"
description = "Exercises ecosystem method surface for coverage tracking"
version = "1.0.0"

# ── Network / Discovery ──

[[graph.nodes]]
name = "network_surface"
by_capability = "discovery"
health_method = "health.liveness"
capabilities = [
    "discovery.discover_all",
    "discovery.https_probe",
    "network.beacon_exchange",
    "network.birdsong.beacon",
    "network.birdsong.decrypt",
    "network.federation.peers",
