# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Full Overlay — NUCLEUS + AI + Visualization + Provenance
#
# The everything-graph: Tower Atomic + Node Atomic + Nest Atomic +
# Provenance Trio + Squirrel (AI) + petalTongue (viz).
# Used for cross-primal discovery validation.
#
# Usage:
#   biomeos deploy --graph graphs/full_overlay.toml

[graph]
name = "full_overlay"
description = "Full overlay: Tower + Node + Nest + Provenance + AI + Viz"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_preferred"
tcp_fallback = "tower_routed"
composition_model = "nucleated"
fragments = ["tower_atomic", "node", "nest", "provenance", "ai", "visualization"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "graph.list", "capability.discover"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.keygen", "crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["discovery.find_primals", "discovery.announce", "mesh.relay", "ipc.resolve"]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = false
depends_on = ["beardog", "songbird", "toadstool"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = ["tensor.matmul", "stats.mean", "tensor.batch.submit"]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 5
required = false
depends_on = ["beardog", "songbird", "toadstool"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 6
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve", "storage.store_blob"]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 7
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = ["ai.query", "ai.complete", "mcp.tools.list"]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 8
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "provenance"
security_model = "tower_delegated"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 9
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["session.commit", "entry.append"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 10
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = ["provenance.create_braid", "provenance.lineage"]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 11
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
args = ["server"]
capabilities = ["visualization.render.scene", "visualization.render.dashboard"]
