# SPDX-License-Identifier: AGPL-3.0-or-later
#
# biomeOS CoralForge Pipeline — structure prediction neural object.
# neuralSpring (evoformer) -> hotSpring (df64 precision) -> wetSpring (bio-shaders) ->
# toadStool (GPU dispatch) -> NestGate (store results).
#
# Usage:
#   biomeos deploy --graph graphs/coralforge_pipeline.toml

[graph]
name = "coralforge_pipeline"
description = "Pipeline: neuralSpring (evoformer) -> hotSpring (df64 precision) -> wetSpring (bio-shaders) -> toadStool (GPU dispatch) -> NestGate (store results). The structure prediction neural object."
version = "0.2.0"
coordination = "Pipeline"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

# ── Node 1: BearDog (identity) ────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity"]

# ── Node 2: Songbird (network) ─────────────────────────────────────────
[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery"]

# ── Node 3: neuralSpring (evoformer) ────────────────────────────────────
[[graph.nodes]]
name = "neuralspring"
binary = "neuralspring_primal"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "neural.health"
by_capability = "neural"
capabilities = ["neural.evoformer", "neural.structure_prediction"]

# ── Node 4: hotSpring (df64 precision) ─────────────────────────────────
[[graph.nodes]]
name = "hotspring"
binary = "hotspring_primal"
order = 4
required = true
depends_on = ["neuralspring"]
health_method = "compute.health"
by_capability = "precision"
capabilities = ["compute.df64", "compute.precision"]

# ── Node 5: wetSpring (bio-shaders) ────────────────────────────────────
[[graph.nodes]]
name = "wetspring"
binary = "wetspring_primal"
order = 5
required = true
depends_on = ["hotspring"]
health_method = "shader.health"
by_capability = "shader"
capabilities = ["shader.bio", "shader.compile"]

# ── Node 6: ToadStool (GPU dispatch) ───────────────────────────────────
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 6
required = true
depends_on = ["wetspring"]
health_method = "compute.health"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "compute.execute"]

# ── Node 7: NestGate (store results) ───────────────────────────────────
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 7
required = true
depends_on = ["toadstool"]
health_method = "health"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve"]
