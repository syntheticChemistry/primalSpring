#
# PROTO SKETCH — C3: Session Composition (esotericWebb standalone).
#
# Upstream sketch co-evolved by primalSpring and ludoSpring.
# primalSpring does NOT own or run the esotericwebb binary.
# esotericWebb takes ownership and validates its own session surface.
#
# Documents the expected composition shape: NUCLEUS base (biomeOS +
# Tower) with esotericWebb as the narrative engine.
#
# See also: graphs/sketches/esotericwebb_tower_deploy.toml
#
# Usage (by esotericWebb, not primalSpring):
#   biomeos deploy --graph graphs/sketches/session_standalone.toml

[graph]
name = "session_standalone"
description = "C3: esotericWebb session subsystem — session lifecycle, actions, state, narrative graph"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

# ── Phase 0: biomeOS substrate ─────────────────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "graph.list"]

# ── Phase 1: Tower Atomic ──────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# ── Phase 2: esotericWebb narrative engine ─────────────────────────
[[graph.nodes]]
name = "esotericwebb"
spawn = true
security_model = "tower_delegated"
binary = "esotericwebb"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "webb.liveness"
by_capability = "narrative"
args = ["serve"]
capabilities = [
    "session.start",
    "session.state",
    "session.actions",
    "session.act",
    "session.history",
    "session.graph",
    "session.narrate",
    "webb.liveness",
    "webb.health",
    "webb.scene.current",
    "webb.narrative.status",
    "webb.content.list",
]
