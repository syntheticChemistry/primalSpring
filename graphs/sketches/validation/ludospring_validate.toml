#
# PROTO SKETCH — ludoSpring V32 validation graph.
#
# This is a sketch of how ludoSpring SHOULD validate its own deployment.
# primalSpring does NOT own or run the ludospring binary — ludoSpring
# runs this validation itself.
#
# Shape: biomeOS substrate, Tower health, ludospring game science surface,
# then composition validation for game.* method surface.
#
# Usage (by ludoSpring, not primalSpring):
#   biomeos deploy --graph graphs/sketches/validation/ludospring_validate.toml

[graph]
name = "ludospring_validate"
description = "Validates ludoSpring V32 deployment: biomeOS substrate, Tower, game science surface, GPU delegation"
version = "0.2.0"
coordination = "sequential"

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "health.liveness"]

[[graph.nodes]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = [
    "composition.tower_health",
]

[[graph.nodes]]
name = "start_ludospring"
binary = "ludospring"
order = 2
required = true
depends_on = ["verify_tower"]
health_method = "health.check"
by_capability = "game"
capabilities = [
    "game.evaluate_flow",
    "game.fitts_cost",
    "game.engagement",
    "game.difficulty_adjustment",
    "game.wfc_step",
    "game.generate_noise",
    "game.analyze_ui",
    "game.accessibility",
]

[[graph.nodes]]
name = "validate_game_surface"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["start_ludospring"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = [
    "coordination.validate_composition",
]
