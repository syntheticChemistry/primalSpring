#
# PROTO SKETCH — esotericWebb Tower validation graph.
#
# This is a sketch of how esotericWebb SHOULD validate its minimum
# viable Tower composition. primalSpring does NOT run this —
# esotericWebb does.
#
# Probes: biomeOS substrate, Tower primals, Webb narrative surface.
#
# Usage (by esotericWebb, not primalSpring):
#   biomeos deploy --graph graphs/sketches/validation/esotericwebb_tower_validate.toml

[graph]
name = "esotericwebb_tower_validate"
description = "Validates esotericWebb V6 Tower composition: biomeOS substrate, Tower health, Webb narrative surface"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

[[graph.nodes]]
name = "verify_tower"
binary = "primalspring_primal"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.tower_health"]

[[graph.nodes]]
name = "verify_esotericwebb"
binary = "primalspring_primal"
order = 2
required = true
spawn = false
depends_on = ["verify_tower"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = [
    "coordination.validate_narrative_surface",
]

[[graph.nodes]]
name = "verify_capability_routing"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["verify_esotericwebb"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = [
    "coordination.validate_composition",
]
