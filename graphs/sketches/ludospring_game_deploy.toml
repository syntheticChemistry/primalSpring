#
# PROTO SKETCH — ludoSpring Game Science deploy graph.
#
# This is an upstream sketch co-evolved by primalSpring and ludoSpring.
# primalSpring does NOT own, build, or run the ludospring binary.
# ludoSpring validates and evolves this graph; esotericWebb eventually
# takes ownership as the final gameplay creation tool.
#
# The sketch documents the expected composition shape: NUCLEUS base
# (biomeOS + Tower) with ludoSpring registering 8 game.* capabilities.
# Consumers discover ludoSpring via biomeOS capability.discover("game").
#
# Usage (by ludoSpring, not primalSpring):
#   biomeos deploy --graph graphs/sketches/ludospring_game_deploy.toml

[graph]
name = "ludospring_game_deploy"
description = "ludoSpring V14 game science primal via biomeOS composition: Tower + game.* surface"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

# ── Phase 0: biomeOS substrate ────────────────────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

# ── Phase 1: Tower Atomic (security + discovery) ─────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.check"
by_capability = "security"
capabilities = [
    "crypto.sign", "crypto.verify", "crypto.identity",
    "crypto.generate_keypair", "beacon.generate",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.check"
by_capability = "discovery"
capabilities = [
    "net.discovery", "net.mesh",
    "birdsong.generate_encrypted_beacon",
]

# ── Phase 2: ludoSpring game-science primal ───────────────────────────
[[graph.nodes]]
name = "ludospring"
spawn = true
security_model = "tower_delegated"
binary = "ludospring"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.check"
by_capability = "game"
capabilities = [
    "game.evaluate_flow",
    "game.fitts_cost",
    "game.engagement",
    "game.difficulty_adjustment",
    "game.wfc_step",
    "game.generate_noise",
    "game.analyze_ui",
    "game.accessibility",
]
