#
# PROTO SKETCH — esotericWebb Tower (minimum viable composed product).
#
# This is an upstream sketch co-evolved by primalSpring and ludoSpring.
# primalSpring does NOT own, build, or run the esotericwebb binary.
# esotericWebb takes ownership of this graph as the final gameplay
# creation tool.
#
# The sketch documents the simplest path: biomeOS + Tower Atomic
# (BearDog security + Songbird discovery) + esotericWebb standalone
# text CRPG with embedded game science (no ludoSpring required).
#
# Usage (by esotericWebb, not primalSpring):
#   biomeos deploy --graph graphs/sketches/esotericwebb_tower_deploy.toml

[graph]
name = "esotericwebb_tower_deploy"
description = "esotericWebb V6 as composed product: biomeOS + Tower + narrative engine (embedded game science)"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

# ── Phase 0: biomeOS substrate ────────────────────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

# ── Phase 1: Tower Atomic ────────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.check"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.check"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# ── Phase 2: esotericWebb — the composed product ─────────────────────
# V6: self-contained narrative + game science. Discovers Tower primals
# via biomeOS or Songbird. Exposes session.*, webb.*, tools.* surface.
[[graph.nodes]]
name = "esotericwebb"
spawn = true
security_model = "tower_delegated"
binary = "esotericwebb"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "webb.liveness"
by_capability = "narrative"
args = ["serve"]
capabilities = [
    "webb.liveness",
    "webb.health",
    "webb.scene.current",
    "webb.narrative.status",
    "webb.content.list",
    "session.start",
    "session.state",
    "session.actions",
    "session.act",
    "session.history",
    "session.narrate",
    "session.graph",
    "tools.list",
    "tools.call",
]
