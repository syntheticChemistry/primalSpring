# SPDX-License-Identifier: AGPL-3.0-or-later
#
# PROTO SKETCH — C7: Full Interactive Product (all subsystems composed).
#
# Upstream sketch co-evolved by primalSpring and ludoSpring.
# primalSpring does NOT own or run the esotericwebb or ludospring
# binaries. esotericWebb takes ownership of this graph as the final
# gameplay creation tool.
#
# Documents the full product composition shape:
#   Phase 0: biomeOS Neural API (orchestration substrate)
#   Phase 1: Tower Atomic — BearDog + Songbird
#   Phase 2: NestGate (persistence)
#   Phase 3: Squirrel (AI narration) + petalTongue (render + proprioception)
#   Phase 4: ludoSpring (game science — optional, parallel peer)
#   Phase 5: esotericWebb (narrative engine — downstream consumer)
#
# primalSpring validates primal-layer readiness (C1/C2/C5/C6).
# ludoSpring validates game science (C4). esotericWebb validates the
# composed product (C3/C7).
#
# Usage (by esotericWebb, not primalSpring):
#   biomeos deploy --graph graphs/sketches/interactive_product.toml

[graph]
name = "interactive_product"
description = "C7: Full interactive product — all subsystems composed: render + narration + session + game science + persistence + proprioception"
version = "1.0.0"
coordination = "sequential"
bond_type = "covalent"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

# ── Phase 0: biomeOS substrate ─────────────────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "capability.call", "graph.list", "graph.execute"]

# ── Phase 1: Tower Atomic ──────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# ── Phase 2: Persistence (C5) ─────────────────────────────────────
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 3
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

# ── Phase 3: AI + Visualization (C2 + C1 + C6) ───────────────────
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 4
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.query", "ai.complete", "ai.chat", "context.create", "context.summarize"]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 5
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
args = ["server"]
capabilities = [
    "visualization.render.scene",
    "visualization.render.dashboard",
    "visualization.export",
    "interaction.subscribe",
    "interaction.poll",
    "visualization.interact.apply",
    "visualization.session.list",
    "visualization.showing",
]

# ── Phase 4: Game Science (C4) ────────────────────────────────────
[[graph.nodes]]
name = "ludospring"
spawn = true
security_model = "tower_delegated"
binary = "ludospring"
order = 6
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.check"
by_capability = "game"
args = ["server"]
capabilities = ["game.evaluate_flow", "game.wfc_step", "game.engagement"]

# ── Phase 5: Narrative Product (C3) ───────────────────────────────
[[graph.nodes]]
name = "esotericwebb"
spawn = true
security_model = "tower_delegated"
binary = "esotericwebb"
order = 7
required = true
depends_on = ["beardog", "songbird"]
health_method = "webb.liveness"
by_capability = "narrative"
args = ["serve"]
capabilities = [
    "session.start",
    "session.state",
    "session.actions",
    "session.act",
    "session.graph",
    "webb.liveness",
]
