# SPDX-License-Identifier: AGPL-3.0-or-later
#
# PROTO SKETCH — C7: Full Interactive Product (Pure Composition)
#
# The canonical "full product" graph: every NUCLEUS primal composed
# into an interactive CRPG product. No downstream binaries — the
# graph IS the product, biomeOS IS the execution engine.
#
# Documents the full product composition shape:
#   Phase 0: biomeOS Neural API (orchestration substrate)
#   Phase 1: Tower Atomic — BearDog + Songbird
#   Phase 2: NestGate (persistence) + toadStool (compute)
#   Phase 3: Squirrel (AI narration/DDA) + petalTongue (render + proprioception)
#   Phase 4: barraCuda (GPU: Fitts, Flow, Perlin, WFC)
#   Phase 5: Provenance Trio (session DAG, creative attribution, anti-cheat)
#
# All prior ludoSpring/esotericWebb "binary" work validated these
# composition patterns. The graph replaces the binaries.
#
# Usage:
#   biomeos deploy --graph graphs/sketches/interactive_product.toml

[graph]
name = "interactive_product"
description = "C7: Full interactive product — pure NUCLEUS composition: render + narration + session + game math + persistence + provenance"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic", "node_atomic", "provenance_trio"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

# ── Phase 0: biomeOS substrate ─────────────────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["capability.discover", "graph.deploy", "graph.list"]

# ── Phase 1: Tower Atomic ──────────────────────────────────────────
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["net.discovery", "net.mesh"]

# ── Phase 2: Persistence + Compute ────────────────────────────────
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.execute"]

# ── Phase 3: AI + Visualization ───────────────────────────────────
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 5
required = true
spawn = false
depends_on = ["beardog", "songbird", "toadstool", "nestgate"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = [
    "ai.query", "ai.complete",
    "ai.narrate", "ai.constrain_ruleset",
    "mcp.tools.list", "mcp.tools.call",
]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 6
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
capabilities = [
    "visualization.render.scene",
    "visualization.render.dashboard",
    "visualization.export",
    "interaction.subscribe",
    "interaction.poll",
]

# ── Phase 4: GPU game math (replaces ludospring binary) ───────────
[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 7
required = false
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.fitts", "tensor.flow_sigmoid", "tensor.engagement",
    "tensor.perlin", "tensor.wfc", "tensor.noise",
    "tensor.matmul",
]

# ── Phase 5: Provenance Trio (session integrity) ──────────────────
[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 8
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "provenance"
security_model = "tower_delegated"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 9
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["session.commit", "entry.append"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 10
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = ["provenance.create_braid", "provenance.lineage"]
