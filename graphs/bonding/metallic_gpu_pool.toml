#
# Metallic GPU Pool — shared ToadStool fleet with delocalized compute.
# Like the "electron sea" model in metallic bonding: compute resources
# are shared across all nodes rather than owned by one.
#
# biomeOS routes compute.dispatch requests to the best available node
# based on current load, GPU availability, and proximity.
#
# Usage:
#   biomeos deploy --graph graphs/bonding/metallic_gpu_pool.toml

[graph]
name = "metallic_gpu_pool"
description = "Shared GPU pool for compute-heavy pipelines — delocalized electron sea, ToadStool fleet coordination"
version = "1.0.0"
coordination = "parallel"
bond_type = "metallic"
science_domain = "high_performance_compute"

# ── Shared Tower (all nodes see same BirdSong mesh) ───────────────────
[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity"]

[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

[[graph.node]]
name = "biomeos"
binary = "biomeos_primal"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "ecosystem"
capabilities = ["graph.execution", "ecosystem.coordination", "route.register"]

# ── Fleet ToadStool nodes (delocalized compute) ───────────────────────
[[graph.node]]
name = "toadstool_pool"
binary = "toadstool_primal"
order = 4
required = true
depends_on = ["biomeos"]
health_method = "compute.health"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "compute.execute", "compute.gpu", "compute.pool"]
bond_role = "metallic_pool"
instances = 3

# ── Science springs that consume the pool ──────────────────────────────
[[graph.node]]
name = "hotspring"
binary = "hotspring_primal"
order = 5
required = true
depends_on = ["toadstool_pool"]
health_method = "compute.health"
by_capability = "precision"
capabilities = ["compute.df64", "compute.precision"]

[[graph.node]]
name = "neuralspring"
binary = "neuralspring_primal"
order = 6
required = true
depends_on = ["toadstool_pool"]
health_method = "neural.health"
by_capability = "neural"
capabilities = ["neural.evoformer", "neural.spectral"]
