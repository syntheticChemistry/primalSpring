# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Proto-Nucleate Graph — ludoSpring Game Science (Pure Composition)
#
# ludoSpring is NOT a binary. It is a composition of NUCLEUS primals
# that biomeOS deploys and executes directly. The "game science"
# capabilities emerge from composing existing primals:
#
#   game.evaluate_flow / game.fitts_cost / game.engagement
#     → barraCuda (sigmoid, dot product, noise) + toadStool (dispatch)
#   game.wfc_step / game.generate_noise
#     → barraCuda (Perlin, WFC shaders) + toadStool (dispatch)
#   game.analyze_ui / game.accessibility / game.difficulty_adjustment
#     → Squirrel (AI analysis + DDA) + petalTongue (rendering context)
#   Session / state / provenance
#     → NestGate (storage)
#
# All prior ludoSpring "binary" work is VALIDATION — it proved these
# composition patterns work (Fitts, Flow, DDA, session lifecycle).
# The graph IS the product. biomeOS IS the execution engine.
#
# Usage:
#   biomeos deploy --graph graphs/downstream/ludospring_proto_nucleate.toml

[graph]
name = "ludospring_proto_nucleate"
description = "ludoSpring game science — pure NUCLEUS composition, no downstream binary"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
owner = "ludoSpring"
pattern = "proto_nucleate"
composition_model = "pure"
fragments = ["tower_atomic", "node_atomic", "meta_tier"]
evolution_target = "game science via primal composition"

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
tower_to_nest = "metallic"
node_to_nest = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"
encryption_tiers.nest = "delegated"
encryption_tiers.meta = "delegated"

# ═══════════════════════════════════════════════════════════════
# Tower Base (fragment: tower_atomic)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.identity"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["net.discovery", "net.mesh", "network.http_request"]

# ═══════════════════════════════════════════════════════════════
# Compute: GPU game math (fragment: node_atomic, partial)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = ["shader.compile", "shader.list"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 5
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.fitts", "tensor.flow_sigmoid", "tensor.engagement",
    "tensor.perlin", "tensor.wfc", "tensor.noise",
    "tensor.matmul", "tensor.dot",
]

# ═══════════════════════════════════════════════════════════════
# AI: DDA, analysis, accessibility
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 6
required = true
spawn = false
depends_on = ["beardog", "songbird", "toadstool"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = [
    "ai.query", "ai.complete",
    "ai.difficulty_adjustment", "ai.analyze_ui", "ai.accessibility",
]

# ═══════════════════════════════════════════════════════════════
# Interface: rendering context for game scenes
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 7
required = false
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
capabilities = [
    "visualization.render.scene", "visualization.render.dashboard",
    "interaction.poll", "interaction.subscribe",
]

# ═══════════════════════════════════════════════════════════════
# Storage: session state, game saves
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 8
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve"]
