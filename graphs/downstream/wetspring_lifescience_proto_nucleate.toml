# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Proto-Nucleate Graph — wetSpring Life Science & Analytical Chemistry
#
# wetSpring owns this graph. primalSpring provides the proto-nucleate
# pattern showing how wetSpring composes NUCLEUS primals into life
# science pipelines: 16S rRNA analysis, LC-MS chromatography, PFAS
# detection, biodiversity monitoring, and sensor-driven ecology.
#
# All NUCLEUS nodes have spawn = false — they are already running.
# wetSpring discovers them via biomeOS capability routing.
# The wetspring binary is built by the wetSpring repo.
#
# Key insight: life science computation is a WGSL shader composition.
# barraCuda provides spectral analysis, peak detection, statistical
# clustering, and time-series shaders. coralReef compiles domain WGSL
# (mass-spec deconvolution, phylogenetic tree, biodiversity indices).
# NestGate stores high-volume sensor and measurement data. The
# provenance trio attributes every sample for regulatory compliance.
#
# Composition: Tower + shader compile (coralReef) + compute dispatch
# (toadStool) + GPU math (barraCuda) + specimen data (NestGate) +
# reproducibility (Provenance trio) + Squirrel (AI classification) +
# petalTongue (dashboards) + life science app (wetSpring).
#
# How a life science pipeline flows:
#   1. wetSpring defines the analysis (16S, LC-MS, PFAS screening)
#   2. coralReef compiles WGSL kernels: spectral deconvolution,
#      peak detection, clustering, phylogenetic distance
#   3. toadStool dispatches to GPU (or NPU for edge classification)
#   4. barraCuda executes: FFT, peak detection, statistical clustering
#   5. Squirrel classifies results via inference.complete (AI triage)
#   6. NestGate stores specimen data and analytical results
#   7. Provenance trio witnesses every sample for chain-of-custody
#   8. petalTongue renders real-time dashboards for lab monitoring
#
# Edge deployment (fieldMouse pattern):
#   - Tower-only chimera on water quality sensors
#   - Sensor data via Songbird mesh → NestGate on gate
#   - Squirrel classification on gate → petalTongue alert dashboard
#
# Evolution path:
#   wetSpring absorbs this graph and evolves:
#   - Compose barraCuda spectral shaders into LC-MS deconvolution
#   - Compose statistical shaders into biodiversity index calculation
#   - Use coralReef for domain-specific WGSL (16S, PFAS fingerprint)
#   - Use toadStool for GPU/NPU dispatch (Akida edge classification)
#   - NestGate for time-series sensor storage (high-frequency streams)
#   - Squirrel for AI-driven sample triage and anomaly detection
#   - Provenance: every specimen attributed for regulatory compliance
#   - Pass back: time-series storage patterns, streaming pipelines,
#     AI classification latency requirements, sensor fusion models,
#     biodiversity attribution patterns for provenance trio
#
# Security: inherits Tower Atomic BTSP perimeter.
# Specimen data may require ionic bonding for CLIA/CAP compliance
# (similar to healthSpring enclave pattern).
#
# Usage (by wetSpring, not primalSpring):
#   biomeos deploy --graph graphs/downstream/wetspring_lifescience_proto_nucleate.toml

[graph]
name = "wetspring_lifescience_proto_nucleate"
description = "wetSpring life science as WGSL shader composition: coralReef + toadStool + barraCuda + NestGate + Squirrel (AI triage) + petalTongue (dashboards) + provenance"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
owner = "wetSpring"
pattern = "proto_nucleate"
pattern_version = "2026-04-10"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
particle_profile = "balanced"
science_domain = "life_science_chemistry"
composition_model = "nucleated"
fragments = ["tower_atomic", "node_atomic", "nest_atomic", "meta_tier"]

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
tower_to_nest = "metallic"
node_to_nest = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"
encryption_tiers.nest = "delegated"
encryption_tiers.meta = "delegated"

# ═══════════════════════════════════════════════════════════════
# Phase 0: biomeOS Neural API (spawn = false — already running)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

# ═══════════════════════════════════════════════════════════════
# Phase 1: Tower Atomic (spawn = false — already running)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519", "crypto.blake3_hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ═══════════════════════════════════════════════════════════════
# Phase 2: WGSL shader compute primals (spawn = false)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 3
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "shader_compile"
security_model = "tower_delegated"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 5
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"
security_model = "tower_delegated"
capabilities = ["math.tensor", "math.stats", "math.spectral", "math.fft"]

# ═══════════════════════════════════════════════════════════════
# Phase 2b: Persistence + Provenance (spawn = false)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 6
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 7
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "tower_delegated"
capabilities = ["dag", "dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 8
required = true
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["spine.create", "entry.append", "session.commit"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 9
required = true
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = ["braid.create", "braid.commit", "provenance.graph"]

# ═══════════════════════════════════════════════════════════════
# Phase 3: Meta-tier primals (spawn = false)
#
# wetSpring is the most meta-tier-heavy science spring:
# Squirrel for AI-driven sample triage, petalTongue for
# real-time lab monitoring dashboards.
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 10
required = false
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = ["ai.query", "ai.complete", "inference.complete", "inference.embed"]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 11
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "render"
security_model = "tower_delegated"
capabilities = ["render.dashboard", "tui.push"]

# ═══════════════════════════════════════════════════════════════
# Phase 4: wetSpring (spawn = true — built by wetSpring repo)
#
# wetSpring is the LIFE SCIENCE application layer. It composes
# WGSL shader primals into analytical chemistry, biodiversity,
# and sensor-driven ecology pipelines.
#
# Evolution targets (wetSpring absorbs and evolves):
#   - Compose barraCuda spectral shaders into LC-MS deconvolution
#   - Compose statistical shaders into biodiversity indices
#   - Use coralReef for 16S/PFAS/domain WGSL compilation
#   - Use Squirrel for AI-driven anomaly detection + triage
#   - Use petalTongue for real-time lab monitoring dashboards
#   - NestGate for time-series sensor + specimen storage
#   - Provenance: every sample attributed for chain-of-custody
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "wetspring"
binary = "wetspring_primal"
order = 20
required = true
spawn = true
depends_on = ["beardog", "songbird", "coralreef", "toadstool", "barracuda", "nestgate"]
health_method = "health.liveness"
by_capability = "life_science"
security_model = "tower_delegated"
capabilities = [
    "science.spectral_analysis",
    "science.peak_detection",
    "science.biodiversity_index",
    "science.pfas_screening",
    "science.phylogenetic_tree",
    "science.sensor_fusion",
    "compute.lcms_deconvolution",
]

# ═══════════════════════════════════════════════════════════════
# Phase 5: Validation
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "validate_wetspring_lifescience"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["wetspring"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["coordination.validate_composition"]
