# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Proto-Nucleate Graph — groundSpring Geoscience & Measurement Science
#
# groundSpring owns this graph. primalSpring provides the proto-nucleate
# pattern showing how groundSpring composes NUCLEUS primals into
# measurement science, inverse problems, sensing, and cross-domain
# statistical analysis pipelines.
#
# All NUCLEUS nodes have spawn = false — they are already running.
# groundSpring discovers them via biomeOS capability routing.
# The groundspring binary is built by the groundSpring repo.
#
# Key insight: measurement science is a composition of statistical
# and numerical WGSL shaders. barraCuda provides noise analysis,
# inverse problem solvers, and statistical primitives. coralReef
# compiles domain-specific WGSL (Anderson-Darling, WDM, seismic
# models). groundSpring is the application layer that composes these
# into calibration, validation, and sensing pipelines.
#
# Composition: Tower + shader compile (coralReef) + compute dispatch
# (toadStool) + GPU math (barraCuda) + measurement data (NestGate) +
# reproducibility (Provenance trio) + geoscience app (groundSpring).
#
# How a measurement science pipeline flows:
#   1. groundSpring defines the measurement model and noise profile
#   2. coralReef compiles WGSL kernels: noise filters, statistical
#      tests, inverse problem solvers, calibration operators
#   3. toadStool dispatches to GPU substrate
#   4. barraCuda executes: FFT, matrix decomposition, statistics
#   5. groundSpring orchestrates calibration → measurement → analysis
#   6. NestGate stores geospatial data and calibration records
#   7. Provenance trio witnesses measurements for audit trails
#
# Evolution path:
#   groundSpring absorbs this graph and evolves:
#   - Compose barraCuda statistical shaders into Anderson-Darling tests
#   - Compose FFT/matrix shaders into seismic inverse problem solvers
#   - Use coralReef to compile soil/geology-specific WGSL
#   - NestGate for geospatial indexing and long-duration storage
#   - Provenance: every calibration witnessed for traceability
#   - Pass back: geospatial storage patterns, long-duration data gaps,
#     statistical shader needs, inverse problem composition models
#
# Security: inherits Tower Atomic BTSP perimeter.
#
# Usage (by groundSpring, not primalSpring):
#   biomeos deploy --graph graphs/downstream/groundspring_geoscience_proto_nucleate.toml

[graph]
name = "groundspring_geoscience_proto_nucleate"
description = "groundSpring geoscience as WGSL shader composition: coralReef (compile) + toadStool (dispatch) + barraCuda (stats/FFT shaders) + NestGate (geospatial) + provenance (audit)"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
owner = "groundSpring"
pattern = "proto_nucleate"
pattern_version = "2026-04-10"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
particle_profile = "balanced"
science_domain = "geoscience_measurement"
composition_model = "nucleated"
fragments = ["tower_atomic", "node_atomic", "nest_atomic"]

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
tower_to_nest = "metallic"
node_to_nest = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"
encryption_tiers.nest = "delegated"

# ═══════════════════════════════════════════════════════════════
# Phase 0: biomeOS Neural API (spawn = false — already running)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "discovery"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

# ═══════════════════════════════════════════════════════════════
# Phase 1: Tower Atomic (spawn = false — already running)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

# ═══════════════════════════════════════════════════════════════
# Phase 2: WGSL shader compute primals (spawn = false)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 3
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv", "shader.compile.capabilities"]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch", "compute.execute", "compute.capabilities"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 5
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.matmul",
    "tensor.batch.submit",
    "stats.mean",
    "stats.std_dev",
    "noise.perlin2d",
    "compute.dispatch",
]

# ═══════════════════════════════════════════════════════════════
# Phase 2b: Persistence + Provenance (spawn = false)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 6
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve", "storage.list", "storage.exists"]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 7
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "tower_delegated"
capabilities = ["dag", "dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 8
required = true
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["spine.create", "entry.append", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 9
required = true
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]

# ═══════════════════════════════════════════════════════════════
# Phase 4: groundSpring (spawn = true — built by groundSpring repo)
#
# groundSpring is the MEASUREMENT SCIENCE application layer.
# It composes WGSL shader primals into calibration, inverse
# problem, and geoscience analysis pipelines.
#
# Evolution targets (groundSpring absorbs and evolves):
#   - Compose barraCuda stats shaders into Anderson-Darling tests
#   - Compose FFT/matrix shaders into seismic inverse solvers
#   - Use coralReef to compile geology-specific WGSL
#   - NestGate for geospatial indexing, long-duration records
#   - Provenance: every calibration traced for regulatory audit
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "groundspring"
binary = "groundspring_primal"
order = 10
required = true
spawn = true
depends_on = ["beardog", "songbird", "coralreef", "toadstool", "barracuda", "nestgate"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = [
    "science.noise_analysis",
    "science.inverse_problem",
    "science.calibration",
    "science.anderson_darling",
    "science.seismic_model",
    "compute.statistical_test",
    "compute.matrix_decomposition",
]

# ═══════════════════════════════════════════════════════════════
# Phase 5: Validation
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "validate_groundspring_geoscience"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["groundspring"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "tower_delegated"
capabilities = ["coordination.validate_composition"]
