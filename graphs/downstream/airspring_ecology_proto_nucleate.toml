#
# Proto-Nucleate Graph — airSpring Ecological & Agricultural Science
#
# airSpring owns this graph. primalSpring provides the proto-nucleate
# pattern showing how airSpring composes NUCLEUS primals into
# ecological modeling, FAO-56 evapotranspiration, atmospheric
# simulation, and IoT sensor pipelines.
#
# All NUCLEUS nodes have spawn = false — they are already running.
# airSpring discovers them via biomeOS capability routing.
# The airspring binary is built by the airSpring repo (NOT in plasmidBin).
#
# Key insight: ecological and agricultural computation is a WGSL shader
# composition. barraCuda's PDE solvers, FFT, and statistical shaders
# provide the math for evapotranspiration models, atmospheric diffusion,
# and sensor fusion. coralReef compiles domain-specific WGSL (FAO-56,
# soil-plant-atmosphere models). toadStool dispatches to GPU/CPU/NPU
# substrates. airSpring is the application layer that composes these
# into science pipelines.
#
# Composition: Tower + shader compile (coralReef) + compute dispatch
# (toadStool) + GPU math (barraCuda) + sensor data cache (NestGate) +
# reproducibility (Provenance trio) + ecology application (airSpring).
#
# How an ecological simulation flows:
#   1. airSpring defines the model (FAO-56, diffusion, microbiome)
#   2. coralReef compiles WGSL kernels: PDE solvers, ET₀ calculation,
#      soil moisture balance, atmospheric transport
#   3. toadStool dispatches to GPU (or NPU for edge sensor nodes)
#   4. barraCuda executes: FFT, PDE integration, statistical analysis
#   5. airSpring orchestrates multi-stage pipeline (ingest → compute → store)
#   6. NestGate stores time-series sensor data and model outputs
#   7. Provenance trio witnesses every measurement for attribution
#
# Edge deployment (fieldMouse pattern):
#   - Tower-only chimera on sensor nodes (RPi, Coral, Akida)
#   - Sensor data ingested via Songbird mesh → NestGate on gate
#   - Compute on gate's Node atomic, attribution on gate's Nest
#
# Evolution path:
#   airSpring absorbs this graph and evolves:
#   - Compose barraCuda PDE/FFT shaders into atmospheric models
#   - Use coralReef to compile ET₀ and soil-plant-atmosphere WGSL
#   - Use toadStool for GPU/NPU dispatch (Akida edge sensors)
#   - NestGate for time-series storage of IoT sensor streams
#   - Provenance: every measurement attributed for regulatory compliance
#   - Pass back: NPU dispatch patterns, time-series storage gaps,
#     streaming pipeline patterns, edge sensor composition models
#
# Security: inherits Tower Atomic BTSP perimeter. airSpring traffic
# is same-host UDS behind the Tower boundary (tower_delegated).
#
# Usage (by airSpring, not primalSpring):
#   biomeos deploy --graph graphs/downstream/airspring_ecology_proto_nucleate.toml

[graph]
name = "airspring_ecology_proto_nucleate"
description = "airSpring ecology as WGSL shader composition: coralReef (compile) + toadStool (dispatch) + barraCuda (PDE/FFT shaders) + NestGate (sensor data) + provenance (attribution)"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
owner = "airSpring"
pattern = "proto_nucleate"
pattern_version = "2026-04-10"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
particle_profile = "balanced"
science_domain = "ecology_agriculture"
composition_model = "nucleated"
fragments = ["tower_atomic", "node_atomic", "nest_atomic"]

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
tower_to_nest = "metallic"
node_to_nest = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"
encryption_tiers.nest = "delegated"

# ═══════════════════════════════════════════════════════════════
# Phase 0: biomeOS Neural API (spawn = false — already running)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "discovery"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

# ═══════════════════════════════════════════════════════════════
# Phase 1: Tower Atomic (spawn = false — already running)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

# ═══════════════════════════════════════════════════════════════
# Phase 2: WGSL shader compute primals (spawn = false)
#
# barraCuda PDE solvers and FFT provide the math for atmospheric
# and ecological models. coralReef compiles domain WGSL. toadStool
# dispatches to GPU/CPU/NPU for edge and gate deployments.
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 3
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv", "shader.compile.capabilities"]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch", "compute.execute", "compute.capabilities"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 5
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.matmul",
    "tensor.batch.submit",
    "stats.mean",
    "stats.std_dev",
    "noise.perlin2d",
    "compute.dispatch",
]

# ═══════════════════════════════════════════════════════════════
# Phase 2b: Persistence + Provenance (spawn = false)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 6
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve", "storage.list", "storage.exists"]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 7
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "tower_delegated"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 8
required = true
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["spine.create", "entry.append", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 9
required = true
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]

# ═══════════════════════════════════════════════════════════════
# Phase 4: airSpring (spawn = true — built by airSpring repo)
#
# airSpring is the ECOLOGY APPLICATION layer. It composes WGSL
# shader primals into evapotranspiration, atmospheric diffusion,
# soil-microbiome, and sensor fusion pipelines.
#
# Evolution targets (airSpring absorbs and evolves):
#   - Compose barraCuda PDE shaders into FAO-56 ET₀ models
#   - Compose FFT shaders into atmospheric transport models
#   - Use coralReef to compile ecological WGSL (soil moisture,
#     canopy resistance, crop coefficient models)
#   - Use toadStool for GPU/NPU dispatch (Akida edge sensors)
#   - NestGate for time-series IoT sensor storage
#   - Provenance: every measurement attributed for regulatory
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "airspring"
binary = "airspring_primal"
order = 10
required = true
spawn = true
depends_on = ["beardog", "songbird", "coralreef", "toadstool", "barracuda", "nestgate"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = [
    "science.evapotranspiration",
    "science.atmospheric_diffusion",
    "science.soil_microbiome",
    "science.sensor_fusion",
    "science.crop_water_balance",
    "compute.pde_solver",
    "compute.fft_analysis",
]

# ═══════════════════════════════════════════════════════════════
# Phase 5: Validation (spawn = false — primalSpring coordination)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "validate_airspring_ecology"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["airspring"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "tower_delegated"
capabilities = ["coordination.validate_composition"]
