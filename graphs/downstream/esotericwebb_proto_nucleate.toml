# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Proto-Nucleate Graph — esotericWebb CRPG Product (Pure Composition)
#
# esotericWebb is NOT a binary. It is a composition of NUCLEUS primals
# that biomeOS deploys and executes directly. The CRPG product
# capabilities emerge from composing existing primals:
#
#   session.start / session.state / session.act / session.history
#     → NestGate (session storage) + biomeOS (graph execution lifecycle)
#   webb.scene.current / webb.narrative.status
#     → Squirrel (AI narration constrained by ruleset) + petalTongue (scene rendering)
#   tools.list / tools.call
#     → Squirrel (MCP tool surface)
#   Anti-cheat / provenance / creative attribution
#     → BearDog (Ed25519 signing) + provenance trio (session DAG, attribution)
#
# All prior esotericWebb "binary" work is VALIDATION — it proved the
# composition patterns work (session lifecycle, narrative AI, MCP tools,
# proprioception rendering). The graph IS the product.
#
# Usage:
#   biomeos deploy --graph graphs/downstream/esotericwebb_proto_nucleate.toml

[graph]
name = "esotericwebb_proto_nucleate"
description = "esotericWebb CRPG — pure NUCLEUS composition, no downstream binary"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
owner = "esotericWebb"
pattern = "proto_nucleate"
composition_model = "pure"
fragments = ["tower_atomic", "nest_atomic", "meta_tier"]
evolution_target = "CRPG product via primal composition"

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_nest = "metallic"
encryption_tiers.tower = "full"
encryption_tiers.nest = "delegated"
encryption_tiers.meta = "delegated"

# ═══════════════════════════════════════════════════════════════
# Tower Base (fragment: tower_atomic)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "discovery"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

# ═══════════════════════════════════════════════════════════════
# AI: narration, MCP tools, DDA
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "inference"
security_model = "tower_delegated"
capabilities = ["inference.complete", "inference.embed", "ai.query"]

# ═══════════════════════════════════════════════════════════════
# Interface: scene rendering + proprioception
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 4
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = [
    "visualization.render.scene", "visualization.render.dashboard",
    "interaction.poll", "interaction.subscribe",
]

# ═══════════════════════════════════════════════════════════════
# Storage: session state, game saves, narrative history
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 5
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve", "storage.list", "storage.exists"]

# ═══════════════════════════════════════════════════════════════
# Provenance Trio: session DAG, creative attribution, anti-cheat
# (fragment: provenance_trio)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 6
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "tower_delegated"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 7
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["spine.create", "entry.append", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 8
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]
