# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Downstream Proto-Nucleate Manifest — parameters for proto_nucleate_template.toml
#
# Each [[downstream]] entry defines a PURE PRIMAL NUCLEUS composition that a
# domain spring validates against. Springs are NOT primals — they do not appear
# as nodes in these graphs. The spring runs its validation harness externally
# against the deployed primal composition (the "primal proof").
#
# Validation ladder:
#   Level 2 (Rust proof):   Spring binary proved Python → Rust parity — DONE
#   Level 5 (Primal proof): Spring validates same science via NUCLEUS IPC — THIS
#
# Former standalone files consolidated here:
#   airspring_ecology_proto_nucleate.toml
#   groundspring_geoscience_proto_nucleate.toml
#   hotspring_qcd_proto_nucleate.toml
#   wetspring_lifescience_proto_nucleate.toml
#   neuralspring_inference_proto_nucleate.toml
#   ludospring_proto_nucleate.toml
#   esotericwebb_proto_nucleate.toml
#
# Genuinely unique (kept standalone):
#   healthspring_enclave_proto_nucleate.toml (dual-tower ionic bridge pattern)

[manifest]
template = "proto_nucleate_template.toml"
version = "2.0.0"
description = "Pure-primal NUCLEUS compositions for 7 downstream domain validations"

[[downstream]]
spring_name = "airspring"
owner = "airSpring"
domain = "ecology_agriculture"
particle_profile = "balanced"
fragments = ["tower_atomic", "node_atomic", "nest_atomic"]
depends_on = ["beardog", "songbird", "coralreef", "toadstool", "barracuda", "nestgate"]
validation_capabilities = [
    "tensor.matmul",
    "stats.mean",
    "compute.dispatch",
    "storage.store",
    "storage.retrieve",
    "crypto.hash",
]

