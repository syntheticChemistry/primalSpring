# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Downstream Proto-Nucleate Manifest — parameters for proto_nucleate_template.toml
#
# Each [[downstream]] entry defines a NUCLEUS composition with a guideStone
# node. The guideStone is a self-validating deployable: it discovers primals
# on startup, runs domain benchmarks, and serves domain capabilities.
# Springs validate the guideStone works, then step aside.
#
# Validation ladder:
#   Level 2 (Rust proof):   Spring binary proved Python → Rust parity — DONE
#   Level 5 (guideStone):   Self-validating NUCLEUS node, IPC to primals — THIS
#   Level 6 (deployment):   biomeOS deploys, guideStone validates and serves
#
# IMPORTANT: validation_capabilities lists the primal IPC methods the spring
# CONSUMES over JSON-RPC — NOT the methods the spring serves. For example,
# hotSpring consumes tensor.matmul (from barraCuda) and crypto.hash (from
# BearDog), but it serves physics.lattice_qcd locally. Only consumed methods
# belong here. Use primalspring::composition::method_to_capability_domain()
# to resolve which capability domain each method routes through.
#
# Former standalone files consolidated here:
#   airspring_ecology_proto_nucleate.toml
#   groundspring_geoscience_proto_nucleate.toml
#   hotspring_qcd_proto_nucleate.toml
#   wetspring_lifescience_proto_nucleate.toml
#   neuralspring_inference_proto_nucleate.toml
#   ludospring_proto_nucleate.toml
#   esotericwebb_proto_nucleate.toml
#
# Genuinely unique (kept standalone):
#   healthspring_enclave_proto_nucleate.toml (dual-tower ionic bridge pattern)

[manifest]
template = "proto_nucleate_template.toml"
version = "3.0.0"
description = "Self-validating NUCLEUS compositions with guideStone nodes for 7 domains"
guidestone_standard = "wateringHole/GUIDESTONE_COMPOSITION_STANDARD.md"

[[downstream]]
spring_name = "airspring"
owner = "airSpring"
domain = "ecology_agriculture"
particle_profile = "balanced"
fragments = ["tower_atomic", "node_atomic", "nest_atomic"]
depends_on = ["beardog", "songbird", "coralreef", "toadstool", "barracuda", "nestgate"]
guidestone_binary = "airspring_guidestone"
guidestone_readiness = 0
validation_capabilities = [
    "tensor.matmul",
    "stats.mean",
    "compute.dispatch",
    "storage.store",
    "storage.retrieve",
    "crypto.hash",
]

[[downstream]]
spring_name = "groundspring"
owner = "groundSpring"
domain = "geoscience"
particle_profile = "balanced"
fragments = ["tower_atomic", "node_atomic", "nest_atomic"]
depends_on = ["beardog", "songbird", "coralreef", "toadstool", "barracuda", "nestgate"]
guidestone_binary = "groundspring_guidestone"
guidestone_readiness = 0
validation_capabilities = [
    "tensor.matmul",
    "stats.mean",
    "compute.dispatch",
    "storage.store",
    "crypto.hash",
]

[[downstream]]
spring_name = "hotspring"
owner = "hotSpring"
domain = "qcd_physics"
particle_profile = "proton_heavy"
fragments = ["tower_atomic", "node_atomic", "nest_atomic"]
depends_on = ["beardog", "songbird", "coralreef", "toadstool", "barracuda", "nestgate"]
guidestone_binary = "hotspring_guidestone"
guidestone_readiness = 5
# validation_capabilities = primal IPC methods the guideStone checks on startup.
# hotSpring's physics.* methods are LOCAL_CAPABILITIES — they are what it proves,
# not what it calls. For the primal proof, hotSpring calls barraCuda/BearDog/etc.
validation_capabilities = [
    "tensor.create",
    "tensor.matmul",
    "tensor.scale",
    "tensor.add",
    "stats.mean",
    "stats.std_dev",
    "compute.dispatch",
    "crypto.hash",
    "tolerances.get",
    "validate.gpu_stack",
]

