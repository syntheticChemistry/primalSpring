# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Proto-Nucleate Graph — neuralSpring ML/AI Inference Composition
#
# neuralSpring owns this graph. primalSpring provides the proto-nucleate
# pattern showing how neuralSpring composes existing WGSL shader primals
# into ML inference — evolving from validation to primal-based composition.
#
# All NUCLEUS nodes have spawn = false — they are already running.
# neuralSpring discovers them via biomeOS capability routing.
# The neuralspring binary is built by the neuralSpring repo (NOT in plasmidBin).
#
# Key insight: ML inference is a COMPOSITION of existing NUCLEUS primals,
# not a new engine. The 826 WGSL compute shaders in barraCuda already
# provide matmul, attention, softmax, layer_norm, gelu, conv — the
# building blocks of transformer forward passes. coralReef compiles
# WGSL shader programs. toadStool dispatches compute workloads to GPU/CPU.
# neuralSpring is the application layer that composes these capabilities
# into tokenization, embedding, and forward-pass pipelines.
#
# Composition: Tower + shader compile (coralReef) + compute dispatch
# (toadStool) + GPU math / WGSL shaders (barraCuda) + inference routing
# (Squirrel) + model weight cache (NestGate) + shader composition
# application (neuralSpring).
#
# How inference flows:
#   1. Consumer calls inference.complete/embed via Squirrel
#   2. Squirrel routes to neuralSpring (or Ollama fallback)
#   3. neuralSpring composes WGSL shader ops for tokenization
#   4. coralReef compiles tokenizer/embedding WGSL shader programs
#   5. toadStool dispatches compiled shaders to GPU/CPU substrate
#   6. barraCuda executes tensor ops (matmul, attention, FFN) via WGSL
#   7. neuralSpring orchestrates the full forward pass as a shader chain
#   8. NestGate caches model weights between runs
#
# Evolution path:
#   neuralSpring absorbs this graph and evolves:
#   - Compose barraCuda WGSL shaders into tokenizer pipelines
#   - Compose attention/FFN shaders into transformer forward passes
#   - Use coralReef to compile specialized WGSL for new model architectures
#   - Use toadStool to dispatch shader workloads across GPU/CPU substrates
#   - Evolve tokenization as a WGSL shader operation within the primals
#   - Register as inference provider via capability.announce
#
# Security: inherits Tower Atomic BTSP perimeter. neuralSpring traffic
# is same-host UDS behind the Tower boundary (tower_delegated).
#
# Usage (by neuralSpring, not primalSpring):
#   biomeos deploy --graph graphs/downstream/neuralspring_inference_proto_nucleate.toml

[graph]
name = "neuralspring_inference_proto_nucleate"
description = "neuralSpring ML inference as WGSL shader composition: coralReef (compile) + toadStool (dispatch) + barraCuda (tensor shaders) + Squirrel (routing)"
version = "1.1.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
owner = "neuralSpring"
pattern = "proto_nucleate"
pattern_version = "2026-04-10"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
composition_model = "nucleated"
fragments = ["tower_atomic", "node_atomic", "meta_tier"]

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
tower_to_nest = "metallic"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"
encryption_tiers.nest = "delegated"
encryption_tiers.meta = "delegated"

# ═══════════════════════════════════════════════════════════════
# Phase 0: biomeOS Neural API (spawn = false — already running)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "discovery"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

# ═══════════════════════════════════════════════════════════════
# Phase 1: Tower Atomic (spawn = false — already running)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

# ═══════════════════════════════════════════════════════════════
# Phase 2: WGSL shader compute primals (spawn = false)
#
# These three primals form the GPU compute substrate that
# neuralSpring composes into ML inference pipelines.
# The shaders ARE the ML engine — neuralSpring applies them.
# ═══════════════════════════════════════════════════════════════

# Shader compilation — coralReef compiles WGSL shader programs
# that define tokenization, attention, and FFN operations.
# neuralSpring evolves new WGSL shaders for ML-specific ops
# (tokenizer kernels, rotary embeddings, KV-cache updates)
# and coralReef compiles them for the target GPU.
[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 3
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv", "shader.compile.capabilities"]

# Compute dispatch — toadStool routes compiled shader workloads
# to GPU/CPU substrates. Manages execution scheduling, substrate
# selection (wgpu GPU vs CPU fallback), and workload ordering
# for multi-stage inference pipelines.
[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 4
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch", "compute.execute", "compute.capabilities"]

# WGSL tensor shaders — barraCuda's 826 WGSL compute shaders
# provide matmul, attention (MHA/GQA/SDPA), softmax, layer_norm,
# gelu, conv, and all the math primitives that transformer
# inference needs. These shaders originated from hotSpring and
# are the actual compute engine for ML inference.
# neuralSpring composes these into forward-pass pipelines.
[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 5
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.matmul",
    "tensor.batch.submit",
    "stats.mean",
    "stats.std_dev",
    "noise.perlin2d",
    "compute.dispatch",
]

# Inference routing — Squirrel discovers inference providers and
# routes inference.complete/embed/models requests. neuralSpring
# registers as a provider; Squirrel can fall back to Ollama/OpenAI
# when neuralSpring shader compositions aren't loaded.
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 6
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "inference"
security_model = "tower_delegated"
capabilities = ["inference.complete", "inference.embed", "ai.query"]

# Model weight storage — NestGate caches model weights (safetensors)
# so shader compositions don't need to re-download between runs.
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 7
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve", "storage.list", "storage.exists"]

# ═══════════════════════════════════════════════════════════════
# Phase 4: neuralSpring (spawn = true — built by neuralSpring repo)
#
# neuralSpring is the COMPOSITION APPLICATION layer. It does not
# contain its own math or shader engine — it composes barraCuda's
# WGSL shaders (via coralReef compilation and toadStool dispatch)
# into ML inference pipelines.
#
# The binary is NOT in plasmidBin — neuralSpring builds it.
#
# Evolution targets (neuralSpring absorbs and evolves):
#   - Compose barraCuda's matmul + attention + softmax shaders
#     into transformer forward passes
#   - Evolve tokenization as WGSL shader compositions within
#     the primals (not as separate neuralSpring code)
#   - Use coralReef to compile specialized WGSL for new ops
#     (rotary embeddings, flash attention, KV-cache kernels)
#   - Use toadStool to schedule multi-stage shader pipelines
#     across GPU/CPU substrates
#   - Register as inference provider for Squirrel to discover
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "neuralspring"
binary = "neuralspring"
order = 10
required = true
spawn = true
depends_on = ["beardog", "songbird", "coralreef", "toadstool", "barracuda", "squirrel"]
health_method = "health.liveness"
by_capability = "inference"
security_model = "tower_delegated"
capabilities = [
    # Inference domain — shader composition application
    "inference.complete",
    "inference.embed",
    "inference.models",
    # Science domain (existing — also shader compositions)
    "science.spectral_analysis",
    "science.gpu_dispatch",
    "science.evoformer_block",
    "science.structure_module",
]

# ═══════════════════════════════════════════════════════════════
# Phase 5: Validation (spawn = false — primalSpring coordination)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "validate_neuralspring_inference"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["neuralspring"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "tower_delegated"
capabilities = ["coordination.validate_composition"]
