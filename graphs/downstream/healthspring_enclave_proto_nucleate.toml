#
# Proto-Nucleate Graph — healthSpring Dual-Tower Enclave (Pure NUCLEUS)
#
# This graph defines the PURE PRIMAL NUCLEUS topology that healthSpring
# validates against. Springs are NOT primals — healthSpring does not appear
# as a node in the NUCLEUS layer. healthSpring validates externally.
#
# The NUCLEUS layer is a dual-tower ionic bond composition — the strongest
# security model in the ecosystem. Patient data never leaves Tower A
# (the HIPAA enclave). Only de-identified aggregates cross the ionic
# bridge to Tower B (the analytics/inference tower).
#
# Architecture (all primals, no spring binaries):
#   Tower A (FAMILY_A) — Patient Data Enclave
#     BearDog A (identity + encryption for patient records)
#     Songbird A (discovery within trust boundary)
#     NestGate A (patient record storage, BondingPolicy egress fence)
#     Provenance trio A (regulatory audit trail)
#
#   Tower B (FAMILY_B) — Analytics/Inference Tower
#     BearDog B (separate trust domain)
#     Songbird B (discovery)
#     Squirrel (clinical AI inference — receives only aggregates)
#     NestGate B (model weights, inference cache)
#     Provenance trio B (inference audit trail)
#
#   Ionic Bridge (between FAMILY_A and FAMILY_B)
#     capabilities_requested: ["inference.complete", "inference.models"]
#     capabilities_denied: ["storage.*", "dag.*"]
#     bonding_policy: metered, time-windowed, auditable
#     data crossing: de-identified aggregates ONLY
#
# The BondingPolicy egress fence on NestGate A ensures patient records
# NEVER leave Tower A. The ionic bridge enforces this at the composition
# level — storage.* capabilities are explicitly denied across towers.
#
# healthSpring validates this NUCLEUS by calling primal capabilities via IPC:
#   - storage.store / storage.retrieve on NestGate A (within Tower A)
#   - inference.complete via Squirrel B (through ionic bridge)
#   - dag.session.create / dag.event.append on provenance trio
#   - crypto.hash / crypto.sign on BearDog A
#
# Evolution path (post primal-proof):
#   Once healthSpring proves the science runs through this NUCLEUS,
#   a separate APPLICATION graph may add the healthspring binary as a
#   biomeOS citizen for clinical workflow orchestration. That is a
#   product-level graph, not a proto-nucleate.
#
# Security: dual BTSP perimeters — Tower A and Tower B each have their
# own BearDog and BTSP handshake. Cross-family traffic is fully
# encrypted via ionic bond (encryption_tiers.cross_family = "full").
#
# Usage:
#   biomeos deploy --graph graphs/downstream/healthspring_enclave_proto_nucleate.toml \
#     --env FAMILY_A=<hex> --env FAMILY_B=<hex>
#   Then healthSpring runs its validation harness against the composition.

[graph]
name = "healthspring_enclave_proto_nucleate"
description = "healthSpring dual-tower enclave: Tower A (patient data, HIPAA) + ionic bond + Tower B (clinical AI inference). BondingPolicy egress fence — patient records never leave Tower A."
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
owner = "healthSpring"
pattern = "proto_nucleate"
pattern_version = "2026-04-17"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
particle_profile = "neutron_heavy"
layer = "L2"
particle_model = "two electron shells, ionic bond"
composition_model = "pure_nucleus"
fragments = ["tower_atomic", "nest_atomic"]
validated_by = "healthspring"
guidestone_binary = "healthspring_guidestone"
guidestone_readiness = 2
validation_capabilities = [
    "storage.store", "storage.retrieve",
    "inference.complete", "inference.embed",
    "dag.session.create", "dag.event.append",
    "crypto.hash", "crypto.sign",
    "braid.create", "braid.commit",
]

[graph.bonding_policy]
tower_internal = "covalent"
cross_family = "ionic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.cross_family = "full"
encryption_tiers.nucleus = "hmac_plain"

# ═══════════════════════════════════════════════════════════════
# TOWER A — Patient Data Enclave (HIPAA trust boundary)
#
# All patient records live here. BondingPolicy egress fence
# prevents any storage.* capability from crossing the ionic
# bridge. Only de-identified aggregates leave this tower.
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos_tower_a"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "discovery"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

[[graph.nodes]]
name = "beardog_a"
binary = "beardog"
order = 1
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird_a"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["beardog_a"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

# Patient record storage — NestGate A with BondingPolicy egress fence.
# storage.* calls are ONLY serviced within Tower A's FAMILY_ID.
# The egress fence is enforced by BondingPolicy: ionic bond between
# families explicitly denies storage.* capabilities.
[[graph.nodes]]
name = "nestgate_a"
binary = "nestgate"
order = 3
required = true
spawn = false
depends_on = ["beardog_a"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve", "storage.list", "storage.exists"]
bond_role = "enclave_storage"

# Provenance trio A — regulatory audit trail for patient data access.
# Every read, write, transform, and de-identification is witnessed.
# Required for HIPAA / clinical data governance compliance.
[[graph.nodes]]
name = "rhizocrypt_a"
binary = "rhizocrypt"
order = 4
required = true
spawn = false
depends_on = ["beardog_a"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "tower_delegated"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine_a"
binary = "loamspine"
order = 5
required = true
spawn = false
depends_on = ["beardog_a", "rhizocrypt_a"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["spine.create", "entry.append", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass_a"
binary = "sweetgrass"
order = 6
required = true
spawn = false
depends_on = ["beardog_a", "loamspine_a"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]

# ═══════════════════════════════════════════════════════════════
# TOWER B — Analytics / Inference Tower
#
# Receives ONLY de-identified aggregates from Tower A via ionic
# bridge. Runs clinical AI inference via Squirrel. Stores model
# weights and inference results (not patient data).
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "beardog_b"
binary = "beardog"
order = 10
required = true
spawn = false
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird_b"
binary = "songbird"
order = 11
required = true
spawn = false
depends_on = ["beardog_b"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

# Clinical AI inference — Squirrel routes inference.complete for
# diagnostic suggestions, pharmacology analysis, and genomic
# variant interpretation. Input is ALWAYS de-identified aggregates
# from the ionic bridge — never raw patient records.
[[graph.nodes]]
name = "squirrel_b"
binary = "squirrel"
order = 12
required = true
spawn = false
depends_on = ["beardog_b", "songbird_b"]
health_method = "health.liveness"
by_capability = "inference"
security_model = "tower_delegated"
capabilities = ["inference.complete", "inference.embed", "ai.query"]

# Model weight + inference result storage — NestGate B holds model
# weights, clinical knowledge bases, and inference results.
# This is NOT patient data — no egress fence needed.
[[graph.nodes]]
name = "nestgate_b"
binary = "nestgate"
order = 13
required = false
spawn = false
depends_on = ["beardog_b"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve", "storage.list", "storage.exists"]

# Provenance trio B — inference audit trail. Tracks which models
# were used, what aggregated input was provided, and what clinical
# suggestions were generated. Links back to Tower A provenance
# for full chain of custody.
[[graph.nodes]]
name = "rhizocrypt_b"
binary = "rhizocrypt"
order = 14
required = false
spawn = false
depends_on = ["beardog_b"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "tower_delegated"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "sweetgrass_b"
binary = "sweetgrass"
order = 15
required = false
spawn = false
depends_on = ["beardog_b", "rhizocrypt_b"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]

# ═══════════════════════════════════════════════════════════════
# IONIC BRIDGE — scoped capability sharing between towers
#
# Tower B can call inference.complete on Tower A's data (via
# de-identified aggregates). Tower B CANNOT call storage.* on
# Tower A (patient records stay in the enclave).
#
# The bridge is mediated by primalSpring's bonding.propose +
# BearDog crypto.sign_contract (ionic bond acceptance).
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "ionic_bridge"
binary = "primalspring_primal"
order = 20
required = true
spawn = false
depends_on = ["songbird_a", "songbird_b"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "tower_delegated"
capabilities = ["bonding.propose", "bonding.accept"]

[graph.nodes.ionic_policy]
from_family = "${FAMILY_B}"
to_family = "${FAMILY_A}"
bond_type = "ionic"
capabilities_requested = ["inference.complete", "inference.models", "health.aggregate"]
capabilities_denied = ["storage.*", "dag.*"]
metered = true
time_window = "session"

# ═══════════════════════════════════════════════════════════════
# END OF NUCLEUS LAYER
#
# This graph is pure primals. No spring binaries appear here.
# healthSpring validates externally against this running composition
# via primalspring::composition::validate_parity().
#
# Post-primal-proof evolution:
#   Once healthSpring proves that clinical science runs through this
#   dual-tower NUCLEUS, a separate APPLICATION GRAPH may add the
#   healthspring binary as a biomeOS citizen for production clinical
#   workflows (de-identification, aggregate computation, workflow
#   orchestration). That is a PRODUCT graph — not a proto-nucleate.
# ═══════════════════════════════════════════════════════════════
