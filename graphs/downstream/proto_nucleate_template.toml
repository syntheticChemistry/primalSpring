#
# Proto-Nucleate Template — Pure NUCLEUS Primal Composition
#
# A proto-nucleate graph is a PURE PRIMAL deployment. No spring binaries
# appear as nodes. Springs are NOT primals — they validate AGAINST this
# composition externally via `primalspring::composition::validate_parity()`.
#
# The validation ladder:
#   Level 2 (Rust proof):   Spring binary proves Python → Rust parity
#   Level 5 (Primal proof): Spring validates same science via NUCLEUS IPC
#
# This template defines the NUCLEUS primal set needed for a domain.
# biomeOS deploys it. The spring runs its validation harness against it.
#
# Parameters (from downstream_manifest.toml):
#   {{spring_name}}               — e.g. "airspring", "wetspring"
#   {{owner}}                     — e.g. "airSpring", "wetSpring"
#   {{domain}}                    — e.g. "ecology_agriculture", "life_science"
#   {{particle_profile}}          — e.g. "balanced", "proton_heavy"
#   {{fragments}}                 — e.g. ["tower_atomic", "node_atomic", "nest_atomic"]
#   {{depends_on}}                — which primals must be running
#   {{validation_capabilities}}   — primal capabilities the spring calls during validation
#
# Genuinely unique downstream graphs kept as standalone files:
#   - healthspring_enclave_proto_nucleate.toml (dual-tower ionic bridge)
#
# Usage:
#   biomeOS instantiates this template per domain using the manifest.
#   The spring then validates against the running composition:
#     cargo run --bin validate_nucleus_parity

[graph]
name = "{{spring_name}}_proto_nucleate"
description = "{{owner}} — NUCLEUS primal composition for {{domain}} domain validation"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
owner = "{{owner}}"
pattern = "proto_nucleate"
pattern_version = "2026-04-17"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
particle_profile = "{{particle_profile}}"
science_domain = "{{domain}}"
composition_model = "pure_nucleus"
fragments = "{{fragments}}"
resolve = true

# Who validates against this composition (metadata, not a graph node)
validated_by = "{{spring_name}}"
validation_capabilities = "{{validation_capabilities}}"

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
tower_to_nest = "metallic"
node_to_nest = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"
encryption_tiers.nest = "delegated"

# All nodes are resolved from fragments at load time.
# This graph is pure primals — no spring binaries, no spawn = true.
# The spring validates externally via IPC against this running composition.
