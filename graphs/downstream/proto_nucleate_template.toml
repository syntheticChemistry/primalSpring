#
# Proto-Nucleate Template — Self-Validating NUCLEUS Composition
#
# A proto-nucleate graph is a NUCLEUS deployment with a guideStone node.
# Primals provide math, crypto, storage, and compute. The guideStone
# self-validates the composition on startup, then serves domain capabilities.
#
# The guideStone pattern (from hotSpring-guideStone-v0.7.0):
#   - 5 certified properties: deterministic, traceable, self-verifying,
#     environment-agnostic, tolerance-documented
#   - Bare guideStone: properties hold without any primals
#   - NUCLEUS guideStone: additive layer (signing, DAG, reporting)
#   - Exit codes: 0=pass, 1=fail, 2=skip (no primals discovered)
#
# The validation ladder:
#   Level 2 (Rust proof):  Spring binary proves Python → Rust parity — DONE
#   Level 5 (guideStone):  Self-validating NUCLEUS node, IPC to primals — THIS
#   Level 6 (deployment):  biomeOS deploys graph, guideStone validates
#
# Parameters (from downstream_manifest.toml):
#   {{spring_name}}               — e.g. "airspring", "wetspring"
#   {{owner}}                     — e.g. "airSpring", "wetSpring"
#   {{domain}}                    — e.g. "ecology_agriculture", "life_science"
#   {{particle_profile}}          — e.g. "balanced", "proton_heavy"
#   {{fragments}}                 — e.g. ["tower_atomic", "node_atomic", "nest_atomic"]
#   {{depends_on}}                — which primals must be running
#   {{guidestone_binary}}         — the self-validating deployable
#   {{validation_capabilities}}   — primal IPC methods the guideStone checks on startup
#
# Genuinely unique downstream graphs kept as standalone files:
#   - healthspring_enclave_proto_nucleate.toml (dual-tower ionic bridge)
#
# Usage:
#   biomeOS instantiates this template per domain using the manifest.
#   The guideStone node self-validates on startup:
#     biomeos deploy --graph <spring>_proto_nucleate
#   Or run standalone for development:
#     cargo run --bin <guidestone_binary>

[graph]
name = "{{spring_name}}_proto_nucleate"
description = "{{owner}} — NUCLEUS primal composition for {{domain}} domain validation"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
owner = "{{owner}}"
pattern = "proto_nucleate"
pattern_version = "2026-04-18"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
particle_profile = "{{particle_profile}}"
science_domain = "{{domain}}"
composition_model = "pure_nucleus"
fragments = "{{fragments}}"
resolve = true

# guideStone — self-validating domain node
# Deploys as part of the NUCLEUS. Self-validates on startup, then serves
# domain capabilities. Runnable standalone for development/CI.
guidestone_binary = "{{guidestone_binary}}"
guidestone_standard = "wateringHole/GUIDESTONE_COMPOSITION_STANDARD.md"
validated_by = "{{spring_name}}"
validation_capabilities = "{{validation_capabilities}}"

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
tower_to_nest = "metallic"
node_to_nest = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"
encryption_tiers.nest = "delegated"

# All primal nodes are resolved from fragments at load time.
# The guideStone node is the domain-specific self-validation entry point.
# It discovers primals, validates IPC parity, then serves domain capabilities.
# See wateringHole/GUIDESTONE_COMPOSITION_STANDARD.md for the 5 properties.

[[graph.nodes]]
name = "{{guidestone_binary}}"
binary = "{{guidestone_binary}}"
spawn = false
role = "guidestone"
capabilities = "{{validation_capabilities}}"
depends_on = "{{depends_on}}"
