#
# Cellular Deployment Manifest — indexes all deployable spring cells.
#
# A "cell" is a self-contained biomeOS deploy graph: NUCLEUS base + domain
# overlay + petalTongue in `live` mode. Each cell is a deployable unit that
# gardens can consume directly.
#
# VPS DEPLOYMENT CONTRACT
# ────────────────────────
# For cellMembrane / VPS standard deployments:
#   - Use ONLY cells with `vps_standard = true` (spawn=false everywhere)
#   - These overlay onto an already-running NUCLEUS provisioned by membrane
#   - Deploy via: biomeos deploy graphs/cells/{spring}_cell.toml
#   - Binaries sourced from plasmidBin depot (pre-populated on VPS image)
#
# Cells with `vps_standard = false` are desktop/demo-only — they self-spawn
# primals and assume DISPLAY, TCP ports, and local plasmidBin. Never deploy
# these to VPS.
#
# Usage:
#   biomeos deploy graphs/cells/<spring>_cell.toml  (VPS + desktop)
#   ./cell_launcher.sh <spring_name> start          (desktop only)

[manifest]
version = "1.1.0"
description = "Cellular deployment index — NUCLEUS base + one cell per spring, each a deployable biomeOS graph"
template_base = "../spring_deploy/spring_deploy_template.toml"
petaltongue_mode = "live"

[[cell]]
spring = "nucleus_desktop"
graph = "nucleus_desktop_cell.toml"
domain = "desktop"
composition_model = "pure"
requires = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "nestgate", "rhizocrypt", "loamspine", "sweetgrass", "squirrel", "petaltongue", "biomeos"]
petaltongue_mode = "live"
is_base = true
vps_standard = false  # self-spawns all 13 primals — desktop-only

[[cell]]
spring = "hotspring"
graph = "hotspring_cell.toml"
domain = "qcd_physics"
binary = "hotspring_primal"
requires = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "nestgate", "rhizocrypt", "loamspine", "sweetgrass", "squirrel", "petaltongue"]
petaltongue_mode = "live"
vps_standard = true  # spawn=false overlay — VPS ready

[[cell]]
spring = "wetspring"
graph = "wetspring_cell.toml"
domain = "biology"
binary = "wetspring"
requires = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "nestgate", "rhizocrypt", "loamspine", "sweetgrass", "petaltongue"]
petaltongue_mode = "live"
vps_standard = true

[[cell]]
spring = "neuralspring"
graph = "neuralspring_cell.toml"
domain = "inference"
binary = "neuralspring"
requires = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "squirrel", "petaltongue"]
petaltongue_mode = "live"
vps_standard = true

[[cell]]
spring = "ludospring"
graph = "ludospring_cell.toml"
domain = "game_science"
composition_model = "pure"
requires = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "nestgate", "rhizocrypt", "loamspine", "sweetgrass", "squirrel", "petaltongue"]
petaltongue_mode = "live"
vps_standard = false  # most primals use spawn=true — desktop/demo only

[[cell]]
spring = "airspring"
graph = "airspring_cell.toml"
domain = "weather"
