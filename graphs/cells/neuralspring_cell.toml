# Cellular deployment graph: neuralSpring
#
# NUCLEUS base + ML inference domain + petalTongue live mode.
# Deploy: biomeos deploy --graph graphs/cells/neuralspring_cell.toml

[graph]
name = "neuralspring_cell"
description = "neuralSpring — NUCLEUS + ML inference + live visualization"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
cell_type = "spring"
domain = "inference"
security_model = "btsp_enforced"
transport = "uds_only"
composition_model = "nucleated"
petaltongue_mode = "live"

# ── NUCLEUS Base ─────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
security_model = "btsp"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
security_model = "btsp"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
security_model = "btsp"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

[[graph.nodes]]
name = "toadstool"
security_model = "btsp"
binary = "toadstool"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch", "compute.execute", "compute.capabilities"]

[[graph.nodes]]
name = "barracuda"
security_model = "btsp"
binary = "barracuda"
order = 4
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "tensor"
capabilities = ["tensor.matmul", "tensor.create", "stats.mean"]

[[graph.nodes]]
name = "coralreef"
security_model = "btsp"
binary = "coralreef"
order = 5
required = true
spawn = false
depends_on = ["toadstool"]
health_method = "health.liveness"
by_capability = "shader_compile"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

# ── Meta Tier ────────────────────────────────────────────────────────

[[graph.nodes]]
name = "squirrel"
security_model = "btsp"
binary = "squirrel"
order = 6
required = true
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.chat", "ai.inference", "inference.complete", "inference.embed"]

[[graph.nodes]]
name = "petaltongue"
security_model = "btsp"
binary = "petaltongue"
order = 7
required = true
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = ["visualization.render", "visualization.render.scene", "visualization.render.stream", "interaction.subscribe", "interaction.poll"]

[graph.nodes.params]
mode = "live"

# ── Domain Overlay ───────────────────────────────────────────────────

[[graph.nodes]]
name = "neuralspring"
security_model = "btsp"
binary = "neuralspring"
order = 11
required = true
depends_on = ["beardog", "songbird", "toadstool", "barracuda", "squirrel"]
health_method = "health.liveness"
by_capability = "inference"
capabilities = ["inference.complete", "inference.embed", "inference.models", "science.spectral_analysis", "science.anderson_localization", "science.hessian_eigen"]

# ── Validation ───────────────────────────────────────────────────────

[[graph.nodes]]
name = "validate_cell"
security_model = "btsp"
order = 99
depends_on = ["neuralspring", "petaltongue"]

[graph.nodes.operation]
name = "health_check"

[graph.nodes.operation.params]
targets = ["beardog", "songbird", "toadstool", "barracuda", "squirrel", "petaltongue", "neuralspring"]
