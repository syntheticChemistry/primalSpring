# Cellular deployment graph: healthSpring
#
# NUCLEUS base + health/clinical domain + petalTongue live mode.
# Note: healthSpring uses the dual-tower ionic bridge pattern (unique).
# Deploy: biomeos deploy --graph graphs/cells/healthspring_cell.toml

[graph]
name = "healthspring_cell"
description = "healthSpring — NUCLEUS + health/clinical + live visualization"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
cell_type = "spring"
domain = "health"
security_model = "btsp_enforced"
transport = "uds_only"
composition_model = "nucleated"
petaltongue_mode = "live"

# ── NUCLEUS Base ─────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 6
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

# ── Meta Tier ────────────────────────────────────────────────────────

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 10
required = false
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.chat", "ai.inference"]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 11
required = true
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = ["visualization.render", "visualization.render.scene", "visualization.render.stream", "interaction.subscribe", "interaction.poll"]

[graph.nodes.params]
mode = "live"

# ── Domain Overlay ───────────────────────────────────────────────────

[[graph.nodes]]
name = "healthspring"
binary = "healthspring_primal"
order = 12
required = true
depends_on = ["beardog", "songbird", "nestgate"]
health_method = "health.liveness"
by_capability = "health"
capabilities = ["health.pharmacology", "health.genomics", "health.clinical", "health.de_identify", "health.aggregate", "data.fetch"]

# ── Validation ───────────────────────────────────────────────────────

[[graph.nodes]]
name = "validate_cell"
order = 99
depends_on = ["healthspring", "petaltongue"]

[graph.nodes.operation]
name = "health_check"

[graph.nodes.operation.params]
targets = ["beardog", "songbird", "nestgate", "petaltongue", "healthspring"]
