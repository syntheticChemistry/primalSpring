# SPDX-License-Identifier: AGPL-3.0-or-later
# Cellular deployment graph: ludoSpring — pure primal composition
#
# Game science via composing existing primals (no spring binary deploys).
# barraCuda provides math/stats/activation; petalTongue renders + receives
# interaction; the provenance trio records sessions.
#
# Architecture: springs validate science (tier 2 Rust), compositions
# deploy via cell graph (tier 3). This is the cell esotericWebb activates.
#
# Deploy: biomeos deploy --graph graphs/cells/ludospring_cell.toml

[graph]
name = "ludospring_cell"
description = "ludoSpring — pure primal composition for game science + live viz"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
cell_type = "spring"
domain = "game_science"
security_model = "btsp_enforced"
transport = "uds_only"
composition_model = "pure"
petaltongue_mode = "live"
tick_hz = 60

# ── NUCLEUS Base ─────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
security_model = "btsp"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
security_model = "btsp"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
security_model = "btsp"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

[[graph.nodes]]
name = "toadstool"
security_model = "btsp"
binary = "toadstool"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch", "compute.execute", "compute.capabilities"]

[[graph.nodes]]
name = "barracuda"
security_model = "btsp"
binary = "barracuda"
order = 4
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "tensor"
capabilities = ["tensor.matmul", "tensor.create", "stats.mean", "stats.std_dev", "stats.variance", "activation.fitts", "activation.hick", "math.sigmoid", "math.log2", "noise.perlin2d", "rng.uniform"]

[[graph.nodes]]
name = "coralreef"
security_model = "btsp"
binary = "coralreef"
order = 5
required = false
spawn = false
depends_on = ["toadstool"]
health_method = "health.liveness"
by_capability = "shader_compile"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

[[graph.nodes]]
name = "nestgate"
security_model = "btsp"
binary = "nestgate"
order = 6
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

[[graph.nodes]]
name = "rhizocrypt"
security_model = "btsp"
binary = "rhizocrypt"
order = 7
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag.session.create", "dag.event.append", "dag.event.append_batch", "dag.vertex.get", "dag.vertex.query", "dag.merkle.root", "dag.merkle.proof", "dag.merkle.verify", "dag.dehydration.trigger"]

[[graph.nodes]]
name = "loamspine"
security_model = "btsp"
binary = "loamspine"
order = 8
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine.create", "entry.append", "entry.get", "certificate.mint", "certificate.transfer", "certificate.loan", "certificate.return", "certificate.get", "proof.generate_inclusion", "anchor.publish", "permanence.commit_session"]

[[graph.nodes]]
name = "sweetgrass"
security_model = "btsp"
binary = "sweetgrass"
order = 9
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor", "anchoring.verify", "provenance.graph", "provenance.export_provo", "attribution.chain", "contribution.record", "pipeline.attribute"]

# ── Meta Tier ────────────────────────────────────────────────────────

[[graph.nodes]]
name = "squirrel"
security_model = "btsp"
binary = "squirrel"
order = 10
required = false
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.chat", "ai.inference", "inference.complete"]

[[graph.nodes]]
name = "petaltongue"
security_model = "btsp"
binary = "petaltongue"
order = 11
required = true
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = ["visualization.render", "visualization.render.scene", "visualization.render.stream", "visualization.render.dashboard", "visualization.render.grammar", "interaction.subscribe", "interaction.poll"]

[graph.nodes.params]
mode = "live"

# ── Validation ───────────────────────────────────────────────────────
# No spring binary node — game science is served by composing the primals
# above. barraCuda provides activation.fitts, math.sigmoid, stats.mean,
# noise.perlin2d, etc. petalTongue provides visualization.render.scene +
# interaction.poll. The spring validates in Rust (tier 2); the composition
# IS the deployment (tier 3).

[[graph.nodes]]
name = "validate_cell"
security_model = "btsp"
order = 99
depends_on = ["barracuda", "petaltongue"]

[graph.nodes.operation]
name = "health_check"

[graph.nodes.operation.params]
targets = ["beardog", "songbird", "toadstool", "barracuda", "nestgate", "petaltongue"]
