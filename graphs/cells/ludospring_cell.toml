# Cellular deployment graph: ludoSpring
#
# NUCLEUS base + game science domain + petalTongue live mode.
# This is the cell that esotericWebb consumes for its interactive garden.
# Deploy: biomeos deploy --graph graphs/cells/ludospring_cell.toml

[graph]
name = "ludospring_cell"
description = "ludoSpring — NUCLEUS + game science + live visualization"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
cell_type = "spring"
domain = "game_science"
security_model = "btsp_enforced"
transport = "uds_only"
composition_model = "nucleated"
petaltongue_mode = "live"

# ── NUCLEUS Base ─────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch", "compute.execute", "compute.capabilities"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "tensor"
capabilities = ["tensor.matmul", "tensor.create", "stats.mean", "stats.std_dev", "stats.variance", "activation.fitts", "activation.hick", "math.sigmoid", "math.log2", "noise.perlin2d", "rng.uniform"]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 5
required = false
spawn = false
depends_on = ["toadstool"]
health_method = "health.liveness"
by_capability = "shader_compile"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 6
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 7
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 8
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine.create", "entry.append", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 9
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]

# ── Meta Tier ────────────────────────────────────────────────────────

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 10
required = false
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.chat", "ai.inference", "inference.complete"]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 11
required = true
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = ["visualization.render", "visualization.render.scene", "visualization.render.stream", "interaction.subscribe", "interaction.poll"]

[graph.nodes.params]
mode = "live"

# ── Domain Overlay ───────────────────────────────────────────────────

[[graph.nodes]]
name = "ludospring"
binary = "ludospring-barracuda"
order = 12
required = true
depends_on = ["beardog", "songbird", "toadstool", "barracuda"]
health_method = "health.liveness"
by_capability = "game"
capabilities = ["game.evaluate_flow", "game.engagement", "game.push_scene", "game.begin_session", "game.record_action", "game.complete_session", "game.npc_dialogue", "game.narrate_action"]

# ── Validation ───────────────────────────────────────────────────────

[[graph.nodes]]
name = "validate_cell"
order = 99
depends_on = ["ludospring", "petaltongue"]

[graph.nodes.operation]
name = "health_check"

[graph.nodes.operation.params]
targets = ["beardog", "songbird", "toadstool", "barracuda", "nestgate", "petaltongue", "ludospring"]
