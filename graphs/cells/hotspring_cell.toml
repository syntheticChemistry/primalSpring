# Cellular deployment graph: hotSpring
#
# NUCLEUS base + QCD physics domain + petalTongue live mode.
# Deploy: biomeos deploy --graph graphs/cells/hotspring_cell.toml
# Or:     ./tools/cell_launcher.sh hotspring start

[graph]
name = "hotspring_cell"
description = "hotSpring — NUCLEUS + QCD physics + live visualization"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
cell_type = "spring"
domain = "qcd_physics"
security_model = "btsp_enforced"
transport = "uds_only"
composition_model = "nucleated"
petaltongue_mode = "live"

# ── NUCLEUS Base ─────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch", "compute.execute", "compute.capabilities"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "tensor"
capabilities = ["tensor.matmul", "tensor.create", "tensor.add", "tensor.scale", "stats.mean", "stats.std_dev", "tolerances.get", "validate.gpu_stack"]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 5
required = false
spawn = false
depends_on = ["toadstool"]
health_method = "health.liveness"
by_capability = "shader_compile"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 6
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 7
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 8
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine.create", "entry.append", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 9
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]

# ── Meta Tier ────────────────────────────────────────────────────────

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 10
required = false
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.chat", "ai.inference"]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 11
required = true
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = ["visualization.render", "visualization.render.scene", "visualization.render.stream", "interaction.subscribe", "interaction.poll"]

[graph.nodes.params]
mode = "live"

# ── Domain Overlay ───────────────────────────────────────────────────

[[graph.nodes]]
name = "hotspring"
binary = "hotspring_primal"
order = 12
required = true
depends_on = ["beardog", "songbird", "toadstool", "barracuda"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["physics.lattice_qcd", "physics.hmc_trajectory", "physics.wilson_dirac", "compute.df64", "compute.cg_solver", "compute.gradient_flow"]

# ── Validation ───────────────────────────────────────────────────────

[[graph.nodes]]
name = "validate_cell"
order = 99
depends_on = ["hotspring", "petaltongue"]

[graph.nodes.operation]
name = "health_check"

[graph.nodes.operation.params]
targets = ["beardog", "songbird", "toadstool", "barracuda", "petaltongue", "hotspring"]
