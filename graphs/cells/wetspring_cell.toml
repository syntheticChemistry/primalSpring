# Cellular deployment graph: wetSpring
#
# NUCLEUS base + life science domain + petalTongue live mode.
# Deploy: biomeos deploy --graph graphs/cells/wetspring_cell.toml

[graph]
name = "wetspring_cell"
description = "wetSpring — NUCLEUS + life science + live visualization"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
cell_type = "spring"
domain = "biology"
security_model = "btsp_enforced"
transport = "uds_only"
composition_model = "nucleated"
petaltongue_mode = "live"

# ── NUCLEUS Base ─────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
security_model = "btsp"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
security_model = "btsp"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
security_model = "btsp"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

[[graph.nodes]]
name = "toadstool"
security_model = "btsp"
binary = "toadstool"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch", "compute.execute", "compute.capabilities"]

[[graph.nodes]]
name = "barracuda"
security_model = "btsp"
binary = "barracuda"
order = 4
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "tensor"
capabilities = ["tensor.matmul", "tensor.create", "stats.mean", "stats.std_dev", "stats.variance", "stats.correlation", "linalg.solve", "linalg.eigenvalues", "spectral.fft", "spectral.power_spectrum"]

[[graph.nodes]]
name = "coralreef"
security_model = "btsp"
binary = "coralreef"
order = 5
required = false
spawn = false
depends_on = ["toadstool"]
health_method = "health.liveness"
by_capability = "shader_compile"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

[[graph.nodes]]
name = "nestgate"
security_model = "btsp"
binary = "nestgate"
order = 6
required = true
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

[[graph.nodes]]
name = "rhizocrypt"
security_model = "btsp"
binary = "rhizocrypt"
order = 7
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
security_model = "btsp"
binary = "loamspine"
order = 8
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine.create", "entry.append", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
security_model = "btsp"
binary = "sweetgrass"
order = 9
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]

# ── Meta Tier ────────────────────────────────────────────────────────

[[graph.nodes]]
name = "squirrel"
security_model = "btsp"
binary = "squirrel"
order = 10
required = false
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.chat", "ai.inference", "inference.complete"]

[[graph.nodes]]
name = "petaltongue"
security_model = "btsp"
binary = "petaltongue"
order = 11
required = true
spawn = false
depends_on = ["songbird"]
health_method = "health.liveness"
by_capability = "visualization"
capabilities = ["visualization.render", "visualization.render.scene", "visualization.render.stream", "interaction.subscribe", "interaction.poll"]

[graph.nodes.params]
mode = "live"

# ── Domain Overlay ───────────────────────────────────────────────────

[[graph.nodes]]
name = "wetspring"
security_model = "btsp"
binary = "wetspring"
order = 12
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "biology"
capabilities = ["science.anderson", "science.diversity", "science.full_pipeline", "science.ncbi_fetch", "science.qs_model", "science.validation"]

# ── Validation ───────────────────────────────────────────────────────

[[graph.nodes]]
name = "validate_cell"
security_model = "btsp"
order = 99
depends_on = ["wetspring", "petaltongue"]

[graph.nodes.operation]
name = "health_check"

[graph.nodes.operation.params]
targets = ["beardog", "songbird", "toadstool", "barracuda", "nestgate", "petaltongue", "wetspring"]
