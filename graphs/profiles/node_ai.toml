# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Node + AI — Node Atomic + Squirrel (meta)
#
# Compute tier with AI coordination. GPU workloads directed by
# AI-driven planning via Squirrel. Squirrel is a meta-tier primal.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/node_ai.toml

[graph]
name = "node_ai_profile"
description = "Node Atomic + Squirrel (meta-tier AI coordination for compute)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "node_ai"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic", "node_atomic", "meta_tier"]
resolve = true

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
meta_tier = "tower_delegated"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"
encryption_tiers.meta = "tower_delegated"

# Fragments provide: beardog, songbird, toadstool, barracuda, coralreef,
#   biomeos_neural_api, squirrel, petaltongue.
# Delta: override squirrel order + add validation scaffold.

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 6
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = [
    "inference.complete", "inference.embed", "inference.models",
    "ai.query", "ai.complete",
]

[[graph.nodes]]
name = "validate_node_ai"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "squirrel"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.node_ai_health"]
