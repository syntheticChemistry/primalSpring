# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Node + AI — Node Atomic + Squirrel (meta)
#
# Compute tier with AI coordination. GPU workloads directed by
# AI-driven planning via Squirrel. Squirrel is a meta-tier primal.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/node_ai.toml

[graph]
name = "node_ai_profile"
description = "Node Atomic + Squirrel (meta-tier AI coordination for compute)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "node_ai"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic", "node_atomic", "meta_tier"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.encrypt", "crypto.decrypt", "crypto.sign",
    "crypto.verify", "crypto.keygen", "crypto.identity",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "discovery.find_primals", "discovery.announce",
    "network.tls_connect", "network.http_request",
]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = [
    "compute.dispatch.submit", "compute.dispatch.status",
    "compute.dispatch.cancel", "compute.execute",
]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.matmul", "tensor.attention", "tensor.fft",
    "tensor.df64", "tensor.perlin", "tensor.wfc",
]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 5
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = ["shader.compile", "shader.list"]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 6
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = ["ai.query", "ai.complete", "mcp.tools.list"]

[[graph.nodes]]
name = "validate_node_ai"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "squirrel"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.node_ai_health"]
