# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Tower — BearDog + Songbird (Electron)
#
# The minimal NUCLEUS deployment: trust boundary only.
# Zero TCP ports. After Tower is healthy, any spring can start with
# BTSP-secured IPC and capability-based discovery over UDS.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/tower.toml

[graph]
name = "tower_profile"
description = "Tower Atomic: BearDog (crypto) + Songbird (discovery) — electron shell"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "tower"
particle = "electron"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic"]
resolve = true

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_external = "ionic"
encryption_tier = "full"

# Fragment tower_atomic provides: beardog, songbird.
# Delta node below is the profile's own validation scaffold.

[[graph.nodes]]
name = "validate_tower"
binary = "primalspring_primal"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.tower_health"]
