# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Nest — Tower + NestGate + Provenance Trio (Neutron)
#
# The storage NUCLEUS deployment. Tower provides trust boundary,
# NestGate provides content-addressed storage, and the provenance
# trio (rhizoCrypt + loamSpine + sweetGrass) provides lineage.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/nest.toml

[graph]
name = "nest_profile"
description = "Nest Atomic: Tower + NestGate + provenance trio — neutron (storage + provenance)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "nest"
particle = "neutron"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic", "nest_atomic", "provenance_trio"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.sign", "crypto.verify", "crypto.hash",
    "crypto.encrypt_chacha20_poly1305", "crypto.generate_keypair",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "ipc.resolve", "ipc.register", "ipc.discover",
    "discovery.peers", "discovery.announce", "http.request",
]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = [
    "storage.store", "storage.retrieve", "storage.list",
    "storage.exists", "storage.delete", "storage.fetch_external",
]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 4
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "tower_delegated"
capabilities = [
    "dag.session.create", "dag.event.append",
    "dag.dehydration.trigger", "dag.merkle.root", "dag.merkle.proof",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 5
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["session.commit", "entry.append"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 6
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = [
    "braid.create", "braid.commit", "braid.get",
    "anchoring.anchor", "anchoring.verify",
]

[[graph.nodes]]
name = "validate_nest"
binary = "primalspring_primal"
order = 7
required = true
spawn = false
depends_on = ["beardog", "songbird", "nestgate"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.nest_health"]
