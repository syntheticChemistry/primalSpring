# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Nest — Tower + NestGate + Provenance Trio (Neutron)
#
# The storage NUCLEUS deployment. Tower provides trust boundary,
# NestGate provides content-addressed storage, and the provenance
# trio (rhizoCrypt + loamSpine + sweetGrass) provides lineage.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/nest.toml

[graph]
name = "nest_profile"
description = "Nest Atomic: Tower + NestGate + provenance trio — neutron (storage + provenance)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "nest"
particle = "neutron"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic", "nest_atomic"]
resolve = true

# Fragments provide: beardog, songbird, nestgate, rhizocrypt, loamspine, sweetgrass.
# Delta: validation scaffold only.

[[graph.nodes]]
name = "validate_nest"
binary = "primalspring_primal"
order = 7
required = true
spawn = false
depends_on = ["beardog", "songbird", "nestgate"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.nest_health"]
