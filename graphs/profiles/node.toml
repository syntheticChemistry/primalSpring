# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Node — Tower + ToadStool + barraCuda + coralReef (Proton)
#
# The compute NUCLEUS deployment. Tower provides trust boundary,
# then ToadStool dispatches, barraCuda executes GPU/CPU shaders,
# and coralReef compiles WGSL programs.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/node.toml

[graph]
name = "node_profile"
description = "Node Atomic: Tower + ToadStool + barraCuda + coralReef — proton (compute)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "node"
particle = "proton"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic", "node_atomic"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.sign", "crypto.verify", "crypto.hash",
    "crypto.encrypt_chacha20_poly1305", "crypto.generate_keypair",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "ipc.resolve", "ipc.register", "ipc.discover",
    "discovery.peers", "discovery.announce", "http.request",
]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = [
    "compute.dispatch", "compute.execute", "compute.capabilities",
    "compute.status",
]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.matmul", "tensor.batch.submit", "tensor.create",
    "stats.mean", "stats.std_dev", "noise.perlin2d",
    "compute.dispatch",
]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 5
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = [
    "shader.compile.wgsl", "shader.compile.spirv",
    "shader.compile.capabilities", "shader.compile.wgsl.multi",
]

[[graph.nodes]]
name = "validate_node"
binary = "primalspring_primal"
order = 6
required = true
spawn = false
depends_on = ["beardog", "songbird", "toadstool", "barracuda", "coralreef"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.node_health"]
