# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: NUCLEUS — Tower + Node + Nest (the Atom)
#
# Full NUCLEUS deployment: all three atomics. This is the canonical
# base that springs and products extend. Tower provides trust, Node
# provides compute, Nest provides storage + provenance.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/nucleus.toml

[graph]
name = "nucleus_profile"
description = "Full NUCLEUS: Tower (electron) + Node (proton) + Nest (neutron) — the atom"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "nucleus"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic", "node_atomic", "nest_atomic", "nucleus"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.sign", "crypto.verify", "crypto.hash",
    "crypto.encrypt_chacha20_poly1305", "crypto.decrypt_chacha20_poly1305",
    "crypto.generate_keypair", "crypto.ecdh_derive",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "ipc.resolve", "ipc.register", "ipc.discover",
    "discovery.peers", "discovery.announce",
    "http.request", "http.get", "http.post",
]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = [
    "compute.dispatch", "compute.execute",
    "compute.capabilities", "compute.status",
]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.matmul", "tensor.batch.submit", "tensor.create",
    "stats.mean", "stats.std_dev", "stats.weighted_mean",
    "noise.perlin2d", "noise.perlin3d", "compute.dispatch",
]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 5
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = [
    "shader.compile.wgsl", "shader.compile.spirv",
    "shader.compile.capabilities", "shader.compile.wgsl.multi",
]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 6
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = [
    "storage.store", "storage.retrieve", "storage.list",
    "storage.exists", "storage.delete", "storage.fetch_external",
]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 7
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "tower_delegated"
capabilities = [
    "dag.session.create", "dag.event.append",
    "dag.dehydration.trigger", "dag.merkle.root",
    "dag.merkle.proof", "dag.merkle.verify",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 8
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = [
    "spine.create", "spine.get", "spine.seal",
    "entry.append", "entry.get", "certificate.mint",
]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 9
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = [
    "braid.create", "braid.commit", "braid.get",
    "anchoring.anchor", "anchoring.verify",
]

[[graph.nodes]]
name = "validate_nucleus"
binary = "primalspring_primal"
order = 10
required = true
spawn = false
depends_on = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "nestgate"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.nucleus_health"]
