# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: NUCLEUS — Tower + Node + Nest (the Atom)
#
# Full NUCLEUS deployment: all three atomics. This is the canonical
# base that springs and products extend. Tower provides trust, Node
# provides compute, Nest provides storage + provenance.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/nucleus.toml

[graph]
name = "nucleus_profile"
description = "Full NUCLEUS: Tower (electron) + Node (proton) + Nest (neutron) — the atom"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "nucleus"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["nucleus"]
resolve = true

# Fragment nucleus provides all 9 NUCLEUS primals.
# Delta: validation scaffold only.

[[graph.nodes]]
name = "validate_nucleus"
binary = "primalspring_primal"
order = 10
required = true
spawn = false
depends_on = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "nestgate"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.nucleus_health"]
