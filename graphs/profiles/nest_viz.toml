# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Nest + Viz — Nest Atomic + petalTongue (meta)
#
# Storage tier with visualization overlay. petalTongue is a meta-tier
# primal that bonds to Nest for storage dashboards, capacity monitoring,
# and visual inspection of content-addressed data.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/nest_viz.toml

[graph]
name = "nest_viz_profile"
description = "Nest Atomic + petalTongue (meta-tier visualization for storage)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "nest_viz"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic", "nest_atomic", "meta_tier"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.sign", "crypto.verify", "crypto.hash",
    "crypto.encrypt_chacha20_poly1305", "crypto.generate_keypair",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "ipc.resolve", "ipc.register", "ipc.discover",
    "discovery.peers", "discovery.announce", "http.request",
]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = [
    "storage.store", "storage.retrieve", "storage.list",
    "storage.exists", "storage.delete", "storage.fetch_external",
]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
capabilities = [
    "viz.render", "viz.dashboard",
    "viz.stream", "viz.query",
]

[[graph.nodes]]
name = "validate_nest_viz"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["beardog", "songbird", "nestgate", "petaltongue"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.nest_viz_health"]
