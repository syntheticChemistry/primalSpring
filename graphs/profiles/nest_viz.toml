# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Nest + Viz — Nest Atomic + petalTongue (meta)
#
# Storage tier with visualization overlay. petalTongue is a meta-tier
# primal that bonds to Nest for storage dashboards, capacity monitoring,
# and visual inspection of content-addressed data.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/nest_viz.toml

[graph]
name = "nest_viz_profile"
description = "Nest Atomic + petalTongue (meta-tier visualization for storage)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "nest_viz"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic", "nest_atomic", "meta_tier"]
resolve = true

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
meta_tier = "tower_delegated"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"
encryption_tiers.meta = "tower_delegated"

# Fragments provide: beardog, songbird, nestgate, rhizocrypt, loamspine, sweetgrass,
#   biomeos_neural_api, squirrel, petaltongue.
# Delta: override petaltongue order + add validation scaffold.

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 7
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
capabilities = [
    "viz.render", "viz.dashboard",
    "viz.stream", "viz.query",
]

[[graph.nodes]]
name = "validate_nest_viz"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["beardog", "songbird", "nestgate", "petaltongue"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.nest_viz_health"]
