# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Tower + Viz — Tower Atomic + Squirrel + petalTongue (meta)
#
# Full Tower with both meta-tier overlays: AI (Squirrel) and
# visualization (petalTongue). Exercises every capability validated
# by primalSpring gates 1-11.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/tower_viz.toml

[graph]
name = "tower_viz_profile"
description = "Tower Atomic + Squirrel + petalTongue (meta-tier AI + visualization)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "tower_viz"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic", "meta_tier"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.sign", "crypto.verify", "crypto.hash",
    "crypto.encrypt_chacha20_poly1305", "crypto.generate_keypair",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "ipc.resolve", "ipc.register", "ipc.discover",
    "discovery.peers", "discovery.announce", "http.request",
]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 3
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
capabilities = [
    "visualization.render.dashboard",
    "visualization.render.grammar",
]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = [
    "inference.complete", "inference.embed", "inference.models",
    "ai.query", "ai.complete",
]

[[graph.nodes]]
name = "validate_tower_viz"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = [
    "composition.tower_health",
    "composition.tower_squirrel_health",
]
