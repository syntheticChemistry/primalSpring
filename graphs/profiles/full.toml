# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Full — NUCLEUS + Meta-Tier (biomeOS + Squirrel + petalTongue)
#
# The maximum deployment: all three atomics + all meta-tier primals.
# This is nucleus_complete.toml expressed as a profile. Springs and
# products start here and remove what they don't need.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/full.toml

[graph]
name = "full_profile"
description = "Full deployment: NUCLEUS (Tower + Node + Nest) + meta-tier (biomeOS + Squirrel + petalTongue)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "full"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic", "node_atomic", "nest_atomic", "nucleus", "meta_tier"]

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = [
    "graph.deploy", "graph.status", "graph.rollback",
    "capability.discover", "capability.route",
]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.sign", "crypto.verify", "crypto.hash",
    "crypto.encrypt_chacha20_poly1305", "crypto.generate_keypair",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "ipc.resolve", "ipc.register", "ipc.discover",
    "discovery.peers", "discovery.announce", "http.request",
]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = [
    "compute.dispatch", "compute.execute", "compute.capabilities",
    "compute.status",
]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.matmul", "tensor.batch.submit", "tensor.create",
    "stats.mean", "stats.std_dev", "noise.perlin2d",
    "compute.dispatch",
]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 5
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = [
    "shader.compile.wgsl", "shader.compile.spirv",
    "shader.compile.capabilities", "shader.compile.wgsl.multi",
]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 6
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = [
    "storage.store", "storage.retrieve", "storage.list",
    "storage.exists", "storage.delete", "storage.fetch_external",
]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 7
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = [
    "inference.complete", "inference.embed", "inference.models",
    "ai.query", "ai.complete",
]

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 8
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
capabilities = ["viz.render", "viz.dashboard"]

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 9
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
security_model = "tower_delegated"
capabilities = [
    "dag.session.create", "dag.event.append",
    "dag.dehydration.trigger", "dag.merkle.root", "dag.merkle.proof",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 10
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = [
    "spine.create", "spine.get", "spine.seal",
    "entry.append", "entry.get", "certificate.mint",
]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 11
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = [
    "braid.create", "braid.commit", "braid.get",
    "anchoring.anchor", "anchoring.verify",
]

[[graph.nodes]]
name = "validate_full"
binary = "primalspring_primal"
order = 12
required = true
spawn = false
depends_on = ["beardog", "songbird", "toadstool", "barracuda", "coralreef", "nestgate"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.full_health"]
