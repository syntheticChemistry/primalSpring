# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Profile: Tower + AI — Tower Atomic + Squirrel (meta)
#
# Tower with AI coordination overlay. Squirrel is a meta-tier primal
# that operates at any atomic level — here it bonds to Tower for
# AI-assisted task alignment, MCP tools, and LLM bridging.
#
# Usage:
#   biomeos deploy --graph graphs/profiles/tower_ai.toml

[graph]
name = "tower_ai_profile"
description = "Tower Atomic + Squirrel (meta-tier AI overlay)"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
base = "nucleus_complete"
profile = "tower_ai"
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic", "meta_tier"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.encrypt", "crypto.decrypt", "crypto.sign",
    "crypto.verify", "crypto.keygen", "crypto.identity",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "discovery.find_primals", "discovery.announce",
    "network.tls_connect", "network.http_request",
]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 3
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = ["ai.query", "ai.complete", "mcp.tools.list"]

[[graph.nodes]]
name = "validate_tower_ai"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["beardog", "songbird", "squirrel"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
capabilities = ["composition.tower_ai_health"]
