#
# biomeOS Streaming Pipeline — data flows via bounded mpsc channels.
# NestGate (fetch) -> primalSpring (transform) -> sweetGrass (attribute).
#
# Usage:
#   biomeos deploy --graph graphs/streaming_pipeline.toml

[graph]
name = "streaming_pipeline"
description = "Pipeline: data flows from NestGate (fetch) -> primalSpring (transform) -> sweetGrass (attribute). Uses bounded mpsc channels."
version = "0.2.0"
coordination = "Pipeline"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "pure"
fragments = ["tower_atomic"]

# ── Node 1: BearDog (identity) ────────────────────────────────────────

[graph.bonding_policy]
bond_type = "Ionic"
trust_model = "MethodGate"
[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity"]

# ── Node 2: NestGate (fetch) ───────────────────────────────────────────
[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "storage"
capabilities = ["storage.retrieve", "storage.fetch"]

# ── Node 3: primalSpring (transform) ───────────────────────────────────
[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 4
required = false
health_method = "provenance.health"
by_capability = "dag"
capabilities = ["braid.create", "provenance.attribute"]
