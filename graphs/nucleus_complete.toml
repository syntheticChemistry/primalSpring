# Source of truth: primalSpring/graphs/ (validation/structural format with metadata/fragments/bonding)
# Runtime execution variant: biomeOS/graphs/nucleus_complete.toml
# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Full NUCLEUS Complete — Zero-Port Tower Atomic Standard
#
# All 8 core primals + provenance trio + primalSpring coordination.
# Zero TCP ports bound. All IPC over Unix domain sockets.
#
# Security model:
#   Tower boundary (BearDog + Songbird): BTSP enforced, full encryption
#   NUCLEUS internal (same-host UDS): HMAC-plain or cleartext acceptable
#   External federation: opt-in Songbird TCP with full encryption
#
# This is the canonical reference graph for downstream springs.
#
# Usage:
#   biomeos deploy --graph graphs/nucleus_complete.toml

[graph]
name = "nucleus_complete"
description = "Full NUCLEUS: biomeOS + Tower + Core Services + Provenance Trio + primalSpring"
version = "1.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "nucleated"
fragments = ["tower_atomic", "nucleus", "nest_atomic"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
tower_to_external = "ionic"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"
encryption_tiers.federation = "full"

# ═══════════════════════════════════════════════════════════════
# Phase 0: biomeOS Neural API — orchestration substrate
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = [
    "graph.deploy",
    "graph.status",
    "graph.rollback",
    "capability.discover",
    "capability.route",
    "federation.configure",
    "federation.join",
]

# ═══════════════════════════════════════════════════════════════
# Phase 1: Tower Atomic — BTSP enforced security perimeter
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = [
    "crypto.encrypt", "crypto.decrypt", "crypto.sign",
    "crypto.verify", "crypto.keygen", "crypto.identity",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = [
    "discovery.find_primals", "discovery.announce",
    "network.tls_connect", "network.http_request",
]

# ═══════════════════════════════════════════════════════════════
# Phase 2: Core Services — tower_delegated (trusts Tower perimeter)
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve"]

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 5
required = true
depends_on = ["beardog", "songbird", "toadstool", "nestgate"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = ["ai.query", "ai.complete", "mcp.tools.list"]

# ═══════════════════════════════════════════════════════════════
# Phase 3: Provenance Trio — tower_delegated
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 6
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "provenance"
security_model = "tower_delegated"
capabilities = [
    "dag.session.create", "dag.event.append",
    "dag.dehydration.trigger", "dag.merkle.root",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 7
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
security_model = "tower_delegated"
capabilities = ["session.commit", "entry.append"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 8
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
security_model = "tower_delegated"
capabilities = [
    "provenance.create_braid", "provenance.lineage",
    "provenance.graph",
]

# ═══════════════════════════════════════════════════════════════
# Phase 4: Interface — tower_delegated
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 9
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
security_model = "tower_delegated"
args = ["server"]
capabilities = [
    "visualization.render.scene", "visualization.render.dashboard",
    "visualization.export", "visualization.session.list",
]

# ═══════════════════════════════════════════════════════════════
# Phase 5: Coordination validator
# ═══════════════════════════════════════════════════════════════

[[graph.nodes]]
name = "primalspring"
binary = "primalspring_primal"
order = 10
required = true
spawn = false
depends_on = ["biomeos_neural_api", "beardog", "songbird", "nestgate", "toadstool", "squirrel"]
health_method = "health.liveness"
by_capability = "coordination"
security_model = "tower_delegated"
args = ["server"]
capabilities = [
    "coordination.validate_composition",
    "coordination.deploy_atomic",
    "composition.nucleus_health",
    "nucleus.start", "nucleus.stop",
]
