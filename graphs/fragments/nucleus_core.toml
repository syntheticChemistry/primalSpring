# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Fragment: NUCLEUS Core — Tower Base + toadStool + NestGate + Squirrel
#
# The 6 core primals that form a complete NUCLEUS without provenance
# or interface layers. Tower Base provides security + discovery,
# toadStool provides compute dispatch, NestGate provides storage,
# Squirrel provides AI routing.
#
# nucleus_complete.toml extends this with provenance trio + petaltongue
# + primalspring coordination.
#
# Appears in: nucleus_complete (superset), most spring deploys,
# most gen4 compositions, full interactive product.

[fragment]
name = "nucleus_core"
description = "Tower Base + toadStool (compute) + NestGate (storage) + Squirrel (AI)"
version = "1.0.0"
node_count = 6
includes = ["tower_base"]

[[fragment.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
security_model = "tower_delegated"
capabilities = ["graph.deploy", "capability.discover", "graph.list"]

[[fragment.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
security_model = "btsp"
capabilities = ["crypto.sign", "crypto.verify", "crypto.identity"]

[[fragment.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
security_model = "btsp"
capabilities = ["net.discovery", "net.mesh", "network.http_request"]

[[fragment.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[fragment.nodes]]
name = "nestgate"
binary = "nestgate"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
security_model = "tower_delegated"
capabilities = ["storage.store", "storage.retrieve"]

[[fragment.nodes]]
name = "squirrel"
binary = "squirrel"
order = 5
required = true
depends_on = ["beardog", "songbird", "toadstool", "nestgate"]
health_method = "health.liveness"
by_capability = "ai"
security_model = "tower_delegated"
capabilities = ["ai.query", "ai.complete", "mcp.tools.list"]
