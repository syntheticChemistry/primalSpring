# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Fragment: WGSL Shader Pipeline — coralReef + toadStool + barraCuda
#
# The sovereign compute stack. coralReef compiles WGSL programs,
# toadStool dispatches workloads to GPU/CPU substrate, barraCuda
# executes 826+ WGSL compute shaders (matmul, attention, FFT, df64,
# Perlin, WFC, diversity, Anderson spectral, ...).
#
# This is the unifying pattern across all science springs:
#   neuralSpring composes this for ML inference
#   hotSpring composes this for Lattice QCD
#   wetSpring composes this for biology
#   ludoSpring composes this for game math (Fitts, Flow, Perlin, WFC)
#
# Paper 23: same shaders compose into ML inference, QCD physics,
# biology, and game science — mass-energy-information equivalence.
#
# Appears in: neuralSpring proto-nucleate, hotSpring proto-nucleate,
# neuralspring_inference_pipeline, hotspring_qcd_pipeline,
# ludospring proto-nucleate (game math via GPU).

[fragment]
name = "wgsl_shader_pipeline"
description = "coralReef (compile) + toadStool (dispatch) + barraCuda (execute)"
version = "1.0.0"
node_count = 3

[[fragment.nodes]]
name = "coralreef"
binary = "coralreef"
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "shader"
security_model = "tower_delegated"
capabilities = ["shader.compile", "shader.list"]

[[fragment.nodes]]
name = "toadstool"
binary = "toadstool"
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
security_model = "tower_delegated"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[fragment.nodes]]
name = "barracuda"
binary = "barracuda"
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "tensor"
security_model = "tower_delegated"
capabilities = [
    "tensor.matmul", "tensor.attention", "tensor.fft",
    "tensor.df64", "tensor.perlin", "tensor.wfc",
]
