#
# Slow Start Composition — random startup delays, composition convergence.
# Primals start in random order with 0-30s delays. Does the composition
# still form? Does biomeOS wait for dependencies or crash?
#
# This graph is used by exp082_chaos_substrate.
#
# Usage:
#   biomeos deploy --graph graphs/chaos/slow_start_composition.toml

[graph]
name = "slow_start_composition"
description = "Random startup delays (0-30s) — tests composition convergence, dependency waiting, timeout handling"
version = "1.0.0"
coordination = "sequential"
bond_type = "covalent"
chaos_scenario = "slow_start"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
composition_model = "validation"
fragments = ["tower_atomic"]

[graph.bonding_policy]
tower_internal = "covalent"
tower_to_nucleus = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.nucleus = "hmac_plain"

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health"
by_capability = "security"
capabilities = ["crypto.identity"]
chaos_delay_range_ms = [0, 30000]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "discovery"
capabilities = ["net.discovery"]
chaos_delay_range_ms = [0, 30000]

[[graph.nodes]]
name = "biomeos"
binary = "biomeos_primal"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "ecosystem"
capabilities = ["graph.execution", "ecosystem.coordination"]
chaos_delay_range_ms = [0, 10000]

[[graph.nodes]]
name = "groundspring"
binary = "groundspring_primal"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "validation"
capabilities = ["validate.health"]
chaos_delay_range_ms = [0, 30000]

[[graph.nodes]]
name = "healthspring"
binary = "healthspring_primal"
order = 5
required = true
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "health"
capabilities = ["health.monitor", "health.probe"]
chaos_delay_range_ms = [0, 30000]
