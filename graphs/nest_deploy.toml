# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Nest Atomic Deploy — Tower + NestGate + Squirrel (storage + AI bridge)
#
# Extends Tower with persistent storage and AI bridge. Springs that need
# data persistence, content-addressed storage, or AI inference routing
# deploy this tier. Matches biomeOS `nucleus --mode nest` primal set.
#
# Usage:
#   biomeos deploy --graph graphs/nest_deploy.toml
#   primalspring_primal server  # then: coordination.deploy_atomic {"atomic":"Nest"}

[graph]
name = "nest_deploy"
description = "Nest Atomic: Tower + NestGate + Squirrel (storage + AI bridge)"
version = "0.4.0"
coordination = "sequential"

# ── Phase 1: Tower Atomic (inherited) ──
[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.encrypt", "crypto.sign", "crypto.verify"]

[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["discovery.find_primals", "network.tls_connect"]

# ── Phase 2: NestGate — storage + provenance ──
[[graph.node]]
name = "nestgate"
binary = "nestgate_primal"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = [
    "storage.store",
    "storage.retrieve",
    "storage.list",
    "model.register",
    "model.locate",
]

# ── Phase 3: Squirrel — AI bridge ──
[[graph.node]]
name = "squirrel"
binary = "squirrel_primal"
order = 4
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = [
    "ai.query",
    "ai.health",
]

# ── Phase 4: Validation ──
[[graph.node]]
name = "validate_nest"
binary = "primalspring_primal"
order = 5
required = true
spawn = false
depends_on = ["beardog", "songbird", "nestgate", "squirrel"]
health_method = "health.liveness"
by_capability = "coordination"
args = ["server"]
capabilities = ["composition.nest_health"]
