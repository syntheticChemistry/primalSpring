# SPDX-License-Identifier: AGPL-3.0-or-later
#
# NeuralSpring Nucleated Deploy — neural/ML science via NUCLEUS composition.
#
# Proto graph for neuralSpring tributaries. As neuralSpring validates its
# science (protein folding, population genetics, reservoir computing,
# Anderson localization), gaps will surface upstream for primals and
# primalSpring to solve.
#
# NUCLEUS base: biomeOS + Tower (BearDog + Songbird)
# Compute layer: toadStool (GPU dispatch), coralReef (shader compile), barraCuda (math)
# AI layer: Squirrel (model inference)
# Persistence: NestGate (storage)
# Provenance: rhizoCrypt + loamSpine + sweetGrass
#
# References: ecoPrimals/infra/wateringHole/ for IPC and composition standards.
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/neuralspring_deploy.toml

[graph]
name = "neuralspring_nucleated"
description = "NeuralSpring ML science — NUCLEUS base + GPU + AI + persistence + provenance"
version = "2.0.0"
coordination = "sequential"

# ── NUCLEUS Base ──────────────────────────────────────────────────────

[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["graph.execute", "capability.discover", "topology.rescan"]

[[graph.node]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.blake3_hash"]

[[graph.node]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# ── GPU Compute Layer ─────────────────────────────────────────────────

[[graph.node]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "shader.dispatch", "ember.list"]

[[graph.node]]
name = "coralreef"
binary = "coralreef"
order = 4
required = false
depends_on = ["toadstool"]
health_method = "health.liveness"
by_capability = "shader_compile"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

[[graph.node]]
name = "barracuda"
binary = "barracuda"
order = 5
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"
capabilities = ["math.stats", "math.tensor", "math.activation", "math.noise"]

# ── AI Layer ──────────────────────────────────────────────────────────

[[graph.node]]
name = "squirrel"
binary = "squirrel"
order = 6
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "ai"
args = ["server"]
capabilities = ["ai.query", "ai.list_providers"]

# ── Persistence ───────────────────────────────────────────────────────

[[graph.node]]
name = "nestgate"
binary = "nestgate"
order = 7
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
args = ["server"]
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

# ── Provenance Trio ───────────────────────────────────────────────────

[[graph.node]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 8
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "provenance"
args = ["--unix"]
capabilities = ["dag.session.create", "dag.session.list"]

[[graph.node]]
name = "loamspine"
binary = "loamspine"
order = 9
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "ledger"
args = ["server"]
capabilities = ["entry.append", "ledger.status"]

[[graph.node]]
name = "sweetgrass"
binary = "sweetgrass"
order = 10
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "attribution"
args = ["server"]
capabilities = ["attribution.claim", "attribution.resolve"]

# ── Spring Science ────────────────────────────────────────────────────

[[graph.node]]
name = "neuralspring"
binary = "neuralspring_primal"
order = 11
required = true
depends_on = ["beardog", "songbird", "toadstool"]
health_method = "health.liveness"
by_capability = "neural"
args = ["server"]
capabilities = [
    "science.evoformer_block",
    "science.structure_module",
    "science.folding_health",
    "science.eigensolve",
    "science.anderson_localization",
    "science.isomorphic_reservoir",
    "science.attention_anderson",
    "science.allele_frequencies",
    "science.nucleotide_diversity",
    "science.pairwise_fst",
    "science.shannon_entropy",
    "science.introgression_nn",
    "science.ipr",
    "science.level_spacing_ratio",
]
