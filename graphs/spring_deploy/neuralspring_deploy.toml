# SPDX-License-Identifier: AGPL-3.0-or-later
#
# NeuralSpring Nucleated Deploy — neural/ML science + inference via NUCLEUS composition.
#
# Proto graph for neuralSpring tributaries. As neuralSpring validates its
# science (protein folding, population genetics, reservoir computing,
# Anderson localization) and ML inference (WGSL shader composition of
# barraCuda + coralReef + toadStool), gaps will surface upstream for
# primals and primalSpring to solve.
#
# NUCLEUS base: biomeOS + Tower (BearDog + Songbird)
# Compute layer: toadStool (GPU dispatch), coralReef (shader compile), barraCuda (math)
# AI layer: Squirrel (model inference)
# Persistence: NestGate (storage)
# Provenance: rhizoCrypt + loamSpine + sweetGrass (WireWitnessRef)
#
# References:
#   wateringHole/ATTESTATION_ENCODING_STANDARD.md
#   config/capability_registry.toml
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/neuralspring_deploy.toml

[graph]
name = "neuralspring_nucleated"
description = "NeuralSpring ML science + inference — NUCLEUS base + GPU + AI + persistence + provenance"
version = "3.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
composition_model = "nucleated"
fragments = ["tower_atomic", "node_atomic", "nest_atomic", "nucleus", "meta_tier"]

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
tower_to_nest = "metallic"
node_to_nest = "metallic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"
encryption_tiers.nest = "delegated"
encryption_tiers.meta = "delegated"

# ── NUCLEUS Base ──────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

# ── GPU Compute Layer ─────────────────────────────────────────────────

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch", "compute.execute", "compute.capabilities"]

[[graph.nodes]]
name = "coralreef"
binary = "coralreef"
order = 4
required = false
spawn = false
depends_on = ["toadstool"]
health_method = "health.liveness"
by_capability = "shader_compile"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv", "shader.compile.capabilities"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 5
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"
capabilities = ["tensor.matmul", "tensor.batch.submit", "stats.mean", "noise.perlin2d", "compute.dispatch"]

# ── AI Layer ──────────────────────────────────────────────────────────

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 6
required = false
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["inference.complete", "inference.embed", "ai.query"]

# ── Persistence ───────────────────────────────────────────────────────

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 7
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list", "storage.exists"]

# ── Provenance Trio (WireWitnessRef) ─────────────────────────────────

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 8
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 9
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine.create", "entry.append", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 10
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]

# ── Spring Science ────────────────────────────────────────────────────

[[graph.nodes]]
name = "neuralspring"
binary = "neuralspring"
order = 11
required = true
depends_on = ["beardog", "songbird", "coralreef", "toadstool", "barracuda", "squirrel"]
health_method = "health.liveness"
by_capability = "inference"
capabilities = [
    # Inference domain (WGSL shader composition of barraCuda + coralReef + toadStool)
    "inference.complete",
    "inference.embed",
    "inference.models",
    # Science domain (existing — also shader compositions)
    "science.spectral_analysis",
    "science.anderson_localization",
    "science.hessian_eigen",
    "science.agent_coordination",
    "science.ipr",
    "science.disorder_sweep",
    "science.training_trajectory",
    "science.evoformer_block",
    "science.structure_module",
    "science.folding_health",
    "science.gpu_dispatch",
    "science.cross_spring_provenance",
    "science.cross_spring_benchmark",
    "science.precision_routing",
]
