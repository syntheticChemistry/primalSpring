# SPDX-License-Identifier: AGPL-3.0-or-later
#
# NeuralSpring Nucleated Deploy — neural/ML science via NUCLEUS composition.
#
# Proto graph for neuralSpring tributaries. As neuralSpring validates its
# science (protein folding, population genetics, reservoir computing,
# Anderson localization), gaps will surface upstream for primals and
# primalSpring to solve.
#
# NUCLEUS base: biomeOS + Tower (BearDog + Songbird)
# Compute layer: toadStool (GPU dispatch), coralReef (shader compile), barraCuda (math)
# AI layer: Squirrel (model inference)
# Persistence: NestGate (storage)
# Provenance: rhizoCrypt + loamSpine + sweetGrass (WireWitnessRef)
#
# References:
#   wateringHole/ATTESTATION_ENCODING_STANDARD.md
#   config/capability_registry.toml
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/neuralspring_deploy.toml

[graph]
name = "neuralspring_nucleated"
description = "NeuralSpring ML science — NUCLEUS base + GPU + AI + persistence + provenance"
version = "3.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"

# ── NUCLEUS Base ──────────────────────────────────────────────────────

[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.node]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519", "crypto.blake3_hash"]

[[graph.node]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ── GPU Compute Layer ─────────────────────────────────────────────────

[[graph.node]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[graph.node]]
name = "coralreef"
binary = "coralreef"
order = 4
required = false
depends_on = ["toadstool"]
health_method = "health.liveness"
by_capability = "shader_compile"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

[[graph.node]]
name = "barracuda"
binary = "barracuda"
order = 5
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"
capabilities = ["math.stats", "math.tensor", "math.activation", "math.noise"]

# ── AI Layer ──────────────────────────────────────────────────────────

[[graph.node]]
name = "squirrel"
binary = "squirrel"
order = 6
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.query", "mcp.tools.list"]

# ── Persistence ───────────────────────────────────────────────────────

[[graph.node]]
name = "nestgate"
binary = "nestgate"
order = 7
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

# ── Provenance Trio (WireWitnessRef) ─────────────────────────────────

[[graph.node]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 8
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag", "dag.session.create", "dag.event.append", "dag.merkle.root", "dag.merkle.verify", "dag.dehydrate", "dag.frontier.get"]

[[graph.node]]
name = "loamspine"
binary = "loamspine"
order = 9
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine", "entry", "session", "certificate", "commit", "ledger", "spine.create", "entry.append", "session.commit", "certificate.mint"]

[[graph.node]]
name = "sweetgrass"
binary = "sweetgrass"
order = 10
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid", "attribution", "provenance", "anchoring", "braid.create", "braid.commit", "provenance.graph", "provenance.export_provo", "attribution.chain"]

# ── Spring Science ────────────────────────────────────────────────────

[[graph.node]]
name = "neuralspring"
binary = "neuralspring_primal"
order = 11
required = true
depends_on = ["beardog", "songbird", "toadstool"]
health_method = "health.liveness"
by_capability = "neural"
capabilities = [
    "science.evoformer_block",
    "science.structure_module",
    "science.folding_health",
    "science.eigensolve",
    "science.anderson_localization",
    "science.isomorphic_reservoir",
    "science.attention_anderson",
    "science.allele_frequencies",
    "science.nucleotide_diversity",
    "science.pairwise_fst",
    "science.shannon_entropy",
    "science.introgression_nn",
    "science.ipr",
    "science.level_spacing_ratio",
]
