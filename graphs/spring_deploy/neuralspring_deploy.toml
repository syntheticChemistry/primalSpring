# SPDX-License-Identifier: AGPL-3.0-or-later
#
# NeuralSpring Science Deploy — biomeOS composition for neural science.
#
# Deploys NeuralSpring as a primal composition. Springs reference
# primalSpring's wateringHole for patterns and standards.
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/neuralspring_deploy.toml

[graph]
name = "neuralspring_science"
description = "NeuralSpring neural science composition — Tower + ToadStool + neuralspring"
version = "1.0.0"
coordination = "sequential"

# Phase 0: biomeOS substrate
[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "graph.list"]

# Phase 1: Tower
[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.identity"]

[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# Phase 2: ToadStool (compute for GPU neural work)
[[graph.node]]
name = "toadstool"
binary = "toadstool_primal"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "compute.health"
by_capability = "compute"
capabilities = [
    "compute.execute",
    "compute.submit",
    "compute.dispatch.submit",
]

# Phase 3: Spring
[[graph.node]]
name = "neuralspring"
binary = "neuralspring_primal"
order = 4
required = true
depends_on = ["beardog", "songbird", "toadstool"]
health_method = "health.check"
by_capability = "neural"
args = ["server"]
capabilities = [
    "neural.classify",
    "neural.train_step",
    "neural.pipeline_dispatch",
]
