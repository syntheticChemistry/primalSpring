# SPDX-License-Identifier: AGPL-3.0-or-later
#
# WetSpring Nucleated Deploy — biology/ecology science via NUCLEUS composition.
#
# Proto graph for wetSpring tributaries. As wetSpring validates its science
# (Anderson QS, community diversity, calibration, NCBI fetch, GPU bio
# compute), gaps will surface upstream for primals and primalSpring to solve.
#
# NUCLEUS base: biomeOS + Tower (BearDog + Songbird)
# Compute layer: toadStool (GPU dispatch), barraCuda (math)
# Persistence: NestGate (storage for bio data)
# Provenance: rhizoCrypt + loamSpine + sweetGrass (WireWitnessRef)
#
# Witness wire: WireWitnessRef { agent, kind, evidence, witnessed_at,
#   encoding, algorithm, tier, context }
# BearDog crypto bridge: sign_ed25519 → evidence (base64), algorithm "ed25519"
# Non-crypto witnesses: kind "checkpoint" | "observation" for pipeline steps
#
# References:
#   wateringHole/ATTESTATION_ENCODING_STANDARD.md
#   wateringHole/handoffs/PRIMALSPRING_TRIO_WITNESS_HARVEST_HANDOFF_APR07_2026.md
#   config/capability_registry.toml
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/wetspring_deploy.toml

[graph]
name = "wetspring_nucleated"
description = "WetSpring biology science — NUCLEUS base + GPU + persistence + provenance"
version = "3.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"

# ── NUCLEUS Base ──────────────────────────────────────────────────────

[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.node]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519", "crypto.blake3_hash"]

[[graph.node]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ── Compute Layer ─────────────────────────────────────────────────────

[[graph.node]]
name = "toadstool"
binary = "toadstool"
order = 3
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "compute.execute"]

[[graph.node]]
name = "barracuda"
binary = "barracuda"
order = 4
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"
capabilities = ["math.stats", "math.tensor"]

# ── Persistence ───────────────────────────────────────────────────────

[[graph.node]]
name = "nestgate"
binary = "nestgate"
order = 5
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

# ── Provenance Trio (WireWitnessRef) ─────────────────────────────────

[[graph.node]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 6
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag", "dag.session.create", "dag.event.append", "dag.merkle.root", "dag.merkle.verify", "dag.dehydrate", "dag.frontier.get"]

[[graph.node]]
name = "loamspine"
binary = "loamspine"
order = 7
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine", "entry", "session", "certificate", "commit", "ledger", "spine.create", "entry.append", "session.commit", "certificate.mint"]

[[graph.node]]
name = "sweetgrass"
binary = "sweetgrass"
order = 8
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid", "attribution", "provenance", "anchoring", "braid.create", "braid.commit", "provenance.graph", "provenance.export_provo", "attribution.chain"]

# ── Spring Science ────────────────────────────────────────────────────

[[graph.node]]
name = "wetspring"
binary = "wetspring_primal"
order = 9
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "biology"
capabilities = [
    "science.anderson",
    "science.diversity",
    "science.full_pipeline",
    "science.ncbi_fetch",
    "science.qs_model",
    "science.validation",
    "calibration.nrs",
    "community.fastq",
    "metrics.snapshot",
]
