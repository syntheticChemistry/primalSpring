# Source of truth: primalSpring/graphs/spring_deploy/ (validation/structural format with metadata/fragments/bonding)
# Runtime execution variant: biomeOS/graphs/wetspring_deploy.toml
# SPDX-License-Identifier: AGPL-3.0-or-later
#
# WetSpring Nucleated Deploy — biology/ecology science via NUCLEUS composition.
#
# Proto graph for wetSpring tributaries. As wetSpring validates its science
# (Anderson QS, community diversity, calibration, NCBI fetch, GPU bio
# compute), gaps will surface upstream for primals and primalSpring to solve.
#
# NUCLEUS base: biomeOS + Tower (BearDog + Songbird)
# Compute layer: toadStool (GPU dispatch), barraCuda (math)
# Persistence: NestGate (storage for bio data)
# Provenance: rhizoCrypt + loamSpine + sweetGrass (WireWitnessRef)
#
# Witness wire: WireWitnessRef { agent, kind, evidence, witnessed_at,
#   encoding, algorithm, tier, context }
# BearDog crypto bridge: sign_ed25519 → evidence (base64), algorithm "ed25519"
# Non-crypto witnesses: kind "checkpoint" | "observation" for pipeline steps
#
# References:
#   wateringHole/ATTESTATION_ENCODING_STANDARD.md
#   wateringHole/handoffs/PRIMALSPRING_TRIO_WITNESS_HARVEST_HANDOFF_APR07_2026.md
#   config/capability_registry.toml
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/wetspring_deploy.toml

[graph]
name = "wetspring_nucleated"
description = "WetSpring biology science — Tower + partial Node (no CoralReef) + Nest + provenance trio + wetSpring"
version = "3.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
composition_model = "nucleated"
fragments = ["tower_atomic", "node_atomic", "nest_atomic", "nucleus", "provenance_trio"]

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_node = "metallic"
tower_to_nest = "metallic"
encryption_tiers.tower = "full"
encryption_tiers.node = "delegated"
encryption_tiers.nest = "delegated"

# ── NUCLEUS Base ──────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

# ── Compute Layer ─────────────────────────────────────────────────────

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 3
required = false
spawn = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch", "compute.execute", "compute.capabilities"]

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 4
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"
capabilities = ["tensor.matmul", "tensor.batch.submit", "stats.mean", "noise.perlin2d", "compute.dispatch"]

# ── Persistence ───────────────────────────────────────────────────────

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 5
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list", "storage.exists"]

# ── Provenance Trio (WireWitnessRef) ─────────────────────────────────

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 6
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 7
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine.create", "entry.append", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 8
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]

# ── Spring Science ────────────────────────────────────────────────────

[[graph.nodes]]
name = "wetspring"
binary = "wetspring_primal"
order = 9
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "biology"
capabilities = [
    "science.anderson",
    "science.diversity",
    "science.full_pipeline",
    "science.ncbi_fetch",
    "science.qs_model",
    "science.validation",
    "calibration.nrs",
    "community.fastq",
    "metrics.snapshot",
]
