# SPDX-License-Identifier: AGPL-3.0-or-later
#
# HealthSpring Nucleated Deploy — clinical/biomedical science via NUCLEUS composition.
#
# Proto graph for healthSpring tributaries. As healthSpring validates its
# clinical workflows (pharmacology, genomics, de-identification, clinical
# AI inference via dual-tower enclave pattern), gaps will surface upstream
# for primals and primalSpring to solve.
#
# NUCLEUS base: biomeOS + Tower (BearDog + Songbird)
# AI layer: Squirrel (clinical inference routing — de-identified data only)
# Persistence: NestGate (patient enclave storage + inference cache)
# Provenance: rhizoCrypt + loamSpine + sweetGrass (WireWitnessRef — regulatory audit)
#
# Security model: neutron-heavy (data-dominated). Dual-tower enclave pattern
# required for production (see healthspring_enclave_proto_nucleate.toml).
# This single-tower deploy is the base composition; enclave adds ionic bond.
#
# References:
#   wateringHole/ATTESTATION_ENCODING_STANDARD.md
#   config/capability_registry.toml
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/healthspring_deploy.toml

[graph]
name = "healthspring_nucleated"
description = "HealthSpring clinical science — NUCLEUS base + AI inference + patient enclave + provenance audit"
version = "3.1.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-10"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
particle_profile = "neutron_heavy"

[graph.bonding_policy]
tower_internal = "covalent"
cross_family = "ionic"
nucleus_internal = "weak"
encryption_tiers.tower = "full"
encryption_tiers.cross_family = "full"
encryption_tiers.nucleus = "hmac_plain"

# ── NUCLEUS Base ──────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519", "crypto.blake3_hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ── AI Layer ──────────────────────────────────────────────────────────

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 3
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.query", "mcp.tools.list", "inference.complete", "inference.embed", "inference.models"]

# ── Persistence (required — patient records + model cache) ───────────

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 4
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

# ── Provenance Trio (WireWitnessRef — required for regulatory audit) ──

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 5
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag", "dag.session.create", "dag.event.append", "dag.merkle.root", "dag.merkle.verify", "dag.dehydration.trigger", "dag.frontier.get"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 6
required = true
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine", "entry", "session", "certificate", "commit", "ledger", "spine.create", "entry.append", "session.commit", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 7
required = true
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid", "attribution", "provenance", "anchoring", "braid.create", "braid.commit", "provenance.graph", "provenance.export_provo", "attribution.chain"]

# ── Spring Science ────────────────────────────────────────────────────

[[graph.nodes]]
name = "healthspring"
binary = "healthspring_primal"
order = 8
required = true
depends_on = ["beardog", "songbird", "squirrel", "nestgate"]
health_method = "health.liveness"
by_capability = "health"
capabilities = [
    # Clinical domain (healthSpring's primary science)
    "health.pharmacology",
    "health.genomics",
    "health.clinical",
    # Data handling (de-identification for enclave pattern)
    "health.de_identify",
    "health.aggregate",
    "data.fetch",
    # Inference routing (delegates to Squirrel via ionic bridge in enclave)
    "model.inference_route",
    "compute.offload",
]
