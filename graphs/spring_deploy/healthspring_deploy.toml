# SPDX-License-Identifier: AGPL-3.0-or-later
#
# HealthSpring Nucleated Deploy — health/biomedical science via NUCLEUS composition.
#
# Proto graph for healthSpring tributaries. As healthSpring validates its
# science (model inference, data fetch, health analysis), gaps will surface
# upstream for primals and primalSpring to solve.
#
# NUCLEUS base: biomeOS + Tower (BearDog + Songbird)
# AI layer: Squirrel (model inference routing)
# Persistence: NestGate (storage)
# Provenance: rhizoCrypt + loamSpine + sweetGrass (WireWitnessRef)
#
# References:
#   wateringHole/ATTESTATION_ENCODING_STANDARD.md
#   config/capability_registry.toml
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/healthspring_deploy.toml

[graph]
name = "healthspring_nucleated"
description = "HealthSpring health science — NUCLEUS base + AI + persistence + provenance"
version = "3.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"

# ── NUCLEUS Base ──────────────────────────────────────────────────────

[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.node]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519", "crypto.blake3_hash"]

[[graph.node]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ── AI Layer ──────────────────────────────────────────────────────────

[[graph.node]]
name = "squirrel"
binary = "squirrel"
order = 3
required = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["ai.query", "mcp.tools.list"]

# ── Persistence ───────────────────────────────────────────────────────

[[graph.node]]
name = "nestgate"
binary = "nestgate"
order = 4
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

# ── Provenance Trio (WireWitnessRef) ─────────────────────────────────

[[graph.node]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 5
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag", "dag.session.create", "dag.event.append", "dag.merkle.root", "dag.merkle.verify", "dag.dehydrate", "dag.frontier.get"]

[[graph.node]]
name = "loamspine"
binary = "loamspine"
order = 6
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine", "entry", "session", "certificate", "commit", "ledger", "spine.create", "entry.append", "session.commit", "certificate.mint"]

[[graph.node]]
name = "sweetgrass"
binary = "sweetgrass"
order = 7
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid", "attribution", "provenance", "anchoring", "braid.create", "braid.commit", "provenance.graph", "provenance.export_provo", "attribution.chain"]

# ── Spring Science ────────────────────────────────────────────────────

[[graph.node]]
name = "healthspring"
binary = "healthspring_primal"
order = 8
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "health"
capabilities = [
    "data.fetch",
    "model.inference_route",
    "compute.offload",
]
