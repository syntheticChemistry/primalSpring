# SPDX-License-Identifier: AGPL-3.0-or-later
#
# HotSpring Nucleated Deploy — physics science via NUCLEUS composition.
#
# Proto graph for hotSpring tributaries. As hotSpring validates its
# science (lattice QCD, molecular dynamics, fluid, nuclear EOS), gaps
# will surface upstream for primals and primalSpring to solve.
#
# NUCLEUS base: biomeOS + Tower (BearDog + Songbird)
# Compute layer: toadStool (GPU dispatch), barraCuda (math), coralReef (shader compile)
# Persistence: NestGate (storage)
# Provenance: rhizoCrypt + loamSpine + sweetGrass
#
# References: ecoPrimals/infra/wateringHole/ for IPC and composition standards.
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/hotspring_deploy.toml

[graph]
name = "hotspring_nucleated"
description = "HotSpring physics science — NUCLEUS base + GPU compute + persistence + provenance"
version = "2.0.0"
coordination = "sequential"

# ── NUCLEUS Base ──────────────────────────────────────────────────────

[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["graph.execute", "capability.discover", "topology.rescan"]

[[graph.node]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.blake3_hash"]

[[graph.node]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# ── GPU Compute Layer ─────────────────────────────────────────────────

[[graph.node]]
name = "toadstool"
binary = "toadstool"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "shader.dispatch", "ember.list", "ember.status"]

[[graph.node]]
name = "coralreef"
binary = "coralreef"
order = 4
required = false
depends_on = ["toadstool"]
health_method = "health.liveness"
by_capability = "shader_compile"
capabilities = ["shader.compile.wgsl", "shader.compile.spirv"]

[[graph.node]]
name = "barracuda"
binary = "barracuda"
order = 5
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"
capabilities = ["math.stats", "math.tensor", "math.activation"]

# ── Persistence ───────────────────────────────────────────────────────

[[graph.node]]
name = "nestgate"
binary = "nestgate"
order = 6
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
args = ["server"]
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

# ── Provenance Trio ───────────────────────────────────────────────────

[[graph.node]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 7
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "provenance"
args = ["--unix"]
capabilities = ["dag.session.create", "dag.session.list"]

[[graph.node]]
name = "loamspine"
binary = "loamspine"
order = 8
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "ledger"
args = ["server"]
capabilities = ["entry.append", "ledger.status"]

[[graph.node]]
name = "sweetgrass"
binary = "sweetgrass"
order = 9
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "attribution"
args = ["server"]
capabilities = ["attribution.claim", "attribution.resolve"]

# ── Spring Science ────────────────────────────────────────────────────

[[graph.node]]
name = "hotspring"
binary = "hotspring_primal"
order = 10
required = true
depends_on = ["beardog", "songbird", "toadstool"]
health_method = "health.liveness"
by_capability = "physics"
args = ["server"]
capabilities = [
    "physics.lattice_qcd",
    "physics.molecular_dynamics",
    "physics.fluid",
    "physics.nuclear_eos",
    "compute.cg_solver",
    "compute.gradient_flow",
    "compute.npu",
    "compute.status",
]
