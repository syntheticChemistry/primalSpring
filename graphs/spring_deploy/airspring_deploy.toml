#
# AirSpring Science Deploy — biomeOS composition for weather science.
#
# Deploys AirSpring as a primal composition. Springs reference
# primalSpring's wateringHole for patterns and standards.
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/airspring_deploy.toml

[graph]
name = "airspring_science"
description = "AirSpring weather science composition — Tower + airspring"
version = "1.0.0"
coordination = "sequential"

# Phase 0: biomeOS substrate
[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "graph.list"]

# Phase 1: Tower
[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.identity"]

[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# Phase 3: Spring
[[graph.node]]
name = "airspring"
binary = "airspring_primal"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.check"
by_capability = "weather"
args = ["server"]
capabilities = [
    "weather.forecast",
    "weather.et0_compute",
    "weather.water_balance",
]
