# Source of truth: primalSpring/graphs/spring_deploy/ (validation/structural format with metadata/fragments/bonding)
# Runtime execution variant: biomeOS/graphs/airspring_deploy.toml
# SPDX-License-Identifier: AGPL-3.0-or-later
#
# AirSpring Nucleated Deploy — weather science via NUCLEUS composition.
#
# Proto graph for airSpring tributaries. As airSpring validates its science
# (ET0, water balance, cross-spring weather), gaps will surface upstream
# for primals and primalSpring to solve.
#
# NUCLEUS base: biomeOS + Tower (BearDog + Songbird)
# Science layer: barraCuda (compute), Squirrel (model inference), airSpring
# Provenance: rhizoCrypt + loamSpine + sweetGrass (WireWitnessRef)
#
# References:
#   wateringHole/ATTESTATION_ENCODING_STANDARD.md
#   config/capability_registry.toml
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/airspring_deploy.toml

[graph]
name = "airspring_nucleated"
description = "AirSpring weather science — Tower base + Barracuda + Squirrel + provenance trio (no NestGate, no Toadstool/CoralReef)"
version = "3.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
composition_model = "nucleated"
fragments = ["tower_atomic", "nucleus", "provenance_trio", "meta_tier"]

[graph.bonding_policy]
bond_type = "Metallic"
trust_model = "InternalNucleus"
tower_internal = "covalent"
tower_to_compute = "metallic"
encryption_tiers.tower = "full"
encryption_tiers.compute = "delegated"

# ── NUCLEUS Base ──────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["ipc.resolve", "ipc.register", "discovery.peers"]

# ── Compute Layer ─────────────────────────────────────────────────────

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 3
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"
capabilities = ["tensor.matmul", "tensor.batch.submit", "stats.mean", "noise.perlin2d", "compute.dispatch"]

# ── AI Layer (optional — for model-driven weather inference) ──────────

[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 4
required = false
spawn = false
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = ["inference.complete", "inference.embed", "ai.query"]

# ── Provenance Trio (WireWitnessRef) ─────────────────────────────────

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 5
required = false
spawn = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag.session.create", "dag.event.append", "dag.merkle.root"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 6
required = false
spawn = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine.create", "entry.append", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 7
required = false
spawn = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid.create", "braid.commit", "anchoring.anchor"]

# ── Spring Science ────────────────────────────────────────────────────

[[graph.nodes]]
name = "airspring"
binary = "airspring_primal"
order = 8
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "weather"
capabilities = [
    "data.weather",
    "data.cross_spring_weather",
    "ecology.experiment",
    "compute.offload",
]
