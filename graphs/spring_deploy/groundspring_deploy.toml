# SPDX-License-Identifier: AGPL-3.0-or-later
#
# GroundSpring Nucleated Deploy — soil/geology science via NUCLEUS composition.
#
# Proto graph for groundSpring tributaries. As groundSpring validates its
# science (Anderson validation, measurement analysis), gaps will surface
# upstream for primals and primalSpring to solve.
#
# NUCLEUS base: biomeOS + Tower (BearDog + Songbird)
# Compute layer: barraCuda (math), toadStool (GPU dispatch)
# Persistence: NestGate (storage)
# Provenance: rhizoCrypt + loamSpine + sweetGrass (WireWitnessRef)
#
# References:
#   wateringHole/ATTESTATION_ENCODING_STANDARD.md
#   config/capability_registry.toml
#
# Usage:
#   biomeos deploy --graph graphs/spring_deploy/groundspring_deploy.toml

[graph]
name = "groundspring_nucleated"
description = "GroundSpring soil science — NUCLEUS base + compute + persistence + provenance"
version = "3.0.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"
composition_model = "nucleated"
fragments = ["tower_atomic"]

# ── NUCLEUS Base ──────────────────────────────────────────────────────

[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "health.liveness"
by_capability = "orchestration"
capabilities = ["graph.deploy", "capability.discover", "topology.rescan"]

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign_ed25519", "crypto.verify_ed25519", "crypto.blake3_hash"]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ── Compute Layer ─────────────────────────────────────────────────────

[[graph.nodes]]
name = "barracuda"
binary = "barracuda"
order = 3
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "math"
capabilities = ["math.stats", "math.tensor"]

[[graph.nodes]]
name = "toadstool"
binary = "toadstool"
order = 4
required = false
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "compute"
capabilities = ["compute.dispatch.submit", "compute.execute"]

# ── Persistence ───────────────────────────────────────────────────────

[[graph.nodes]]
name = "nestgate"
binary = "nestgate"
order = 5
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "storage"
capabilities = ["storage.store", "storage.retrieve", "storage.list"]

# ── Provenance Trio (WireWitnessRef) ─────────────────────────────────

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 6
required = false
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = ["dag", "dag.session.create", "dag.event.append", "dag.merkle.root", "dag.merkle.verify", "dag.dehydration.trigger", "dag.frontier.get"]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 7
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = ["spine", "entry", "session", "certificate", "commit", "ledger", "spine.create", "entry.append", "session.commit", "certificate.mint"]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 8
required = false
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = ["braid", "attribution", "provenance", "anchoring", "braid.create", "braid.commit", "provenance.graph", "provenance.export_provo", "attribution.chain"]

# ── Spring Science ────────────────────────────────────────────────────

[[graph.nodes]]
name = "groundspring"
binary = "groundspring_primal"
order = 9
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.liveness"
by_capability = "geology"
capabilities = [
    "measurement.anderson_validation",
    "analysis.run",
    "compute.dispatch",
    "compute.execute",
    "compute.submit",
    "compute.status",
    "topology.metrics",
]
