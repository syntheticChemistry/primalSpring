#
# C3: Session Composition — esotericWebb standalone
#
# Isolates the narrative session subsystem for independent testing.
# Tower (BearDog + Songbird) is the minimum base required by esotericWebb.
#
# Gaps exposed:
#   - push_scene_to_ui sends flat JSON, not SceneGraph/DataBinding
#   - poll_input not wired into game loop
#   - replay command not implemented
#
# See also: graphs/esotericwebb_tower_deploy.toml (canonical product deploy)
#
# Usage:
#   biomeos deploy --graph graphs/compositions/session_standalone.toml

[graph]
name = "session_standalone"
description = "C3: esotericWebb session subsystem — session lifecycle, actions, state, narrative graph"
version = "1.0.0"
coordination = "sequential"

# ── Phase 0: biomeOS substrate ─────────────────────────────────────
[[graph.node]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "graph.list"]

# ── Phase 1: Tower Atomic ──────────────────────────────────────────
[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "security"
capabilities = ["crypto.sign", "crypto.verify", "crypto.identity"]

[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["net.discovery", "net.mesh"]

# ── Phase 2: esotericWebb narrative engine ─────────────────────────
[[graph.node]]
name = "esotericwebb"
binary = "esotericwebb"
order = 3
required = true
depends_on = ["beardog", "songbird"]
health_method = "webb.liveness"
by_capability = "narrative"
args = ["serve"]
capabilities = [
    "session.start",
    "session.state",
    "session.actions",
    "session.act",
    "session.history",
    "session.graph",
    "session.narrate",
    "webb.liveness",
    "webb.health",
    "webb.scene.current",
    "webb.narrative.status",
    "webb.content.list",
]
