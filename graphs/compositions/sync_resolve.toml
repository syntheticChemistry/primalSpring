# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Ecosystem Signal: sync.resolve
#
# Provenance-recorded divergence resolution. When a gate (human or agent)
# resolves a SYNC impulse, this signal composes the full pipeline:
#
#   dag.event.append (pre-state) → git merge → entry.append (certificate)
#   → braid.create (attribution) → impulse.ack
#
# This is the efferent (resolution) half of the agentic sync pipeline.
# The afferent (detection) half is sync.diverge.
#
# Coordination domain: waterFall (SYNC / autonomic)
# Signal tier: ecosystem (membrane-level, composes rootPulse + provenance trio)

[graph]
id = "sync_resolve"
name = "Sync Resolve"
description = "Provenance-recorded divergence resolution: record pre-state, merge, certify, attribute, acknowledge."
version = "1.0.0"
coordination = "sequential"
composition_tier = "ecosystem"
composition_name = "sync.resolve"
coordination_domain = "fall"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_and_mesh"
secure_by_default = true
cross_gate = true
manifest = "ecosystem_manifest.toml"
fragments = ["tower_atomic", "provenance_trio"]

[[graph.nodes]]
name = "load_sync_impulse"
binary = "membrane"
order = 1
required = true
spawn = false
by_capability = "coordination"
capabilities = ["impulse.read"]
description = "Load the SYNC impulse payload — repo, remote HEADs, policy, suggested action"

[[graph.nodes]]
name = "record_pre_state"
binary = "rhizocrypt"
order = 2
required = true
spawn = false
depends_on = ["load_sync_impulse"]
by_capability = "dag"
capabilities = ["dag.event.append"]
description = "Record pre-merge state in rhizoCrypt DAG: both remote HEADs, merge base, conflict analysis"

[[graph.nodes]]
name = "execute_merge"
binary = "membrane"
order = 3
required = true
spawn = false
depends_on = ["record_pre_state"]
by_capability = "sync"
capabilities = ["temporal.sync"]
description = "Execute the merge/rebase per divergence_policy (merge-ff, merge-rebase, or manual)"

[[graph.nodes]]
name = "certify_resolution"
binary = "loamspine"
order = 4
required = true
spawn = false
depends_on = ["execute_merge"]
by_capability = "spine"
capabilities = ["entry.append"]
description = "Append resolution certificate to loamSpine ledger: who resolved, how, which commits survived"

[[graph.nodes]]
name = "sign_certificate"
binary = "beardog"
order = 5
required = false
spawn = false
depends_on = ["certify_resolution"]
by_capability = "crypto"
capabilities = ["crypto.sign_ed25519"]
description = "Ed25519 sign the resolution certificate for tamper-evident provenance"

[[graph.nodes]]
name = "attribute_resolution"
binary = "sweetgrass"
order = 6
required = true
spawn = false
depends_on = ["certify_resolution"]
by_capability = "attribution"
capabilities = ["braid.create"]
description = "Create sweetGrass braid: resolver identity, resolution strategy, affected repos, W3C PROV-O"

[[graph.nodes]]
name = "acknowledge_impulse"
binary = "membrane"
order = 7
required = true
spawn = false
depends_on = ["attribute_resolution"]
by_capability = "coordination"
capabilities = ["impulse.ack"]
description = "Acknowledge the SYNC impulse with resolution summary"

[[graph.nodes]]
name = "cascade_push"
binary = "membrane"
order = 8
required = true
spawn = false
depends_on = ["acknowledge_impulse"]
by_capability = "sync"
capabilities = ["temporal.cascade"]
description = "Push resolved state to all remotes via temporal cascade"
