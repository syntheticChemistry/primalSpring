#
# Atomic Signal: potential.sense — Measure membrane potential
#
# Pure observation. Reads active impulses and reports what's pending
# for this gate. The afferent half of impulsePotential — quorumSignal
# senses the gradient without mutating it.
#
# With --count flag, returns just the integer count for cascade-pull
# integration (lightweight post-sync check).
#
# Coordination domain: quorumSignal (SENSE / afferent)

[graph]
id = "potential_sense"
name = "Potential Sense"
description = "Measure pending membrane potential — list active impulses for this gate."
version = "1.0.0"
coordination = "sequential"
composition_tier = "ecosystem"
composition_name = "potential.sense"
coordination_domain = "sense"

[graph.metadata]
particle = "potential"
security_model = "gate_identity"
transport = "local_fs"
secure_by_default = true
fragments = ["impulse_potential"]

[[graph.nodes]]
name = "resolve_identity"
binary = "membrane"
order = 1
required = true
spawn = false
by_capability = "identity"
capabilities = ["identity.resolve"]

[[graph.nodes]]
name = "scan_impulses"
binary = "membrane"
order = 2
required = true
spawn = false
depends_on = ["resolve_identity"]
by_capability = "coordination"
capabilities = ["potential.sense"]
