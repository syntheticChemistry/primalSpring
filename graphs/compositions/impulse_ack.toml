#
# Atomic Signal: impulse.ack — Receptor binding
#
# The receiving gate acknowledges an impulse by appending an [[acks]] entry.
# This is both ACTION (rootPulse — the gate takes an action) and SYNC
# (waterFall — the ack propagates back through the membrane).
#
# Coordination domain: rootPulse + waterFall (ACTION + SYNC)

[graph]
id = "impulse_ack"
name = "Impulse Ack"
description = "Acknowledge an impulse — receptor binding. Append ack entry, commit, push."
version = "1.0.0"
coordination = "sequential"
composition_tier = "ecosystem"
composition_name = "impulse.ack"
coordination_domain = "pulse"

[graph.metadata]
particle = "impulse"
security_model = "gate_identity"
transport = "git_ssh"
secure_by_default = true
fragments = ["impulse_potential"]

[[graph.nodes]]
name = "resolve_identity"
binary = "membrane"
order = 1
required = true
spawn = false
by_capability = "identity"
capabilities = ["identity.resolve"]

[[graph.nodes]]
name = "find_impulse"
binary = "membrane"
order = 2
required = true
spawn = false
depends_on = ["resolve_identity"]
by_capability = "coordination"
capabilities = ["impulse.find"]

[[graph.nodes]]
name = "append_ack"
binary = "membrane"
order = 3
required = true
spawn = false
depends_on = ["find_impulse"]
by_capability = "coordination"
capabilities = ["impulse.ack"]

[[graph.nodes]]
name = "propagate"
binary = "membrane"
order = 4
required = true
spawn = false
depends_on = ["append_ack"]
by_capability = "sync"
capabilities = ["git.push"]
