#
# Graduated Signal: context.weave (anchored) — Weave anchored context braid
#
# Phase 5 evolution of context braids. Adds sweetGrass validation and
# optional loamSpine anchoring for completed braids, turning ephemeral
# developer-state coordination into auditable provenance records.
#
# Pipeline: resolve identity → weave braid → validate schema (sweetGrass) →
#           anchor if complete (loamSpine) → store + push (nestGate) →
#           relay notify (songbird)
#
# Optional nodes degrade gracefully: unvalidated braids work on gates
# without sweetGrass, unanchored braids work without loamSpine.
#
# Coordination domain: rootPulse (ACTION — weave is a creative mutation)
# SENSE counterpart: context.sense stays read-only, no graph composition needed

[graph]
id = "context_weave_anchored"
name = "Context Weave (Anchored)"
description = "Weave a context braid with sweetGrass validation and optional loamSpine anchoring."
version = "2.0.0"
coordination = "sequential"
composition_tier = "ecosystem"
composition_name = "context.weave"
coordination_domain = "pulse"

[graph.metadata]
particle = "context"
security_model = "gate_identity"
transport = "git_ssh"
secure_by_default = true
fragments = ["impulse_potential"]

[[graph.nodes]]
name = "resolve_identity"
binary = "membrane"
order = 1
required = true
spawn = false
by_capability = "identity"
capabilities = ["identity.resolve"]

[[graph.nodes]]
name = "weave_braid"
binary = "membrane"
order = 2
required = true
spawn = false
depends_on = ["resolve_identity"]
by_capability = "coordination"
capabilities = ["context.weave"]

[[graph.nodes]]
name = "validate_schema"
binary = "sweetgrass"
order = 3
required = false
spawn = false
depends_on = ["weave_braid"]
by_capability = "provenance"
capabilities = ["braid.validate"]

[[graph.nodes]]
name = "anchor_if_complete"
binary = "loamspine"
order = 4
required = false
spawn = false
depends_on = ["validate_schema"]
by_capability = "ledger"
capabilities = ["entry.append"]

[[graph.nodes]]
name = "store_and_push"
binary = "nestgate"
order = 5
required = true
spawn = false
depends_on = ["weave_braid"]
by_capability = "storage"
capabilities = ["content.put", "content.push"]

[[graph.nodes]]
name = "relay_notify"
binary = "songbird"
order = 6
required = false
spawn = false
depends_on = ["store_and_push"]
by_capability = "network"
capabilities = ["mesh.publish"]
