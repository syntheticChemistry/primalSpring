#
# C2: Narration Composition — Squirrel AI standalone
#
# Isolates the AI narration subsystem for independent testing.
# Validates: ai.query returns prose, provider listing, context management.
#
# Gaps exposed:
#   - AiRouter discovery does not support Ollama HTTP natively
#   - LOCAL_AI_ENDPOINT env not wired into router discovery
#   - Need "local" provider in http_provider_config.rs or UDS bridge
#
# Usage:
#   biomeos deploy --graph graphs/compositions/narration_ai.toml

[graph]
name = "narration_ai"
description = "C2: Squirrel AI narration subsystem — ai.query, provider discovery, context management"
version = "1.1.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

# ── Phase 0: biomeOS substrate ─────────────────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "graph.list"]

# ── Phase 1: Squirrel AI bridge ───────────────────────────────────
[[graph.nodes]]
name = "squirrel"
binary = "squirrel"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "ai"
capabilities = [
    "ai.query",
    "ai.complete",
    "ai.chat",
    "ai.list_providers",
    "context.create",
    "context.update",
    "context.summarize",
    "tool.execute",
    "tool.list",
]
