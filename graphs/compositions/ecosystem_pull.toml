#
# Ecosystem Signal: ecosystem.pull
#
# Gate-aware cascade pull from the VPS periplasm. Resolves the local
# gate's profile from ecosystem_manifest.toml, discovers available
# remotes (forgejo-first, origin fallback), pulls repos in parallel,
# and publishes a freshness snapshot to songbird for cross-gate
# observability.
#
# This is the first signal that is autonomic — designed to run as a
# systemd timer or biomeOS continuous graph, like a heartbeat keeping
# ecosystem code coherent across all gates.
#
# Coordination domain: waterFall (SYNC / autonomic)
# Signal tier: ecosystem (membrane-level, not atomic-level)

[graph]
id = "ecosystem_pull"
name = "Ecosystem Pull"
description = "Cascade pull: resolve gate profile → discover remotes → parallel pull → publish freshness."
version = "1.0.0"
coordination = "parallel"
composition_tier = "ecosystem"
composition_name = "pull"
coordination_domain = "fall"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_and_mesh"
secure_by_default = true
cross_gate = true
manifest = "ecosystem_manifest.toml"

[[graph.nodes]]
name = "resolve_profile"
binary = "biomeos"
order = 1
required = true
spawn = false
by_capability = "orchestration"
capabilities = ["manifest.gate_profile"]
description = "Read gate profile from ecosystem_manifest.toml to determine which repos this gate needs"

[[graph.nodes]]
name = "discover_remotes"
binary = "songbird"
order = 2
required = true
spawn = false
depends_on = ["resolve_profile"]
by_capability = "discovery"
capabilities = ["mesh.discover_remotes"]
description = "Discover available git remotes (forgejo SSH, origin HTTPS) and select pull source"

[[graph.nodes]]
name = "cascade_pull"
binary = "nestgate"
order = 3
required = true
spawn = false
depends_on = ["discover_remotes"]
by_capability = "storage"
capabilities = ["content.sync"]
description = "Pull repos in parallel using resolved profiles and remotes"

[[graph.nodes]]
name = "publish_freshness"
binary = "songbird"
order = 4
required = false
spawn = false
depends_on = ["cascade_pull"]
by_capability = "discovery"
capabilities = ["mesh.publish"]
description = "Publish freshness snapshot to songbird mesh for cross-gate observability"
