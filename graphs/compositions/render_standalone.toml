# SPDX-License-Identifier: AGPL-3.0-or-later
#
# C1: Render Composition — petalTongue standalone
#
# Isolates the visualization subsystem for independent testing.
# Validates: dashboard rendering, SVG export, scene storage,
# session awareness, and modality compilation.
#
# Gaps exposed:
#   - EguiCompiler outputs Description not EguiShapes
#   - web_mode has no WebSocket/SSE for live push
#   - motor_tx not wired in server/web mode
#   - No HTML export modality (SVG only)
#
# Usage:
#   biomeos deploy --graph graphs/compositions/render_standalone.toml

[graph]
name = "render_standalone"
description = "C1: petalTongue render subsystem — dashboard, export, scene storage, proprioception awareness"
version = "1.1.0"
coordination = "sequential"

[graph.metadata]
security_model = "btsp_enforced"
transport = "uds_only"
tcp_ports = 0

# ── Phase 0: biomeOS substrate ─────────────────────────────────────
[[graph.nodes]]
name = "biomeos_neural_api"
binary = "biomeos"
order = 0
required = true
spawn = false
health_method = "graph.list"
by_capability = "orchestration"
capabilities = ["capability.discover", "graph.list"]

# ── Phase 1: petalTongue visualization ─────────────────────────────
[[graph.nodes]]
name = "petaltongue"
binary = "petaltongue"
order = 1
required = true
depends_on = ["biomeos_neural_api"]
health_method = "health.liveness"
by_capability = "visualization"
args = ["server"]
capabilities = [
    "visualization.render.scene",
    "visualization.render.dashboard",
    "visualization.render.grammar",
    "visualization.render.graph",
    "visualization.export",
    "visualization.session.list",
    "visualization.session.status",
    "visualization.validate",
    "visualization.dismiss",
    "visualization.showing",
    "visualization.introspect",
    "visualization.panels",
]
