# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Provenance Overlay — Tower + provenance trio (rhizoCrypt + loamSpine + sweetGrass)
#
# The trio provides verifiable lineage for any data pipeline:
#   - rhizoCrypt: content-addressed DAG (sessions, events, merkle proofs)
#   - loamSpine: append-only ledger (spines, entries, certificates)
#   - sweetGrass: attribution braids and provenance graph export
#
# Witness wire type: WireWitnessRef
#   { agent, kind, evidence, witnessed_at, encoding, algorithm, tier, context }
#
# BearDog crypto bridge:
#   crypto.sign_ed25519 → evidence (base64), algorithm "ed25519", tier "local"
#   crypto.verify_ed25519 → verify evidence per encoding field
#
# Non-crypto witnesses (kind = "checkpoint" | "observation" | "marker")
# track pipeline steps without cryptographic signing.
#
# The trio is algo-agnostic and can track non-crypto events (game checkpoints,
# conversation markers, sensor observations) as well as signed attestations.
#
# See: wateringHole/ATTESTATION_ENCODING_STANDARD.md
#      wateringHole/handoffs/PRIMALSPRING_TRIO_WITNESS_HARVEST_HANDOFF_APR07_2026.md
#
# Usage:
#   biomeos deploy --graph graphs/provenance_overlay.toml

[graph]
name = "provenance_overlay"
description = "Tower + provenance trio — verifiable lineage via WireWitnessRef"
version = "2.0.0"
coordination = "sequential"

[graph.metadata]
pattern_version = "2026-04-07"
witness_wire = "WireWitnessRef"
encoding_standard = "wateringHole/ATTESTATION_ENCODING_STANDARD.md"

# ── Phase 1: Tower base ──

[[graph.nodes]]
name = "beardog"
binary = "beardog"
order = 1
required = true
health_method = "health.liveness"
by_capability = "security"
capabilities = [
    "crypto.sign_ed25519", "crypto.verify_ed25519",
    "crypto.blake3_hash",
]

[[graph.nodes]]
name = "songbird"
binary = "songbird"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "discovery"
capabilities = ["discovery.find_primals", "discovery.announce"]

# ── Phase 2: Provenance trio ──
# Order: rhizoCrypt → loamSpine → sweetGrass (DAG → ledger → attribution)

[[graph.nodes]]
name = "rhizocrypt"
binary = "rhizocrypt"
order = 3
required = true
depends_on = ["beardog"]
health_method = "health.liveness"
by_capability = "dag"
capabilities = [
    "dag",
    "dag.session.create", "dag.session.get", "dag.session.list",
    "dag.event.append", "dag.vertex.get", "dag.frontier.get",
    "dag.merkle.root", "dag.merkle.proof", "dag.merkle.verify",
    "dag.dehydration.trigger",
    "dag.slice.checkout", "dag.slice.get",
]

[[graph.nodes]]
name = "loamspine"
binary = "loamspine"
order = 4
required = true
depends_on = ["beardog", "rhizocrypt"]
health_method = "health.liveness"
by_capability = "ledger"
capabilities = [
    "spine", "entry", "session", "certificate", "commit", "ledger",
    "spine.create", "spine.get", "spine.seal",
    "entry.append", "entry.get",
    "certificate.mint", "certificate.transfer",
    "session.commit", "braid.commit",
]

[[graph.nodes]]
name = "sweetgrass"
binary = "sweetgrass"
order = 5
required = true
depends_on = ["beardog", "loamspine"]
health_method = "health.liveness"
by_capability = "attribution"
capabilities = [
    "braid", "attribution", "provenance", "anchoring",
    "braid.create", "braid.get", "braid.commit",
    "anchoring.anchor", "anchoring.verify",
    "provenance.graph", "provenance.export_provo",
    "attribution.chain", "attribution.calculate_rewards",
]

# ── Validation (not spawned) ──

[[graph.nodes]]
name = "validate_provenance"
binary = "primalspring_primal"
order = 99
required = false
spawn = false
depends_on = ["beardog", "songbird", "rhizocrypt", "loamspine", "sweetgrass"]
health_method = "health.liveness"
by_capability = "coordination"
capabilities = ["composition.provenance_health"]
